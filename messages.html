<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Messages</title>
  <style>
    :root{--bg:#10131b;--panel:#171c27;--line:rgba(255,255,255,.08);--text:#f5f7fb;--muted:#c8d2e2;--fab:#4f6edb}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}
    html{font-size:19px;-webkit-text-size-adjust:100%;text-size-adjust:100%}
    body{min-height:100vh}
    .app{min-height:100vh;max-width:760px;margin:0 auto;background:linear-gradient(180deg,#171c27,#11161f)}
    .topbar{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:14px;padding:max(16px,env(safe-area-inset-top)) 20px 16px;position:sticky;top:0;background:linear-gradient(180deg,rgba(23,28,39,.98),rgba(23,28,39,.92));backdrop-filter:blur(8px);z-index:20;border-bottom:1px solid var(--line)}
    .title{font-size:2.55rem;font-weight:800;letter-spacing:-.02em;line-height:1;text-align:center;justify-self:center}
    .topActions{display:flex;gap:12px;align-items:center}
    .backBtn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:52px;padding:0 18px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.10);color:#fff;font-size:1.12rem;font-weight:800;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,.25)}
    .avatarBtn{width:60px;height:60px;border-radius:999px;border:none;padding:0;background:transparent;overflow:hidden;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,.25)}
    .avatarBtn img{width:100%;height:100%;object-fit:cover}
    .identity{padding:6px 20px 16px;color:#f2f7ff;font-size:1.22rem;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.28)}
    .threadList{padding:0 0 140px}
    .thread{display:flex;gap:18px;align-items:flex-start;padding:20px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;background:transparent}
    .threadAvatar{width:72px;height:72px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.54rem;color:#fff;background:#5b6475;overflow:hidden;flex:0 0 auto;margin-top:10px;box-shadow:0 6px 16px rgba(0,0,0,.24)}
    .threadAvatar img{width:100%;height:100%;object-fit:cover}
    .threadBody{min-width:0;flex:1}
    .threadTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .threadName{font-size:1.54rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.1}
    .threadTime{font-size:1.14rem;color:var(--muted);white-space:nowrap;font-weight:700}
    .threadPreview{margin-top:8px;color:#dce5f2;font-size:1.32rem;line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .badges{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
    .typeChip{font-size:1.08rem;color:var(--muted);font-weight:700}
    .unread{min-width:30px;height:30px;padding:0 10px;border-radius:999px;background:#6084ff;color:white;font-size:1rem;font-weight:800;display:inline-flex;align-items:center;justify-content:center}
    .fab{position:fixed;right:max(18px,env(safe-area-inset-right));bottom:max(86px,calc(env(safe-area-inset-bottom) + 28px));width:76px;height:76px;border:none;border-radius:999px;background:var(--fab);color:#fff;font-size:2.4rem;box-shadow:0 14px 24px rgba(0,0,0,.35);cursor:pointer}
    .status{position:fixed;left:12px;bottom:max(20px,env(safe-area-inset-bottom));background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.1);color:#cfd7e4;padding:8px 14px;border-radius:999px;font-size:.98rem;max-width:68vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hidden{display:none!important}
    .empty{padding:34px 24px;color:var(--muted);font-size:1.28rem}
    @media (max-width:640px){
      html{font-size:18px}
      .topbar{padding:max(14px,env(safe-area-inset-top)) 14px 14px;gap:10px}
      .title{font-size:2.15rem}
      .backBtn{min-height:48px;padding:0 16px;font-size:1.04rem}
      .avatarBtn{width:56px;height:56px}
      .thread{padding:18px 16px 16px}
      .threadAvatar{width:68px;height:68px;margin-top:12px}
      .threadName{font-size:1.42rem}
      .threadPreview{font-size:1.22rem}
      .threadTime{font-size:1.04rem}
      .identity{font-size:1.12rem}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button id="back-btn" class="backBtn" aria-label="Back to start page">← Back</button>
      <div class="title">Messages</div>
      <div class="topActions">
        <button id="memphis-btn" class="avatarBtn" aria-label="Ask Memphis"><img id="memphis-top-avatar" alt="Memphis" src="./memphis_avatar_optimized.webp?v=release-2026.04.22.2" /></button>
      </div>
    </div>
    <div id="identity-line" class="identity">Resolving device…</div>
    <div id="thread-list" class="threadList"></div>
    <div id="empty-state" class="empty hidden">No conversations yet.</div>
  </div>
  <button id="new-chat-btn" class="fab" aria-label="New chat">+</button>
  <div id="status-pill" class="status">Starting…</div>

  <script>
    const MEMPHIS_AVATAR = './memphis_avatar_optimized.webp?v=release-2026.04.22.2';
    const CONFIG = {
      API_BASE:'https://memphis-zoo-mcp.onrender.com/messaging-api',
      STORAGE_USER_KEY:'mz_messenger_user_id',
      DEVICE_STORAGE_KEY:'mz_scan_device_id',
      DEV_FALLBACK_DEVICE_ID:'1e74fe4c-dc20b3b9',
      THREAD_POLL_MS:5000
    };
    const state = { currentUserId:'', currentDeviceId:'', threads:[], poller:null };
    const els = {
      backBtn:document.getElementById('back-btn'),
      identityLine:document.getElementById('identity-line'),
      threadList:document.getElementById('thread-list'),
      emptyState:document.getElementById('empty-state'),
      statusPill:document.getElementById('status-pill'),
      newChatBtn:document.getElementById('new-chat-btn'),
      memphisBtn:document.getElementById('memphis-btn')
    };

    init().catch((error)=>setStatus(`Startup error: ${safe(error)}`));

    async function init(){
      state.currentDeviceId = resolveDeviceId();
      await resolveIdentity();
      bindEvents();
      await refreshThreads();
      state.poller = setInterval(() => refreshThreads().catch(()=>{}), CONFIG.THREAD_POLL_MS);
    }

    function bindEvents(){
      els.backBtn.addEventListener('click', navigateToStartPage);
      els.newChatBtn.addEventListener('click', ()=>navigateToThreadPage({ mode:'new' }));
      els.memphisBtn.addEventListener('click', ()=>{
        const existing = state.threads.find((t)=>String(t.thread_type).toLowerCase()==='bot'||String(t.thread_title||'').trim().toLowerCase()==='memphis');
        if (existing) return navigateToThreadPage({ threadId: normalizeThread(existing).id });
        navigateToThreadPage({ mode:'memphis' });
      });
    }

    function resolveDeviceId(){
      const url = new URL(window.location.href);
      const explicit = String(url.searchParams.get('device')||url.searchParams.get('deviceId')||'').trim();
      if (explicit){ localStorage.setItem(CONFIG.DEVICE_STORAGE_KEY, explicit); return explicit; }
      const stored = String(localStorage.getItem(CONFIG.DEVICE_STORAGE_KEY)||'').trim();
      if (stored) return stored;
      if (location.hostname.includes('github.io')){
        localStorage.setItem(CONFIG.DEVICE_STORAGE_KEY, CONFIG.DEV_FALLBACK_DEVICE_ID);
        return CONFIG.DEV_FALLBACK_DEVICE_ID;
      }
      return '';
    }

    function navigateToStartPage(){
      const url = new URL('./start_page1.html', window.location.href);
      if (state.currentDeviceId) url.searchParams.set('device', state.currentDeviceId);
      window.location.href = url.toString();
    }

    async function apiGet(path){
      const response = await fetch(`${CONFIG.API_BASE}${path}`, { cache:'no-store' });
      const payload = await response.json().catch(()=>null);
      if(!response.ok||!payload||!payload.ok) throw new Error(payload?.error||`HTTP ${response.status}`);
      return payload.data;
    }

    async function resolveIdentity(){
      if (!state.currentDeviceId){
        els.identityLine.textContent = 'Device: unresolved';
        return;
      }
      try {
        const mapped = await apiGet(`/me/by-device?device_id=${encodeURIComponent(state.currentDeviceId)}`);
        if(mapped&&mapped.msg_user_id){
          state.currentUserId = String(mapped.msg_user_id||'').trim();
          localStorage.setItem(CONFIG.STORAGE_USER_KEY,state.currentUserId);
          els.identityLine.textContent = `${mapped.display_name} • ${state.currentDeviceId}`;
          return;
        }
      } catch {}
      state.currentUserId = String(localStorage.getItem(CONFIG.STORAGE_USER_KEY)||'').trim();
      els.identityLine.textContent = `Device: ${state.currentDeviceId || 'unresolved'}`;
    }

    async function refreshThreads(){
      if(!state.currentUserId){
        els.emptyState.classList.remove('hidden');
        els.threadList.innerHTML='';
        return setStatus('No mapped user for this device.');
      }
      const qs=`?user_id=${encodeURIComponent(state.currentUserId)}${state.currentDeviceId?`&device_id=${encodeURIComponent(state.currentDeviceId)}`:''}`;
      state.threads = await apiGet(`/threads${qs}`);
      renderThreads();
    }

    function renderThreads(){
      if(!state.threads.length){
        els.threadList.innerHTML='';
        els.emptyState.classList.remove('hidden');
        return;
      }
      els.emptyState.classList.add('hidden');
      els.threadList.innerHTML = state.threads.map((threadRow)=>{
        const thread = normalizeThread(threadRow);
        return `<article class="thread" data-thread-id="${escapeAttr(thread.id)}">${renderAvatar(thread)}<div class="threadBody"><div class="threadTop"><div class="threadName">${escapeHtml(thread.thread_title||'Untitled')}</div><div class="threadTime">${escapeHtml(formatTime(thread.last_message_at||thread.updated_at))}</div></div><div class="threadPreview">${escapeHtml(thread.last_message_body||'No messages yet.')}</div><div class="badges"><div class="typeChip">${escapeHtml(labelThreadType(thread.thread_type))}</div>${Number(thread.unread_count||0)?`<div class="unread">${escapeHtml(String(thread.unread_count))}</div>`:''}</div></div></article>`;
      }).join('');
      Array.from(els.threadList.querySelectorAll('[data-thread-id]')).forEach((node)=>{
        node.addEventListener('click', ()=>navigateToThreadPage({ threadId:String(node.getAttribute('data-thread-id')||'').trim() }));
      });
    }

    function renderAvatar(thread){
      if(String(thread.thread_type).toLowerCase()==='bot'||String(thread.thread_title||'').trim().toLowerCase()==='memphis'){
        return `<div class="threadAvatar"><img src="${MEMPHIS_AVATAR}" alt="Memphis"></div>`;
      }
      const initials = String(thread.thread_title||'T').trim().split(/\s+/).slice(0,2).map((x)=>x[0]||'').join('').toUpperCase()||'T';
      return `<div class="threadAvatar">${escapeHtml(initials)}</div>`;
    }

    function navigateToThreadPage({ threadId='', mode='' }){
      const url=new URL('./thread.html', window.location.href);
      if(threadId) url.searchParams.set('thread_id',threadId);
      if(mode) url.searchParams.set('mode',mode);
      if(state.currentDeviceId) url.searchParams.set('device',state.currentDeviceId);
      if(state.currentUserId) url.searchParams.set('user_id',state.currentUserId);
      window.location.href=url.toString();
    }

    function normalizeThread(thread){
      return { ...thread, id:thread.id||thread.thread_id||'', thread_title:thread.thread_title||thread.title||'Untitled', thread_type:thread.thread_type||'direct' };
    }

    function labelThreadType(value){
      const v=String(value||'').toLowerCase();
      if(v==='bot') return 'Memphis';
      if(v==='group') return 'Group';
      if(v==='broadcast') return 'Broadcast';
      return 'Direct';
    }

    function formatTime(value){
      if(!value) return '';
      const d=new Date(value);
      return Number.isNaN(d.getTime()) ? '' : d.toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
    }

    function setStatus(text){ els.statusPill.textContent=text; }
    function safe(error){ return error&&error.message?String(error.message):String(error||'Unknown error'); }
    function escapeHtml(value){ return String(value==null?'':value).replace(/[&<>"']/g,(m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[m]); }
    function escapeAttr(value){ return escapeHtml(value).replace(/`/g,'&#96;'); }
  </script>
</body>
</html>
