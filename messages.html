<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Messages</title>
  <style>
    :root{
      --panel:rgba(17,24,33,.9);
      --panel-soft:rgba(17,24,33,.72);
      --panel-strong:rgba(14,20,28,.96);
      --line:rgba(255,255,255,.1);
      --text:#f7fbff;
      --muted:#b8c4d2;
      --shadow:0 14px 32px rgba(0,0,0,.22);
      --zoo-green-1:#a8e146;
      --zoo-green-2:#6cb81f;
      --zoo-green-3:#4d8d18;
      --blue-pill:#6084ff;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      color:var(--text);
      font-family:Arial,sans-serif;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
    }
    html{font-size:19px}
    body{
      min-height:100vh;
      background:
        linear-gradient(rgba(7,12,18,.54),rgba(7,12,18,.63)),
        url('./Background1_optimized.webp?v=release-2026.04.22.3') center/cover no-repeat fixed;
    }
    .app{
      max-width:760px;
      margin:0 auto;
      min-height:100vh;
      background:linear-gradient(180deg,rgba(23,28,39,.68),rgba(17,22,31,.86));
      box-shadow:0 18px 36px rgba(0,0,0,.24);
    }
    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:14px;
      min-height:162px;
      padding:calc(max(18px, env(safe-area-inset-top)) + 10px) 16px 18px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg,rgba(17,24,33,.94),rgba(17,24,33,.88));
      backdrop-filter:blur(14px);
    }
    .backBtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:56px;
      padding:0 22px;
      border:none;
      border-radius:999px;
      background:linear-gradient(180deg,var(--zoo-green-1) 0%,var(--zoo-green-2) 100%);
      color:#102106;
      font-size:1.04rem;
      font-weight:900;
      letter-spacing:.01em;
      cursor:pointer;
      box-shadow:0 12px 24px rgba(28,73,12,.24);
      border:1px solid rgba(255,255,255,.16);
    }
    .backBtn:active{transform:translateY(1px)}
    .titleWrap{
      min-width:0;
      text-align:center;
      padding:0 4px;
    }
    .title{
      font-size:2rem;
      line-height:1.02;
      font-weight:900;
      letter-spacing:-.02em;
      text-shadow:0 2px 12px rgba(0,0,0,.18);
    }
    .titleSub{
      margin-top:6px;
      color:var(--muted);
      font-size:.98rem;
      font-weight:800;
    }
    .topActions{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:flex-end;
    }
    .avatarBtn{
      width:126px;
      height:126px;
      border-radius:999px;
      border:3px solid rgba(255,255,255,.16);
      padding:0;
      background:rgba(255,255,255,.08);
      overflow:hidden;
      cursor:pointer;
      box-shadow:0 12px 24px rgba(0,0,0,.24);
      flex:0 0 auto;
    }
    .avatarBtn img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
      object-position:center center;
    }
    .identityWrap{
      padding:12px 16px 6px;
      display:flex;
      justify-content:center;
    }
    .identity{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-height:42px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(11,17,24,.42);
      border:1px solid rgba(255,255,255,.08);
      color:#eef5ff;
      font-size:1rem;
      font-weight:800;
      text-align:center;
      text-shadow:0 2px 8px rgba(0,0,0,.28);
      box-shadow:var(--shadow);
      max-width:100%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .threadList{
      padding:14px 14px 136px;
      display:grid;
      gap:12px;
      align-content:start;
    }
    .thread{
      display:flex;
      gap:16px;
      align-items:flex-start;
      padding:16px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg,rgba(17,24,33,.82),rgba(15,21,29,.92));
      box-shadow:var(--shadow);
      cursor:pointer;
    }
    .threadAvatar{
      width:78px;
      height:78px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      font-size:1.45rem;
      color:#fff;
      background:#5b6475;
      overflow:hidden;
      flex:0 0 auto;
      box-shadow:0 8px 18px rgba(0,0,0,.28);
      border:2px solid rgba(255,255,255,.16);
    }
    .threadAvatar img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
      object-position:center center;
    }
    .threadBody{min-width:0;flex:1}
    .threadTop{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }
    .threadName{
      font-size:1.36rem;
      font-weight:900;
      line-height:1.12;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .threadTime{
      flex:0 0 auto;
      font-size:.94rem;
      color:var(--muted);
      white-space:nowrap;
      font-weight:800;
      padding-top:2px;
    }
    .threadPreview{
      margin-top:8px;
      color:#dce5f2;
      font-size:1.08rem;
      line-height:1.28;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .badges{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .typeChip{
      display:inline-flex;
      align-items:center;
      min-height:28px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:var(--muted);
      font-size:.86rem;
      font-weight:800;
    }
    .unread{
      min-width:28px;
      height:28px;
      padding:0 10px;
      border-radius:999px;
      background:var(--blue-pill);
      color:#fff;
      font-size:.9rem;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 8px 16px rgba(0,0,0,.18);
    }
    .fab{
      position:fixed;
      right:max(18px,env(safe-area-inset-right));
      bottom:max(86px,calc(env(safe-area-inset-bottom) + 28px));
      min-width:110px;
      height:62px;
      padding:0 24px;
      border:none;
      border-radius:24px;
      background:linear-gradient(180deg,var(--zoo-green-1) 0%,var(--zoo-green-2) 100%);
      color:#102106;
      font-size:2rem;
      font-weight:900;
      box-shadow:0 12px 24px rgba(28,73,12,.24);
      cursor:pointer;
      border:1px solid rgba(255,255,255,.16);
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .fab:active{transform:translateY(1px)}
    .hidden{display:none!important}
    .status{display:none!important}
    .empty{
      padding:28px 18px;
      color:var(--muted);
      font-size:1.05rem;
      border-radius:22px;
      background:rgba(15,21,29,.46);
      border:1px solid rgba(255,255,255,.06);
    }
    @media (max-width:640px){
      html{font-size:18px}
      .topbar{
        min-height:146px;
        padding:calc(max(14px, env(safe-area-inset-top)) + 6px) 14px 16px;
        gap:12px;
      }
      .backBtn{
        min-height:52px;
        padding:0 18px;
        font-size:.98rem;
      }
      .title{font-size:1.78rem}
      .titleSub{font-size:.9rem}
      .avatarBtn{
        width:116px;
        height:116px;
      }
      .identityWrap{padding:10px 14px 4px}
      .identity{font-size:.96rem;min-height:40px;padding:9px 12px}
      .threadList{
        padding:12px 12px 128px;
        gap:10px;
      }
      .thread{
        padding:14px;
        gap:14px;
        border-radius:22px;
      }
      .threadAvatar{
        width:72px;
        height:72px;
        font-size:1.34rem;
      }
      .threadName{font-size:1.26rem}
      .threadPreview{font-size:1rem}
      .threadTime{font-size:.88rem}
      .fab{
        min-width:96px;
        height:58px;
        padding:0 20px;
        font-size:1.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button id="back-btn" class="backBtn" aria-label="Back to start page">Back</button>
      <div class="titleWrap">
        <div class="title">Messages</div>
        <div class="titleSub">Memphis Messenger</div>
      </div>
      <div class="topActions">
        <button id="memphis-btn" class="avatarBtn" aria-label="Ask Memphis">
          <img id="memphis-top-avatar" alt="Memphis" src="./memphis_avatar_optimized.webp?v=release-2026.04.22.5" />
        </button>
      </div>
    </div>

    <div class="identityWrap">
      <div id="identity-line" class="identity">Resolving device…</div>
    </div>

    <div id="thread-list" class="threadList"></div>
    <div id="empty-state" class="empty hidden">No conversations yet.</div>
  </div>

  <button id="new-chat-btn" class="fab" aria-label="New chat">+</button>
  <div id="status-pill" class="status" aria-hidden="true"></div>

  <script>
    const MEMPHIS_AVATAR = './memphis_avatar_optimized.webp?v=release-2026.04.22.5';
    const CONFIG = {
      API_BASE:'https://memphis-zoo-mcp.onrender.com/messaging-api',
      STORAGE_USER_KEY:'mz_messenger_user_id',
      DEVICE_STORAGE_KEY:'mz_scan_device_id',
      DEV_FALLBACK_DEVICE_ID:'1e74fe4c-dc20b3b9',
      THREAD_POLL_MS:5000
    };
    const state = { currentUserId:'', currentDeviceId:'', threads:[], poller:null };
    const els = {
      backBtn:document.getElementById('back-btn'),
      identityLine:document.getElementById('identity-line'),
      threadList:document.getElementById('thread-list'),
      emptyState:document.getElementById('empty-state'),
      statusPill:document.getElementById('status-pill'),
      newChatBtn:document.getElementById('new-chat-btn'),
      memphisBtn:document.getElementById('memphis-btn')
    };

    init().catch((error)=>setStatus(`Startup error: ${safe(error)}`));

    async function init(){
      state.currentDeviceId = resolveDeviceId();
      await resolveIdentity();
      bindEvents();
      await refreshThreads();
      state.poller = setInterval(() => refreshThreads().catch(()=>{}), CONFIG.THREAD_POLL_MS);
    }

    function bindEvents(){
      els.backBtn.addEventListener('click', navigateToStartPage);
      els.newChatBtn.addEventListener('click', ()=>navigateToThreadPage({ mode:'new' }));
      els.memphisBtn.addEventListener('click', ()=>{
        const existing = state.threads.find((t)=>String(t.thread_type).toLowerCase()==='bot'||String(t.thread_title||'').trim().toLowerCase()==='memphis');
        if (existing) return navigateToThreadPage({ threadId: normalizeThread(existing).id });
        navigateToThreadPage({ mode:'memphis' });
      });
    }

    function resolveDeviceId(){
      const url = new URL(window.location.href);
      const explicit = String(url.searchParams.get('device')||url.searchParams.get('deviceId')||'').trim();
      if (explicit){
        localStorage.setItem(CONFIG.DEVICE_STORAGE_KEY, explicit);
        return explicit;
      }
      const stored = String(localStorage.getItem(CONFIG.DEVICE_STORAGE_KEY)||'').trim();
      if (stored) return stored;
      if (location.hostname.includes('github.io')){
        localStorage.setItem(CONFIG.DEVICE_STORAGE_KEY, CONFIG.DEV_FALLBACK_DEVICE_ID);
        return CONFIG.DEV_FALLBACK_DEVICE_ID;
      }
      return '';
    }

    function navigateToStartPage(){
      const url = new URL('./start_page1.html', window.location.href);
      if (state.currentDeviceId) url.searchParams.set('device', state.currentDeviceId);
      window.location.href = url.toString();
    }

    async function apiGet(path){
      const response = await fetch(`${CONFIG.API_BASE}${path}`, { cache:'no-store' });
      const payload = await response.json().catch(()=>null);
      if(!response.ok||!payload||!payload.ok) throw new Error(payload?.error||`HTTP ${response.status}`);
      return payload.data;
    }

    async function resolveIdentity(){
      if (!state.currentDeviceId){
        els.identityLine.textContent = 'Ops Manager';
        return;
      }
      try {
        const mapped = await apiGet(`/me/by-device?device_id=${encodeURIComponent(state.currentDeviceId)}`);
        if(mapped&&mapped.msg_user_id){
          state.currentUserId = String(mapped.msg_user_id||'').trim();
          localStorage.setItem(CONFIG.STORAGE_USER_KEY,state.currentUserId);
          els.identityLine.textContent = `${mapped.display_name}`;
          return;
        }
      } catch {}
      state.currentUserId = String(localStorage.getItem(CONFIG.STORAGE_USER_KEY)||'').trim();
      els.identityLine.textContent = 'Ops Manager';
    }

    async function refreshThreads(){
      if(!state.currentUserId){
        els.emptyState.classList.remove('hidden');
        els.threadList.innerHTML='';
        return setStatus('No mapped user for this device.');
      }
      const qs=`?user_id=${encodeURIComponent(state.currentUserId)}${state.currentDeviceId?`&device_id=${encodeURIComponent(state.currentDeviceId)}`:''}`;
      state.threads = await apiGet(`/threads${qs}`);
      renderThreads();
    }

    function renderThreads(){
      if(!state.threads.length){
        els.threadList.innerHTML='';
        els.emptyState.classList.remove('hidden');
        return;
      }
      els.emptyState.classList.add('hidden');
      els.threadList.innerHTML = state.threads.map((threadRow)=>{
        const thread = normalizeThread(threadRow);
        return `<article class="thread" data-thread-id="${escapeAttr(thread.id)}">${renderAvatar(thread)}<div class="threadBody"><div class="threadTop"><div class="threadName">${escapeHtml(thread.thread_title||'Untitled')}</div><div class="threadTime">${escapeHtml(formatTime(thread.last_message_at||thread.updated_at))}</div></div><div class="threadPreview">${escapeHtml(thread.last_message_body||'No messages yet.')}</div><div class="badges"><div class="typeChip">${escapeHtml(labelThreadType(thread.thread_type))}</div>${Number(thread.unread_count||0)?`<div class="unread">${escapeHtml(String(thread.unread_count))}</div>`:''}</div></div></article>`;
      }).join('');
      Array.from(els.threadList.querySelectorAll('[data-thread-id]')).forEach((node)=>{
        node.addEventListener('click', ()=>navigateToThreadPage({ threadId:String(node.getAttribute('data-thread-id')||'').trim() }));
      });
    }

    function renderAvatar(thread){
      if(String(thread.thread_type).toLowerCase()==='bot'||String(thread.thread_title||'').trim().toLowerCase()==='memphis'){
        return `<div class="threadAvatar"><img src="${MEMPHIS_AVATAR}" alt="Memphis"></div>`;
      }
      const initials = String(thread.thread_title||'T').trim().split(/\s+/).slice(0,2).map((x)=>x[0]||'').join('').toUpperCase()||'T';
      return `<div class="threadAvatar">${escapeHtml(initials)}</div>`;
    }

    function navigateToThreadPage({ threadId='', mode='' }){
      const url=new URL('./thread.html', window.location.href);
      if(threadId) url.searchParams.set('thread_id',threadId);
      if(mode) url.searchParams.set('mode',mode);
      if(state.currentDeviceId) url.searchParams.set('device',state.currentDeviceId);
      if(state.currentUserId) url.searchParams.set('user_id',state.currentUserId);
      window.location.href=url.toString();
    }

    function normalizeThread(thread){
      return { ...thread, id:thread.id||thread.thread_id||'', thread_title:thread.thread_title||thread.title||'Untitled', thread_type:thread.thread_type||'direct' };
    }

    function labelThreadType(value){
      const v=String(value||'').toLowerCase();
      if(v==='bot') return 'Memphis';
      if(v==='group') return 'Group';
      if(v==='broadcast') return 'Broadcast';
      return 'Direct';
    }

    function formatTime(value){
      if(!value) return '';
      const d=new Date(value);
      return Number.isNaN(d.getTime()) ? '' : d.toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
    }

    function setStatus(text){ els.statusPill.textContent=text; }
    function safe(error){ return error&&error.message?String(error.message):String(error||'Unknown error'); }
    function escapeHtml(value){ return String(value==null?'':value).replace(/[&<>"']/g,(m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[m]); }
    function escapeAttr(value){ return escapeHtml(value).replace(/`/g,'&#96;'); }
  </script>
</body>
</html>
