<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Upcoming Events</title>
  <style>
    :root{
      --text:#f8fafc;
      --muted:rgba(248,250,252,.76);
      --line:rgba(255,255,255,.12);
      --line-soft:rgba(255,255,255,.08);
      --panel:rgba(8,17,29,.76);
      --panel-strong:rgba(8,17,29,.90);
      --panel-soft:rgba(255,255,255,.04);
      --green:#84c341;
      --shadow:0 18px 40px rgba(0,0,0,.30);
      --zoo-green-1:#a8e146;
      --zoo-green-2:#6cb81f;
      --chip:#173247;
      --chip-line:rgba(143,207,255,.18);
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:Arial,sans-serif;color:var(--text);background:#111827}
    body{background-image:linear-gradient(rgba(4,10,20,.56),rgba(4,10,20,.62)),url('./dashboard-bg_optimized.webp?v=release-2026.04.22.8');background-size:cover;background-position:center;background-repeat:no-repeat;background-attachment:fixed}
    .page{width:min(1760px,100%);margin:0 auto;min-height:100vh;padding:calc(max(10px, env(safe-area-inset-top)) + 8px) 18px max(24px, calc(env(safe-area-inset-bottom) + 14px));display:grid;grid-template-rows:auto minmax(0,1fr);gap:12px}

    .toolbar,.board{
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      background:var(--panel);
      backdrop-filter:blur(10px);
    }

    .toolbar{
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:16px;
      padding:10px 14px;
      min-height:78px;
    }
    .toolbarLeft,.toolbarCenter,.toolbarRight{display:flex;align-items:center}
    .toolbarCenter{justify-content:center;text-align:center}
    .toolbarRight{justify-content:flex-end;gap:12px}

    .backBtn{
      display:inline-flex;align-items:center;justify-content:center;
      min-height:44px;padding:0 18px;border:none;border-radius:999px;
      background:linear-gradient(180deg,var(--zoo-green-1) 0%,var(--zoo-green-2) 100%);
      color:#102106;font-size:.94rem;font-weight:900;letter-spacing:.01em;cursor:pointer;
      box-shadow:0 10px 20px rgba(28,73,12,.22);border:1px solid rgba(255,255,255,.16)
    }
    .backBtn:active{transform:translateY(1px)}

    .titleWrap{display:grid;justify-items:center;gap:3px}
    .eyebrow{color:var(--green);font-size:.68rem;font-weight:900;letter-spacing:.16em;text-transform:uppercase}
    .title{margin:0;font-size:clamp(1.18rem,1.6vw,1.7rem);line-height:1;font-weight:900;letter-spacing:-.02em}
    .titleSub{color:var(--muted);font-size:.76rem;line-height:1.1}

    .statusPill{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      border-radius:999px;min-height:38px;padding:8px 14px;font-weight:800;
      border:1px solid var(--line);color:var(--text);background:rgba(255,255,255,.06);
      white-space:nowrap;font-size:.92rem
    }
    .eventsIconWrap{
      width:64px;height:64px;border-radius:18px;border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;
      overflow:hidden;box-shadow:0 10px 22px rgba(0,0,0,.22);flex:0 0 auto
    }
    .eventsIconWrap img{width:100%;height:100%;display:block;object-fit:cover;transform:scale(1.08);transform-origin:center}

    .board{
      min-height:0;
      padding:12px;
      display:grid;
      grid-template-rows:auto auto minmax(0,1fr);
      gap:10px;
    }
    .boardHeader{display:flex;justify-content:space-between;gap:12px;align-items:flex-end;flex-wrap:wrap}
    .boardTitle{margin:0;font-size:1rem;line-height:1.1}
    .boardMeta{color:var(--muted);font-size:.78rem;line-height:1.24}

    .tableShell{
      min-height:0;
      border:1px solid var(--line-soft);
      border-radius:18px;
      background:rgba(2,10,20,.18);
      overflow:hidden;
      display:grid;
      grid-template-rows:auto minmax(0,1fr);
    }
    .headerRow{
      display:grid;
      grid-template-columns:2.2fr 1.35fr 1fr 1.15fr .8fr 2.2fr .85fr;
      gap:12px;
      padding:10px 14px 9px;
      color:var(--muted);
      font-size:.74rem;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      border-bottom:1px solid var(--line-soft);
      position:sticky;
      top:0;
      background:linear-gradient(180deg,rgba(8,17,29,.98),rgba(8,17,29,.93));
      z-index:2;
    }
    .rows{
      min-height:0;
      overflow:auto;
      display:grid;
      gap:8px;
      padding:8px;
      align-content:start;
    }
    .eventRow{
      display:grid;
      grid-template-columns:2.2fr 1.35fr 1fr 1.15fr .8fr 2.2fr .85fr;
      align-items:center;
      gap:12px;
      padding:11px 12px;
      border:1px solid var(--line-soft);
      border-radius:16px;
      background:linear-gradient(180deg,rgba(5,14,26,.84),rgba(5,14,26,.72));
    }
    .eventRow:hover{background:linear-gradient(180deg,rgba(8,19,32,.9),rgba(8,19,32,.78))}
    .headerCell,.eventCell{display:flex;align-items:center;min-width:0}
    .headerCell.center,.eventCell.center{justify-content:center;text-align:center}
    .headerCell.right,.eventCell.right{justify-content:flex-end;text-align:right}

    .eventName{font-size:.98rem;font-weight:900;line-height:1.18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .eventArea{color:var(--green);font-weight:800;font-size:.9rem;line-height:1.18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cellValue{font-size:.92rem;font-weight:800;line-height:1.18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .notesValue{font-size:.88rem;line-height:1.25;color:#eef6ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .eventChip{
      justify-self:end;border-radius:999px;padding:6px 10px;font-size:.78rem;font-weight:900;
      border:1px solid var(--chip-line);background:var(--chip);color:#d9f7ff;white-space:nowrap
    }
    .rowLabel{display:none}
    .emptyState{border-radius:16px;padding:18px;border:1px dashed rgba(255,255,255,.18);color:var(--muted);text-align:center;background:rgba(255,255,255,.04)}

    ::-webkit-scrollbar{height:10px;width:10px}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:999px}
    ::-webkit-scrollbar-track{background:transparent}

    @media (max-width:1500px){
      .page{width:min(1600px,100%)}
      .headerRow,.eventRow{grid-template-columns:1.95fr 1.2fr .95fr 1.05fr .78fr 1.9fr .82fr}
    }
    @media (max-width:980px){
      .page{padding:calc(max(14px, env(safe-area-inset-top)) + 10px) 14px max(24px, calc(env(safe-area-inset-bottom) + 14px))}
      .toolbar{grid-template-columns:1fr;justify-items:stretch;gap:10px;min-height:auto}
      .toolbarCenter{text-align:center}
      .toolbarRight{justify-content:space-between}
      .statusPill{flex:1}
      .headerRow{display:none}
      .rows{overflow:visible;max-height:none;padding:0}
      .tableShell{overflow:visible}
      .eventRow{grid-template-columns:1fr;align-items:start;gap:10px}
      .rowLabel{display:block;color:var(--muted);font-size:.7rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
      .headerCell,.eventCell,.headerCell.center,.eventCell.center,.headerCell.right,.eventCell.right{justify-content:flex-start;text-align:left}
      .eventName,.eventArea,.cellValue,.notesValue{white-space:normal;overflow:visible;text-overflow:clip}
      .eventChip{justify-self:start}
    }
    @media (max-width:640px){
      .toolbar{padding:10px 12px}
      .backBtn{min-height:42px;padding:0 16px;font-size:.9rem}
      .title{font-size:1.12rem}
      .titleSub{font-size:.72rem}
      .eventsIconWrap{width:52px;height:52px}
      .board{padding:10px}
      .tableShell{border-radius:16px}
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="toolbar">
      <div class="toolbarLeft">
        <button id="back-btn" class="backBtn" aria-label="Back to hub">Back</button>
      </div>
      <div class="toolbarCenter">
        <div class="titleWrap">
          <div class="eyebrow">Memphis Zoo</div>
          <div class="title">Upcoming Events</div>
          <div class="titleSub">Live event board for upcoming operations</div>
        </div>
      </div>
      <div class="toolbarRight">
        <div id="status-pill" class="statusPill">Loading events…</div>
        <div class="eventsIconWrap"><img src="./Event_Icon_Optimized_Perfect.webp?v=release-2026.04.23.2" alt="Events icon" /></div>
      </div>
    </section>

    <section class="board">
      <div class="boardHeader">
        <div>
          <h2 class="boardTitle">Event Board</h2>
          <div class="boardMeta">Pulled from the live backend. Refreshes automatically every 30 seconds.</div>
        </div>
      </div>

      <div class="tableShell">
        <div class="headerRow">
          <div class="headerCell">Event</div>
          <div class="headerCell">Area</div>
          <div class="headerCell center">Date</div>
          <div class="headerCell center">Time</div>
          <div class="headerCell center">Attendees</div>
          <div class="headerCell">Notes</div>
          <div class="headerCell right">Status</div>
        </div>
        <div id="events-grid" class="rows"></div>
      </div>
    </section>
  </div>

  <script>
    const CONFIG={EVENTS_URL:'https://memphis-zoo-mcp.onrender.com/dashboard-api/events',REFRESH_MS:30000,DEVICE_STORAGE_KEY:'mz_scan_device_id'};
    const state={hubContext:'manager'};
    const els={backBtn:document.getElementById('back-btn'),statusPill:document.getElementById('status-pill'),eventsGrid:document.getElementById('events-grid')};
    init().catch((error)=>setStatus(`Startup failed: ${safe(error)}`, true));
    async function init(){state.hubContext=resolveHubContext();els.backBtn.addEventListener('click',navigateBack);await loadEvents();setInterval(()=>{loadEvents().catch((error)=>setStatus(`Refresh failed: ${safe(error)}`, true));},CONFIG.REFRESH_MS);}
    function resolveHubContext(){const value=String(new URL(window.location.href).searchParams.get('hub')||'').trim().toLowerCase();return value==='employee'?'employee':'manager';}
    function navigateBack(){const target=state.hubContext==='employee'?'./employee-hub.html':'./start_page1.html';const url=new URL(target,window.location.href);const device=String(new URL(window.location.href).searchParams.get('device')||localStorage.getItem(CONFIG.DEVICE_STORAGE_KEY)||'').trim();if(device)url.searchParams.set('device',device);window.location.href=url.toString();}
    async function loadEvents(){setStatus('Loading events…');const response=await fetch(CONFIG.EVENTS_URL,{cache:'no-store'});const payload=await response.json().catch(()=>null);if(!response.ok||!payload||!payload.ok)throw new Error((payload&&payload.error)||`HTTP ${response.status}`);const events=Array.isArray(payload.data)?payload.data:[];renderEvents(events);setStatus(events.length?`${events.length} upcoming event${events.length===1?'':'s'} loaded`:'No upcoming events');}
    function renderEvents(events){if(!events.length){els.eventsGrid.innerHTML='<div class="emptyState">No upcoming events are currently scheduled.</div>';return;}els.eventsGrid.innerHTML=events.map((event)=>{const dateLabel=formatDate(event.event_date);const timeLabel=`${formatTime(event.start_time)} to ${formatTime(event.end_time)}`;const attendeeLabel=event.attendee_count==null?'Not listed':Number(event.attendee_count).toLocaleString();const chipLabel=isToday(event.event_date)?'Today':isTomorrow(event.event_date)?'Tomorrow':'Upcoming';return `<article class="eventRow"><div class="eventCell"><div><div class="rowLabel">Event</div><div class="eventName">${escapeHtml(event.event_name||'Untitled Event')}</div></div></div><div class="eventCell"><div><div class="rowLabel">Area</div><div class="eventArea">${escapeHtml(event.group_name||event.group_code||'Unknown Area')}</div></div></div><div class="eventCell center"><div><div class="rowLabel">Date</div><div class="cellValue">${escapeHtml(dateLabel)}</div></div></div><div class="eventCell center"><div><div class="rowLabel">Time</div><div class="cellValue">${escapeHtml(timeLabel)}</div></div></div><div class="eventCell center"><div><div class="rowLabel">Attendees</div><div class="cellValue">${escapeHtml(attendeeLabel)}</div></div></div><div class="eventCell"><div><div class="rowLabel">Notes</div><div class="notesValue">${escapeHtml(event.notes||'No notes provided.')}</div></div></div><div class="eventCell right"><div class="eventChip">${escapeHtml(chipLabel)}</div></div></article>`;}).join('');}
    function setStatus(text,isError=false){els.statusPill.textContent=text;els.statusPill.style.background=isError?'rgba(239,68,68,.18)':'rgba(255,255,255,.06)';els.statusPill.style.color=isError?'#fecaca':'#f8fafc';}
    function formatDate(value){if(!value)return 'Unknown date';const date=new Date(`${value}T12:00:00`);return Number.isNaN(date.getTime())?String(value):date.toLocaleDateString([], { weekday:'short', month:'short', day:'numeric', year:'numeric' });}
    function formatTime(value){if(!value)return '—';const normalized=String(value).slice(0,8);const date=new Date(`2000-01-01T${normalized}`);return Number.isNaN(date.getTime())?normalized:date.toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });}
    function isToday(value){const today=new Date();const local=today.toISOString().slice(0,10);return String(value||'')===local;}
    function isTomorrow(value){const date=new Date();date.setDate(date.getDate()+1);const local=date.toISOString().slice(0,10);return String(value||'')===local;}
    function safe(error){return error?.message?String(error.message):String(error||'Unknown error');}
    function escapeHtml(value){return String(value||'').replace(/[&<>"']/g,(m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));}
  </script>
</body>
</html>
