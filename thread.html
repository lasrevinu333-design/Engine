<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Thread</title>
<style>
:root{--panel:rgba(17,24,33,.9);--panel-strong:rgba(14,20,28,.96);--line:rgba(255,255,255,.1);--text:#f7fbff;--muted:#b8c4d2;--self:#d7e3ff;--other:rgba(27,35,46,.94);--bot-top:#7fbe31;--bot-bottom:#416f1c;--zoo-green-1:#a8e146;--zoo-green-2:#6cb81f;--zoo-green-3:#4d8d18;--shadow:0 14px 32px rgba(0,0,0,.22)}
*{box-sizing:border-box}html,body{margin:0;padding:0;color:var(--text);font-family:Arial,sans-serif}body{min-height:100vh;background:linear-gradient(rgba(7,12,18,.30),rgba(7,12,18,.35)),url('./Background1_optimized.webp?v=release-2026.04.22.6') center/cover no-repeat fixed}
.app{max-width:760px;margin:0 auto;min-height:100vh;background:linear-gradient(180deg,rgba(23,28,39,.68),rgba(17,22,31,.86));display:grid;grid-template-rows:auto 1fr auto;box-shadow:0 18px 36px rgba(0,0,0,.24)}
.topbar{position:sticky;top:0;z-index:20;display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;column-gap:14px;min-height:118px;padding:calc(max(18px, env(safe-area-inset-top)) + 10px) 16px 12px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(17,24,33,.94),rgba(17,24,33,.88));backdrop-filter:blur(14px)}
.backBtn{grid-column:1;grid-row:1;justify-self:start;display:inline-flex;align-items:center;justify-content:center;min-height:56px;padding:0 22px;border:none;border-radius:999px;background:linear-gradient(180deg,var(--zoo-green-1) 0%,var(--zoo-green-2) 100%);color:#102106;font-size:1.04rem;font-weight:900;letter-spacing:.01em;cursor:pointer;box-shadow:0 12px 24px rgba(28,73,12,.24);border:1px solid rgba(255,255,255,.18)}
.backBtn:active{transform:translateY(1px)}
.threadAvatar{grid-column:3;grid-row:1;justify-self:end;width:104px;height:104px;border-radius:999px;background:rgba(255,255,255,.08);border:3px solid rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;overflow:hidden;flex:0 0 auto;font-weight:800;font-size:1.35rem;color:#fff;box-shadow:0 12px 24px rgba(0,0,0,.24)}
.threadAvatar img{width:100%;height:100%;display:block;object-fit:cover;object-position:center center}.headText{grid-column:2;grid-row:1;justify-self:center;width:min(46vw,320px);min-width:0;text-align:center;pointer-events:none;padding:0 8px}.threadTitle{font-size:2rem;font-weight:900;letter-spacing:-.02em;line-height:1.02;text-align:center;text-shadow:0 2px 12px rgba(0,0,0,.18)}.threadMeta{margin-top:5px;font-size:.98rem;color:var(--muted);text-align:center}
.messages{padding:18px 16px 112px;overflow:auto;display:grid;gap:14px;align-content:start;scroll-padding-bottom:124px}.empty{padding:24px 18px;color:var(--muted);font-size:1.05rem;border-radius:22px;background:rgba(15,21,29,.46);border:1px solid rgba(255,255,255,.06)}
.msgRow{display:flex}.msgRow.self{justify-content:flex-end}.bubble{max-width:min(84%,590px);padding:14px 16px 12px;border-radius:24px;line-height:1.45;box-shadow:0 10px 22px rgba(0,0,0,.18);font-size:1.08rem;border:1px solid rgba(255,255,255,.06)}.msgRow.self .bubble{background:linear-gradient(180deg,#dfe9ff 0%,#c4d6ff 100%);color:#0b1320;border-bottom-right-radius:8px}.msgRow.other .bubble{background:var(--other);color:var(--text);border-bottom-left-radius:8px}.msgRow.bot .bubble{background:linear-gradient(180deg,var(--bot-top) 0%,var(--bot-bottom) 100%);color:#fff;border-bottom-left-radius:8px}.msgSender{font-size:.84rem;font-weight:900;letter-spacing:.02em;opacity:.92;margin-bottom:6px}.msgFoot{margin-top:8px;font-size:.8rem;opacity:.76}
.composer{position:sticky;bottom:0;padding:14px 16px calc(16px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(16,24,33,.9),rgba(16,24,33,.98));backdrop-filter:blur(14px);border-top:1px solid var(--line)}.composeRow{display:flex;gap:12px;align-items:flex-end}.composeInput{flex:1;border:1px solid rgba(17,24,39,.16);border-radius:28px;padding:22px 20px;min-height:108px;max-height:230px;resize:none;font-size:1.1rem;line-height:1.45;background:#fff;color:#111827;box-shadow:inset 0 1px 0 rgba(255,255,255,.7)}.composeInput::placeholder{color:#64748b}.sendBtn{min-width:110px;min-height:62px;padding:0 24px;border:none;border-radius:24px;background:linear-gradient(180deg,var(--zoo-green-1) 0%,var(--zoo-green-2) 100%);color:#102106;font-weight:900;font-size:1.06rem;cursor:pointer;box-shadow:0 12px 24px rgba(28,73,12,.24);border:1px solid rgba(255,255,255,.16)}.sendBtn:active{transform:translateY(1px)}.sendBtn:disabled{opacity:.65;cursor:wait}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.58);display:flex;align-items:flex-start;justify-content:center;padding:10px 12px;z-index:1000}.modal{width:min(560px,100%);max-height:calc(100vh - 20px);overflow:hidden;display:flex;flex-direction:column;background:var(--panel-strong);border:1px solid var(--line);border-radius:22px;box-shadow:0 18px 40px rgba(0,0,0,.35);padding:14px}.modalList{display:grid;gap:6px;margin:8px 0 10px;overflow:auto;flex:1 1 auto;min-height:0;padding-right:2px}.pickerRow{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}.pickerRow input{width:20px;height:20px;margin:0;transform:none}.field{width:100%;border-radius:14px;border:1px solid var(--line);padding:12px 12px;background:#fff;color:#111827;font-size:.96rem}.personName{font-weight:800;font-size:1rem;line-height:1.1}.personRole{margin-top:2px;color:var(--muted);font-size:.86rem;line-height:1.1}.modalActions{display:flex;gap:8px;margin-top:8px;padding-top:10px;background:linear-gradient(180deg,rgba(14,20,28,0),rgba(14,20,28,.96) 34%)}.hidden{display:none!important}.status{display:none!important}
@media (max-width:640px){.topbar{min-height:108px;column-gap:12px;padding:calc(max(16px, env(safe-area-inset-top)) + 8px) 12px 10px}.backBtn{min-height:52px;padding:0 18px;font-size:.98rem}.threadAvatar{width:96px;height:96px}.headText{width:min(50vw,250px);padding:0 6px}.threadTitle{font-size:1.72rem}.messages{padding:16px 12px 108px}.bubble{max-width:88%}.composeInput{min-height:104px;font-size:1.04rem}.sendBtn{min-width:96px;min-height:58px;padding:0 20px}.modal{padding:12px}.modalList{gap:5px;margin:6px 0 8px}.pickerRow{padding:8px 9px;gap:9px}.personName{font-size:.96rem}.personRole{font-size:.82rem}.field{padding:11px 11px;font-size:.92rem}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button id="back-btn" class="backBtn" aria-label="Back to messages">Back</button>
    <div class="headText"><div id="thread-title" class="threadTitle">Conversation</div><div id="thread-meta" class="threadMeta">Loading…</div></div>
    <div id="thread-avatar" class="threadAvatar">?</div>
  </div>
  <div id="messages" class="messages"><div class="empty">Loading conversation…</div></div>
  <div class="composer"><div class="composeRow"><textarea id="compose-input" class="composeInput" placeholder="Type a message"></textarea><button id="send-btn" class="sendBtn">Send</button></div></div>
</div>
<div id="picker-overlay" class="overlay hidden"><div class="modal"><div style="font-size:.82rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Start Conversation</div><h2 style="margin:0 0 6px;font-size:1.22rem;">Choose People</h2><input id="group-title" class="field" type="text" placeholder="Group name (for 2+ people)" /><div style="margin-top:10px" class="pickerRow"><input id="select-all" type="checkbox" /><div class="personName">Select everyone</div></div><div id="picker-list" class="modalList"></div><div class="modalActions"><button id="picker-cancel" class="field" style="background:rgba(255,255,255,.08);color:#fff;border-color:var(--line);">Cancel</button><button id="picker-create" class="field" style="background:linear-gradient(180deg,var(--zoo-green-1) 0%,var(--zoo-green-2) 100%);color:#102106;border:1px solid rgba(255,255,255,.16);font-weight:900;">Create</button></div></div></div>
<div id="status-pill" class="status" aria-hidden="true"></div>
<script>
const MEMPHIS_AVATAR='./memphis_avatar_optimized.webp?v=release-2026.04.22.5';
const CONFIG={APP_VERSION:'release-2026.04.24.1',API_BASE:'https://memphis-zoo-mcp.onrender.com/messaging-api',STORAGE_USER_KEY:'mz_messenger_user_id',DEVICE_STORAGE_KEY:'mz_scan_device_id',DEV_FALLBACK_DEVICE_ID:'1e74fe4c-dc20b3b9',POLL_MS:2000,THREAD_HIDDEN_AT_PREFIX:'mz_thread_hidden_at:'};
const state={currentUserId:'',currentDeviceId:'',hubContext:'manager',threadId:'',thread:null,users:[],poller:null};
const els={backBtn:document.getElementById('back-btn'),threadAvatar:document.getElementById('thread-avatar'),threadTitle:document.getElementById('thread-title'),threadMeta:document.getElementById('thread-meta'),messages:document.getElementById('messages'),composeInput:document.getElementById('compose-input'),sendBtn:document.getElementById('send-btn'),pickerOverlay:document.getElementById('picker-overlay'),pickerList:document.getElementById('picker-list'),groupTitle:document.getElementById('group-title'),selectAll:document.getElementById('select-all'),pickerCancel:document.getElementById('picker-cancel'),pickerCreate:document.getElementById('picker-create'),statusPill:document.getElementById('status-pill')};
init().catch((error)=>setStatus(`Startup error: ${safe(error)}`));
async function init(){ const url=new URL(window.location.href); state.currentDeviceId=resolveDeviceId(url); state.currentUserId=String(url.searchParams.get('user_id')||localStorage.getItem(CONFIG.STORAGE_USER_KEY)||'').trim(); state.hubContext=resolveHubContext(url); state.threadId=String(url.searchParams.get('thread_id')||'').trim(); const mode=String(url.searchParams.get('mode')||'').trim(); bindEvents(); if(mode==='new'){ await loadUsers(); els.pickerOverlay.classList.remove('hidden'); return; } if(mode==='memphis'){ const thread=await apiPost('/memphis/thread',{user_id:state.currentUserId,device_id:state.currentDeviceId}); state.threadId=String(thread.id||'').trim(); replaceQuery({thread_id:state.threadId}); } await loadThreadMeta(); await refreshMessages(); state.poller=setInterval(()=>refreshMessages().catch(()=>{}),CONFIG.POLL_MS); }
function bindEvents(){ els.backBtn.addEventListener('click',goBackToMessages); els.sendBtn.addEventListener('click',sendMessage); els.composeInput.addEventListener('keydown',(e)=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); } }); els.pickerCancel.addEventListener('click',goBackToMessages); els.selectAll.addEventListener('change',()=>{ Array.from(els.pickerList.querySelectorAll('input[type="checkbox"]')).forEach((box)=>{ if(!box.disabled)box.checked=els.selectAll.checked; }); }); els.pickerCreate.addEventListener('click',createConversationFromPicker); }
function resolveDeviceId(url){ const explicit=String(url.searchParams.get('device')||url.searchParams.get('deviceId')||'').trim(); if(explicit){ localStorage.setItem(CONFIG.DEVICE_STORAGE_KEY,explicit); return explicit; } const stored=String(localStorage.getItem(CONFIG.DEVICE_STORAGE_KEY)||'').trim(); if(stored)return stored; if(location.hostname.includes('github.io')){ localStorage.setItem(CONFIG.DEVICE_STORAGE_KEY,CONFIG.DEV_FALLBACK_DEVICE_ID); return CONFIG.DEV_FALLBACK_DEVICE_ID; } return ''; }
function resolveHubContext(url){ const value=String(url.searchParams.get('hub')||'').trim().toLowerCase(); return value==='employee'?'employee':'manager'; }
function goBackToMessages(){ const url=new URL('./messages.html',window.location.href); if(state.currentDeviceId)url.searchParams.set('device',state.currentDeviceId); if(state.currentUserId)url.searchParams.set('user_id',state.currentUserId); url.searchParams.set('hub', state.hubContext); window.location.href=url.toString(); }
async function apiGet(path){ const response=await fetch(`${CONFIG.API_BASE}${path}`,{cache:'no-store'}); const payload=await response.json().catch(()=>null); if(!response.ok||!payload||!payload.ok)throw new Error(payload?.error||`HTTP ${response.status}`); return payload.data; }
async function apiPost(path,body){ const response=await fetch(`${CONFIG.API_BASE}${path}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})}); const payload=await response.json().catch(()=>null); if(!response.ok||!payload||!payload.ok)throw new Error(payload?.error||`HTTP ${response.status}`); return payload.data; }
async function loadUsers(){ state.users=await apiGet(`/users?user_id=${encodeURIComponent(state.currentUserId)}`); els.pickerList.innerHTML=state.users.filter((u)=>u.role!=='bot').map((user)=>`<label class="pickerRow"><input type="checkbox" value="${escapeAttr(user.id)}" /><div><div class="personName">${escapeHtml(user.display_name)}</div><div class="personRole">${escapeHtml(user.role==='manager'?'Ops Manager':'Employee')}</div></div></label>`).join(''); }
async function createConversationFromPicker(){ const checked=Array.from(els.pickerList.querySelectorAll('input[type="checkbox"]:checked')).map((x)=>String(x.value||'').trim()).filter(Boolean); if(!checked.length){ setStatus('Select at least one person.'); return; } let thread; if(checked.length===1){ thread=await apiPost('/thread/direct',{created_by_user_id:state.currentUserId,other_user_id:checked[0],device_id:state.currentDeviceId}); }else{ thread=await apiPost('/thread/group',{created_by_user_id:state.currentUserId,title:String(els.groupTitle.value||'').trim()||null,member_user_ids:checked,device_id:state.currentDeviceId}); } state.threadId=String(thread.id||'').trim(); replaceQuery({thread_id:state.threadId}); els.pickerOverlay.classList.add('hidden'); await loadThreadMeta(); await refreshMessages(); }
function replaceQuery(params){ const url=new URL(window.location.href); url.searchParams.delete('mode'); Object.entries(params).forEach(([k,v])=>{if(v)url.searchParams.set(k,v);}); if(state.currentDeviceId)url.searchParams.set('device',state.currentDeviceId); if(state.currentUserId)url.searchParams.set('user_id',state.currentUserId); url.searchParams.set('hub', state.hubContext); history.replaceState(null,'',url.toString()); }
async function loadThreadMeta(){ const qs=`/threads?user_id=${encodeURIComponent(state.currentUserId)}${state.currentDeviceId?`&device_id=${encodeURIComponent(state.currentDeviceId)}`:''}`; const threads=await apiGet(qs); const found=threads.find((t)=>String(t.thread_id||t.id||'')===state.threadId); if(!found){ els.threadTitle.textContent='Conversation'; els.threadMeta.textContent='Thread not found'; els.threadMeta.style.display='block'; return; } state.thread=normalizeThread(found); renderThreadHeader(); }
function renderThreadHeader(){ if(!state.thread)return; const isMemphis=String(state.thread.thread_type).toLowerCase()==='bot'||String(state.thread.thread_title||'').trim().toLowerCase()==='memphis'; els.threadTitle.textContent=state.thread.thread_title||'Conversation'; if(isMemphis){ els.threadMeta.textContent=''; els.threadMeta.style.display='none'; els.threadAvatar.innerHTML=`<img src="${MEMPHIS_AVATAR}" alt="Memphis" />`; }else{ els.threadMeta.textContent=labelThreadType(state.thread.thread_type); els.threadMeta.style.display='block'; const initials=String(state.thread.thread_title||'C').split(/\s+/).slice(0,2).map((x)=>x[0]||'').join('').toUpperCase(); els.threadAvatar.textContent=initials||'C'; } }
function getThreadHiddenCutoffMs(threadId){ if(!threadId) return null; const raw=localStorage.getItem(`${CONFIG.THREAD_HIDDEN_AT_PREFIX}${threadId}`); if(!raw) return null; const ms=Date.parse(raw); return Number.isFinite(ms) ? ms : null; }
async function refreshMessages(){ if(!state.threadId){ els.messages.innerHTML='<div class="empty">Choose a conversation.</div>'; return; } const rows=await apiGet(`/thread/${encodeURIComponent(state.threadId)}/messages?user_id=${encodeURIComponent(state.currentUserId)}&limit=100`); const cutoffMs=getThreadHiddenCutoffMs(state.threadId); const visibleRows=(cutoffMs==null ? rows : rows.filter((message)=>{ const sentMs=Date.parse(message.sent_at||message.created_at||message.updated_at||''); return !Number.isFinite(sentMs) || sentMs > cutoffMs; })); if(!visibleRows.length){ els.messages.innerHTML='<div class="empty">No messages yet.</div>'; return; } els.messages.innerHTML=visibleRows.map((message)=>{ const mine=String(message.sender_user_id||'')===state.currentUserId; const cls=mine?'self':message.message_type==='bot_response'?'bot':'other'; return `<div class="msgRow ${cls}"><div class="bubble"><div class="msgSender">${escapeHtml(message.sender_display_name||'Unknown')}</div><div>${escapeHtml(message.body||'')}</div><div class="msgFoot">${escapeHtml(formatLongTime(message.sent_at))}</div></div></div>`; }).join(''); els.messages.scrollTop=els.messages.scrollHeight; }
async function sendMessage(){ const body=String(els.composeInput.value||'').trim(); if(!body||!state.threadId)return; els.sendBtn.disabled=true; try{ if(String(state.thread?.thread_type||'').toLowerCase()==='bot'){ await apiPost('/memphis/message',{user_id:state.currentUserId,body,device_id:state.currentDeviceId}); }else{ await apiPost(`/thread/${encodeURIComponent(state.threadId)}/message`,{sender_user_id:state.currentUserId,body}); } els.composeInput.value=''; await loadThreadMeta(); await refreshMessages(); }finally{ els.sendBtn.disabled=false; } }
function normalizeThread(thread){ return {...thread,id:thread.id||thread.thread_id||'',thread_title:thread.thread_title||thread.title||'Untitled',thread_type:thread.thread_type||'direct'}; }
function labelThreadType(value){ const v=String(value||'').toLowerCase(); if(v==='bot')return 'Memphis'; if(v==='group')return 'Group chat'; if(v==='broadcast')return 'Broadcast'; return 'Direct chat'; }
function formatLongTime(value){ if(!value)return ''; const d=new Date(value); return Number.isNaN(d.getTime())?'':d.toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }
function setStatus(text){els.statusPill.textContent=text;} function safe(error){return error&&error.message?String(error.message):String(error||'Unknown error');} function escapeHtml(value){return String(value==null?'':value).replace(/[&<>"']/g,(m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[m]);} function escapeAttr(value){return escapeHtml(value).replace(/`/g,'&#96;');}
</script>
</body>
</html>
