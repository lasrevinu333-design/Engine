<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Thread</title>
<style>
:root{--bg:#10131b;--panel:#171c27;--line:rgba(255,255,255,.08);--text:#f5f7fb;--muted:#c8d2e2;--self:#8ea0f0;--other:#232a37;--bot:#2d6d35;--accent:#4f6edb}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}
html{font-size:19px;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{min-height:100vh}.app{max-width:760px;margin:0 auto;min-height:100vh;background:linear-gradient(180deg,#171c27,#11161f);display:grid;grid-template-rows:auto 1fr auto}
.topbar{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:16px;padding:max(40px,calc(env(safe-area-inset-top) + 30px)) 18px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(23,28,39,.985);backdrop-filter:blur(10px);z-index:20}
.backBtn{display:inline-flex;align-items:center;justify-content:center;gap:9px;min-height:56px;padding:0 20px;border-radius:999px;border:1px solid rgba(255,255,255,.22);background:linear-gradient(180deg,#e8f9d3 0%, #9fd85d 52%, #6fa72f 100%);color:#122109;font-size:1.14rem;font-weight:900;cursor:pointer;box-shadow:0 4px 0 #486c1c, 0 12px 22px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.65);text-shadow:0 1px 0 rgba(255,255,255,.3)}
.backBtn:active{transform:translateY(3px);box-shadow:0 1px 0 #486c1c, 0 6px 12px rgba(0,0,0,.26), inset 0 1px 0 rgba(255,255,255,.45)}
.headText{min-width:0;padding:0 4px 0 2px;align-self:center}
.threadTitle{font-size:1.9rem;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.02}
.threadMeta{font-size:1.18rem;color:var(--muted);margin-top:7px;font-weight:800}
.threadAvatar{width:84px;height:84px;border-radius:999px;background:#5b6475;display:flex;align-items:center;justify-content:center;overflow:hidden;flex:0 0 auto;font-weight:700;font-size:1.4rem;box-shadow:0 8px 18px rgba(0,0,0,.28);border:2px solid rgba(255,255,255,.24)}
.threadAvatar img{width:100%;height:100%;display:block;object-fit:cover;object-position:center 60%}
.messages{padding:28px 18px 128px;overflow:auto;display:grid;gap:18px;align-content:start}
.empty{padding:30px 18px;color:var(--muted);font-size:1.28rem}
.msgRow{display:flex}.msgRow.self{justify-content:flex-end}
.bubble{max-width:min(88%,620px);padding:14px 18px;border-radius:24px;line-height:1.42;box-shadow:0 8px 18px rgba(0,0,0,.18);font-size:1.3rem}
.msgRow.self .bubble{background:var(--self);color:#0b1320;border-bottom-right-radius:8px}
.msgRow.other .bubble{background:var(--other);color:var(--text);border-bottom-left-radius:8px}
.msgRow.bot .bubble{background:var(--bot);color:#fff;border-bottom-left-radius:8px}
.msgSender{font-size:1rem;font-weight:800;opacity:.95;margin-bottom:6px}
.msgFoot{margin-top:10px;font-size:.96rem;opacity:.9;font-weight:700}
.composer{position:sticky;bottom:0;padding:16px 16px calc(16px + env(safe-area-inset-bottom));background:rgba(17,22,31,.995);backdrop-filter:blur(10px);border-top:1px solid var(--line)}
.composeRow{display:flex;gap:14px;align-items:flex-end}.composeInput{flex:1;border:2px solid rgba(15,23,42,.16);border-radius:28px;padding:20px 22px;min-height:86px;max-height:210px;resize:vertical;font-size:1.32rem;font-weight:700;background:#ffffff;color:#111827;box-shadow:inset 0 2px 8px rgba(0,0,0,.08), 0 12px 22px rgba(0,0,0,.16)}.composeInput::placeholder{color:#475569;font-weight:700}.sendBtn{border:1px solid rgba(255,255,255,.26);border-radius:26px;padding:20px 28px;min-height:70px;background:linear-gradient(180deg,#d7f2ad 0%, #8ac53f 54%, #5f9622 100%);color:#11210a;font-weight:900;font-size:1.16rem;cursor:pointer;box-shadow:0 4px 0 #456d19, 0 12px 22px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.55);text-shadow:0 1px 0 rgba(255,255,255,.28)}.sendBtn:active{transform:translateY(3px);box-shadow:0 1px 0 #456d19, 0 6px 12px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.42)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:18px;z-index:1000}.modal{width:min(560px,100%);max-height:80vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:20px;box-shadow:0 18px 40px rgba(0,0,0,.35);padding:16px}.modalList{display:grid;gap:8px;margin:12px 0}.pickerRow{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}.pickerRow input{width:auto;transform:scale(1.25)}.field{width:100%;border-radius:12px;border:1px solid var(--line);padding:14px;background:#fff;color:#111827;font-size:1.08rem}.hidden{display:none!important}.status{display:none!important}
@media (max-width:640px){html{font-size:18px}.topbar{padding:max(34px,calc(env(safe-area-inset-top) + 26px)) 14px 16px;gap:12px}.backBtn{min-height:54px;padding:0 18px;font-size:1.04rem}.threadAvatar{width:78px;height:78px}.threadTitle{font-size:1.7rem}.threadMeta{font-size:1.06rem}.messages{padding:24px 14px 118px}.bubble{font-size:1.22rem}.composeInput{font-size:1.18rem;min-height:82px;padding:18px 20px}.sendBtn{padding:18px 22px;min-height:66px;font-size:1.05rem}}
</style>
</head>
<body>
<div class="app"><div class="topbar"><button id="back-btn" class="backBtn" aria-label="Back to messages">← Back</button><div class="headText"><div id="thread-title" class="threadTitle">Conversation</div><div id="thread-meta" class="threadMeta">Loading…</div></div><div id="thread-avatar" class="threadAvatar">?</div></div><div id="messages" class="messages"><div class="empty">Loading conversation…</div></div><div class="composer"><div class="composeRow"><textarea id="compose-input" class="composeInput" placeholder="Text message"></textarea><button id="send-btn" class="sendBtn">Send</button></div></div></div>
<div id="picker-overlay" class="overlay hidden"><div class="modal"><div style="font-size:1rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Start Conversation</div><h2 style="margin:0 0 8px;font-size:1.5rem;">Choose People</h2><input id="group-title" class="field" type="text" placeholder="Group name (for 2+ people)" /><div style="margin-top:8px;color:var(--muted);font-size:1.1rem;">One person makes a direct chat. Two or more makes a group conversation. Select everyone if you want to message everyone.</div><div style="margin-top:12px" class="pickerRow"><input id="select-all" type="checkbox" /><div style="font-weight:800">Select everyone</div></div><div id="picker-list" class="modalList"></div><div style="display:flex;gap:8px"><button id="picker-cancel" class="field" style="background:rgba(255,255,255,.08);color:#fff;border-color:var(--line);">Cancel</button><button id="picker-create" class="field" style="background:#4f6edb;color:#fff;border:none;">Create</button></div></div></div>
<div id="status-pill" class="status" aria-hidden="true"></div>
<script>
const MEMPHIS_AVATAR = './memphis_avatar_optimized.webp?v=release-2026.04.22.2';
const CONFIG={APP_VERSION:'release-2026.04.20.15',API_BASE:'https://memphis-zoo-mcp.onrender.com/messaging-api',STORAGE_USER_KEY:'mz_messenger_user_id',DEVICE_STORAGE_KEY:'mz_scan_device_id',DEV_FALLBACK_DEVICE_ID:'1e74fe4c-dc20b3b9',POLL_MS:2000};
const state={currentUserId:'',currentDeviceId:'',threadId:'',thread:null,users:[],poller:null};
const els={backBtn:document.getElementById('back-btn'),threadAvatar:document.getElementById('thread-avatar'),threadTitle:document.getElementById('thread-title'),threadMeta:document.getElementById('thread-meta'),messages:document.getElementById('messages'),composeInput:document.getElementById('compose-input'),sendBtn:document.getElementById('send-btn'),pickerOverlay:document.getElementById('picker-overlay'),pickerList:document.getElementById('picker-list'),groupTitle:document.getElementById('group-title'),selectAll:document.getElementById('select-all'),pickerCancel:document.getElementById('picker-cancel'),pickerCreate:document.getElementById('picker-create'),statusPill:document.getElementById('status-pill')};
init().catch((error)=>setStatus(`Startup error: ${safe(error)}`));
async function init(){const url=new URL(window.location.href);state.currentDeviceId=resolveDeviceId(url);state.currentUserId=String(url.searchParams.get('user_id')||localStorage.getItem(CONFIG.STORAGE_USER_KEY)||'').trim();state.threadId=String(url.searchParams.get('thread_id')||'').trim();const mode=String(url.searchParams.get('mode')||'').trim();bindEvents();if(mode==='new'){await loadUsers();els.pickerOverlay.classList.remove('hidden');return;}if(mode==='memphis'){const thread=await apiPost('/memphis/thread',{user_id:state.currentUserId,device_id:state.currentDeviceId});state.threadId=String(thread.id||'').trim();replaceQuery({thread_id:state.threadId});}await loadThreadMeta();await refreshMessages();state.poller=setInterval(()=>refreshMessages().catch(()=>{}),CONFIG.POLL_MS);}
function bindEvents(){els.backBtn.addEventListener('click',goBackToMessages);els.sendBtn.addEventListener('click',sendMessage);els.composeInput.addEventListener('keydown',(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});els.pickerCancel.addEventListener('click',goBackToMessages);els.selectAll.addEventListener('change',()=>{Array.from(els.pickerList.querySelectorAll('input[type="checkbox"]')).forEach((box)=>{if(!box.disabled)box.checked=els.selectAll.checked;});});els.pickerCreate.addEventListener('click',createConversationFromPicker);}
function resolveDeviceId(url){const explicit=String(url.searchParams.get('device')||url.searchParams.get('deviceId')||'').trim();if(explicit){localStorage.setItem(CONFIG.DEVICE_STORAGE_KEY,explicit);return explicit;}const stored=String(localStorage.getItem(CONFIG.DEVICE_STORAGE_KEY)||'').trim();if(stored)return stored;if(location.hostname.includes('github.io')){localStorage.setItem(CONFIG.DEVICE_STORAGE_KEY,CONFIG.DEV_FALLBACK_DEVICE_ID);return CONFIG.DEV_FALLBACK_DEVICE_ID;}return '';}
function goBackToMessages(){const url=new URL('./messages.html',window.location.href);if(state.currentDeviceId)url.searchParams.set('device',state.currentDeviceId);if(state.currentUserId)url.searchParams.set('user_id',state.currentUserId);window.location.href=url.toString();}
async function apiGet(path){const response=await fetch(`${CONFIG.API_BASE}${path}`,{cache:'no-store'});const payload=await response.json().catch(()=>null);if(!response.ok||!payload||!payload.ok)throw new Error(payload?.error||`HTTP ${response.status}`);return payload.data;}
async function apiPost(path,body){const response=await fetch(`${CONFIG.API_BASE}${path}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});const payload=await response.json().catch(()=>null);if(!response.ok||!payload||!payload.ok)throw new Error(payload?.error||`HTTP ${response.status}`);return payload.data;}
async function loadUsers(){state.users=await apiGet(`/users?user_id=${encodeURIComponent(state.currentUserId)}`);els.pickerList.innerHTML=state.users.filter((u)=>u.role!=='bot').map((user)=>`<label class="pickerRow"><input type="checkbox" value="${escapeAttr(user.id)}" /><div><div style="font-weight:800">${escapeHtml(user.display_name)}</div><div style="margin-top:2px;color:var(--muted);font-size:1rem">${escapeHtml(user.role==='manager'?'Ops Manager':'Employee')}</div></div></label>`).join('');}
async function createConversationFromPicker(){const checked=Array.from(els.pickerList.querySelectorAll('input[type="checkbox"]:checked')).map((x)=>String(x.value||'').trim()).filter(Boolean);if(!checked.length){setStatus('Select at least one person.');return;}let thread;if(checked.length===1){thread=await apiPost('/thread/direct',{created_by_user_id:state.currentUserId,other_user_id:checked[0],device_id:state.currentDeviceId});}else{thread=await apiPost('/thread/group',{created_by_user_id:state.currentUserId,title:String(els.groupTitle.value||'').trim()||null,member_user_ids:checked,device_id:state.currentDeviceId});}state.threadId=String(thread.id||'').trim();replaceQuery({thread_id:state.threadId});els.pickerOverlay.classList.add('hidden');await loadThreadMeta();await refreshMessages();}
function replaceQuery(params){const url=new URL(window.location.href);url.searchParams.delete('mode');Object.entries(params).forEach(([k,v])=>{if(v)url.searchParams.set(k,v);});if(state.currentDeviceId)url.searchParams.set('device',state.currentDeviceId);if(state.currentUserId)url.searchParams.set('user_id',state.currentUserId);history.replaceState(null,'',url.toString());}
async function loadThreadMeta(){const qs=`/threads?user_id=${encodeURIComponent(state.currentUserId)}${state.currentDeviceId?`&device_id=${encodeURIComponent(state.currentDeviceId)}`:''}`;const threads=await apiGet(qs);const found=threads.find((t)=>String(t.thread_id||t.id||'')===state.threadId);if(!found){els.threadTitle.textContent='Conversation';els.threadMeta.textContent='Thread not found';return;}state.thread=normalizeThread(found);renderThreadHeader();}
function renderThreadHeader(){if(!state.thread)return;els.threadTitle.textContent=state.thread.thread_title||'Conversation';els.threadMeta.textContent=labelThreadType(state.thread.thread_type);if(String(state.thread.thread_type).toLowerCase()==='bot'||String(state.thread.thread_title||'').trim().toLowerCase()==='memphis'){els.threadAvatar.innerHTML=`<img src="${MEMPHIS_AVATAR}" alt="Memphis" />`;}else{const initials=String(state.thread.thread_title||'C').split(/\s+/).slice(0,2).map((x)=>x[0]||'').join('').toUpperCase();els.threadAvatar.textContent=initials||'C';}}
async function refreshMessages(){if(!state.threadId){els.messages.innerHTML='<div class="empty">Choose a conversation.</div>';return;}const rows=await apiGet(`/thread/${encodeURIComponent(state.threadId)}/messages?user_id=${encodeURIComponent(state.currentUserId)}&limit=100`);if(!rows.length){els.messages.innerHTML='<div class="empty">No messages yet.</div>';return;}els.messages.innerHTML=rows.map((message)=>{const mine=String(message.sender_user_id||'')===state.currentUserId;const cls=mine?'self':message.message_type==='bot_response'?'bot':'other';return `<div class="msgRow ${cls}"><div class="bubble"><div class="msgSender">${escapeHtml(message.sender_display_name||'Unknown')}</div><div>${escapeHtml(message.body||'')}</div><div class="msgFoot">${escapeHtml(formatLongTime(message.sent_at))}</div></div></div>`;}).join('');els.messages.scrollTop=els.messages.scrollHeight;}
async function sendMessage(){const body=String(els.composeInput.value||'').trim();if(!body||!state.threadId)return;if(String(state.thread?.thread_type||'').toLowerCase()==='bot'){await apiPost('/memphis/message',{user_id:state.currentUserId,body,device_id:state.currentDeviceId});}else{await apiPost(`/thread/${encodeURIComponent(state.threadId)}/message`,{sender_user_id:state.currentUserId,body});}els.composeInput.value='';await loadThreadMeta();await refreshMessages();}
function normalizeThread(thread){return {...thread,id:thread.id||thread.thread_id||'',thread_title:thread.thread_title||thread.title||'Untitled',thread_type:thread.thread_type||'direct'};}
function labelThreadType(value){const v=String(value||'').toLowerCase();if(v==='bot')return 'Memphis';if(v==='group')return 'Group chat';if(v==='broadcast')return 'Broadcast';return 'Direct chat';}
function formatLongTime(value){if(!value)return '';const d=new Date(value);return Number.isNaN(d.getTime())?'':d.toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}
function setStatus(text){els.statusPill.textContent=text;}
function safe(error){return error&&error.message?String(error.message):String(error||'Unknown error');}
function escapeHtml(value){return String(value==null?'':value).replace(/[&<>"']/g,(m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[m]);}
function escapeAttr(value){return escapeHtml(value).replace(/`/g,'&#96;');}
</script>
</body>
</html>
