<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Custodial Hub</title>
  <style>
    :root {
      --text: #f8fafc;
      --muted: rgba(248, 250, 252, 0.82);
      --shadow: 0 10px 24px rgba(0,0,0,.28);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: #111827;
    }
    body {
      background-image: url('./dashboard-bg_optimized.webp?v=release-2026.04.20.2');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
    .page {
      min-height: 100vh;
      padding: max(22px, env(safe-area-inset-top)) 18px max(28px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 6px 0 26px;
    }
    .header img {
      width: min(360px, 92vw);
      height: auto;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 10px 24px rgba(0,0,0,.24));
    }
    .statusbar {
      width: 100%;
      max-width: 760px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 26px;
      font-size: .95rem;
      color: var(--muted);
      text-shadow: 0 2px 10px rgba(0,0,0,.3);
    }
    .apps {
      width: 100%;
      max-width: 760px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 28px 18px;
      justify-items: center;
      align-items: start;
      margin-top: 4px;
    }
    .app {
      text-decoration: none;
      color: inherit;
      display: grid;
      justify-items: center;
      gap: 10px;
      width: 100%;
      max-width: 130px;
    }
    .icon {
      width: 86px;
      height: 86px;
      border-radius: 24px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
      background: rgba(255,255,255,.14);
      backdrop-filter: blur(3px);
    }
    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .placeholder {
      font-size: 2.15rem;
      font-weight: 900;
      color: white;
      line-height: 1;
    }
    .label {
      font-size: 1.02rem;
      font-weight: 700;
      text-align: center;
      text-shadow: 0 2px 12px rgba(0,0,0,.35);
    }
    .build {
      position: fixed;
      left: 8px;
      bottom: 8px;
      z-index: 9999;
      background: rgba(0,0,0,.45);
      color: #d7e0ec;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: .72rem;
      max-width: 76vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    @media (max-width: 640px) {
      .apps { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 26px 10px; }
      .icon { width: 80px; height: 80px; border-radius: 22px; }
      .label { font-size: .98rem; }
    }
  </style>
</head>
<body>
  <div id="build-stamp" class="build">hub build</div>
  <div class="page">
    <div class="header">
      <img src="./Header.webp" alt="Memphis Zoo" />
    </div>

    <div class="statusbar">
      <div id="clock">--:--</div>
      <div>•</div>
      <div id="date">--</div>
      <div>•</div>
      <div id="identity-line">Resolving…</div>
    </div>

    <div class="apps">
      <a id="messages-link" class="app" href="./messages.html">
        <div class="icon">
          <img id="memphis-app-avatar" alt="Memphis Messenger" />
        </div>
        <div class="label">Memphis Messenger</div>
      </a>

      <div class="app">
        <div class="icon"><div class="placeholder">🗓</div></div>
        <div class="label">Scheduler</div>
      </div>

      <div class="app">
        <div class="icon"><div class="placeholder">🎟</div></div>
        <div class="label">Events</div>
      </div>
    </div>
  </div>

  <script>
    const MEMPHIS_AVATAR = './memphis_avatar_optimized.webp?v=release-2026.04.22.1';
    const CONFIG = {
      APP_VERSION: 'release-2026.04.20.16',
      VERSION_URL: 'https://memphis-zoo-mcp.onrender.com/version',
      ME_BY_DEVICE_URL: 'https://memphis-zoo-mcp.onrender.com/messaging-api/me/by-device',
      USER_KEY: 'mz_messenger_user_id',
      DEVICE_STORAGE_KEY: 'mz_scan_device_id',
      DEV_FALLBACK_DEVICE_ID: '1e74fe4c-dc20b3b9'
    };
    const state = { currentUserId:'', currentDeviceId:'' };
    const els = {
      buildStamp: document.getElementById('build-stamp'),
      clock: document.getElementById('clock'),
      date: document.getElementById('date'),
      identityLine: document.getElementById('identity-line'),
      messagesLink: document.getElementById('messages-link'),
      memphisAppAvatar: document.getElementById('memphis-app-avatar')
    };
    els.memphisAppAvatar.src = MEMPHIS_AVATAR;
    init();
    async function init(){ state.currentDeviceId = resolveDeviceId(); updateLink(); startClock(); await setBuildStamp(); await resolveIdentity(); }
    async function setBuildStamp(){ try { const response = await fetch(CONFIG.VERSION_URL,{cache:'no-store'}); const payload = await response.json().catch(()=>null); const backend = String(payload?.version||'').trim(); els.buildStamp.textContent = backend ? `${CONFIG.APP_VERSION} • ${backend}` : CONFIG.APP_VERSION; } catch { els.buildStamp.textContent = CONFIG.APP_VERSION; } }
    function startClock(){ const update = () => { const now = new Date(); els.clock.textContent = now.toLocaleTimeString([], { hour:'numeric', minute:'2-digit' }); els.date.textContent = now.toLocaleDateString([], { weekday:'short', month:'short', day:'numeric' }); }; update(); setInterval(update, 1000); }
    function resolveDeviceId(){ const url = new URL(window.location.href); const explicit = String(url.searchParams.get('device')||url.searchParams.get('deviceId')||'').trim(); if (explicit){ localStorage.setItem(CONFIG.DEVICE_STORAGE_KEY, explicit); return explicit; } const stored = String(localStorage.getItem(CONFIG.DEVICE_STORAGE_KEY)||'').trim(); if (stored) return stored; if (location.hostname.includes('github.io')) { localStorage.setItem(CONFIG.DEVICE_STORAGE_KEY, CONFIG.DEV_FALLBACK_DEVICE_ID); return CONFIG.DEV_FALLBACK_DEVICE_ID; } return ''; }
    function updateLink(){ const url = new URL('./messages.html', window.location.href); if (state.currentDeviceId) url.searchParams.set('device', state.currentDeviceId); els.messagesLink.href = url.toString(); }
    async function resolveIdentity(){ state.currentUserId = String(localStorage.getItem(CONFIG.USER_KEY)||'').trim(); if (!state.currentDeviceId) { els.identityLine.textContent = 'unresolved'; return; } try { const response = await fetch(`${CONFIG.ME_BY_DEVICE_URL}?device_id=${encodeURIComponent(state.currentDeviceId)}`, { cache:'no-store' }); const payload = await response.json().catch(()=>null); if (response.ok && payload && payload.ok && payload.data && payload.data.msg_user_id) { state.currentUserId = String(payload.data.msg_user_id||'').trim(); localStorage.setItem(CONFIG.USER_KEY, state.currentUserId); els.identityLine.textContent = `${payload.data.display_name}`; updateLink(); return; } } catch {} els.identityLine.textContent = state.currentDeviceId; }
  </script>
</body>
</html>
