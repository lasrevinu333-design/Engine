<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Custodial Hub</title>
  <style>
    :root { --text:#f8fafc; --muted:rgba(248,250,252,.92); --shadow:0 10px 24px rgba(0,0,0,.28); --panel:rgba(6,12,18,.56); --line:rgba(255,255,255,.16); --zoo-green:#84c341; }
    * { box-sizing:border-box; }
    html,body { margin:0; padding:0; width:100%; min-height:100%; font-family:Arial,sans-serif; color:var(--text); background:#111827; }
    html { font-size:19px; -webkit-text-size-adjust:100%; text-size-adjust:100%; }
    body { background-image:linear-gradient(rgba(4,10,20,.50), rgba(4,10,20,.50)), url('./dashboard-bg_optimized.webp?v=release-2026.04.22.8'); background-size:cover; background-position:center; background-repeat:no-repeat; background-attachment:fixed; }
    .page { min-height:100vh; padding:calc(max(22px, env(safe-area-inset-top)) + 14px) 18px max(108px, calc(28px + env(safe-area-inset-bottom))); display:flex; flex-direction:column; align-items:center; }
    .hubTitleWrap { width:100%; display:flex; justify-content:center; margin:14px 0 16px; }
    .hubTitle { width:min(460px,96vw); padding:14px 22px 16px; border-radius:24px; background:linear-gradient(180deg, rgba(10,18,26,.78), rgba(10,18,26,.52)); border:1px solid var(--line); box-shadow:0 14px 30px rgba(0,0,0,.30); backdrop-filter:blur(8px); text-align:center; }
    .hubTitleMain { font-size:clamp(2rem,4.8vw,2.75rem); font-weight:900; letter-spacing:-.03em; line-height:1; color:#f8fafc; text-shadow:0 2px 14px rgba(0,0,0,.34); }
    .hubTitleSub { margin-top:6px; font-size:clamp(.92rem,2.2vw,1.06rem); font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--zoo-green); }
    .statusbar { width:100%; max-width:860px; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:6px; margin-bottom:14px; padding:16px 18px; color:#f9fbff; text-shadow:0 2px 10px rgba(0,0,0,.45); background:var(--panel); border:1px solid var(--line); border-radius:28px; backdrop-filter:blur(6px); box-shadow:0 10px 24px rgba(0,0,0,.22); }
    .clockText { font-size:clamp(1.9rem,6vw,2.55rem); font-weight:900; line-height:1; letter-spacing:-.03em; }
    .dateText { font-size:clamp(1rem,3vw,1.2rem); font-weight:800; line-height:1.1; opacity:.96; }
    .attendanceCard { width:100%; max-width:520px; margin-bottom:28px; padding:14px 18px 16px; border-radius:22px; background:linear-gradient(180deg, rgba(10,18,26,.78), rgba(10,18,26,.52)); border:1px solid var(--line); box-shadow:0 12px 26px rgba(0,0,0,.24); backdrop-filter:blur(8px); text-align:center; }
    .attendanceLabel { font-size:.88rem; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--zoo-green); margin-bottom:8px; }
    .attendanceValue { font-size:clamp(2rem,6vw,3rem); font-weight:900; line-height:1; color:#f8fafc; text-shadow:0 2px 14px rgba(0,0,0,.34); }
    .attendanceMeta { margin-top:8px; font-size:.88rem; color:rgba(248,250,252,.76); }
    .apps { width:100%; max-width:860px; display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:34px 18px; justify-items:center; align-items:start; margin-top:14px; }
    .app { text-decoration:none; color:inherit; display:grid; justify-items:center; gap:12px; width:100%; max-width:150px; }
    .icon { width:104px; height:104px; border-radius:28px; overflow:hidden; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); background:rgba(255,255,255,.20); backdrop-filter:blur(4px); border:1px solid rgba(255,255,255,.14); }
    .icon img { width:100%; height:100%; object-fit:cover; display:block; }
    #memphis-app-avatar, #schedule-app-icon, #events-app-icon, #dashboard-app-icon { transform:scale(1.18); transform-origin:center; }
    .label { font-size:1.22rem; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.42); line-height:1.15; }
    .bottomLogoWrap { position:fixed; left:50%; transform:translateX(-50%); bottom:max(18px, calc(env(safe-area-inset-bottom) + 10px)); z-index:9998; width:min(110px, 26vw); pointer-events:none; opacity:.96; filter:drop-shadow(0 6px 16px rgba(0,0,0,.32)); }
    .bottomLogoWrap img { width:100%; height:auto; display:block; background:transparent; }
    .build { position:fixed; left:8px; bottom:8px; z-index:9999; background:rgba(0,0,0,.52); color:#eff5ff; padding:7px 11px; border-radius:999px; font-size:.88rem; font-weight:700; max-width:78vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; border:1px solid rgba(255,255,255,.14); }
    @media (max-width:640px) { html{font-size:18px} .page{padding:calc(max(22px, env(safe-area-inset-top)) + 14px) 18px max(108px, calc(28px + env(safe-area-inset-bottom)))} .hubTitleWrap{margin:14px 0 16px} .hubTitle{padding:13px 18px 14px; border-radius:22px} .hubTitleSub{letter-spacing:.05em} .statusbar{padding:12px 14px; border-radius:24px; gap:8px; margin-bottom:12px} .clockText{font-size:clamp(1.8rem,8vw,2.25rem)} .dateText{font-size:.98rem} .attendanceCard{margin-bottom:22px; padding:12px 14px 14px; border-radius:20px} .attendanceLabel{font-size:.82rem} .attendanceValue{font-size:clamp(1.8rem,9vw,2.6rem)} .attendanceMeta{font-size:.82rem} .apps{grid-template-columns:repeat(2,minmax(0,1fr)); gap:28px 10px; margin-top:12px} .icon{width:96px; height:96px; border-radius:24px} #memphis-app-avatar,#schedule-app-icon,#events-app-icon,#dashboard-app-icon{transform:scale(1.18)} .label{font-size:1.02rem} .bottomLogoWrap{width:min(96px,24vw)} }
  </style>
</head>
<body>
  <div id="build-stamp" class="build">hub build</div>
  <div class="page">
    <div class="hubTitleWrap"><div class="hubTitle"><div class="hubTitleMain">Custodial Hub</div><div class="hubTitleSub">Ops Managers</div></div></div>
    <div class="statusbar"><div id="clock" class="clockText">--:--</div><div id="date" class="dateText">--</div></div>
    <div class="attendanceCard"><div class="attendanceLabel">Current Attendance</div><div id="attendance-value" class="attendanceValue">--</div><div id="attendance-meta" class="attendanceMeta">Waiting for live feed…</div></div>
    <div class="apps">
      <a id="messages-link" class="app" href="./messages.html"><div class="icon"><img id="memphis-app-avatar" alt="Memphis Messenger" src="./memphis_avatar_optimized.webp?v=release-2026.04.22.2" /></div><div class="label">Memphis Messenger</div></a>
      <a id="schedule-link" class="app" href="./schedule.html"><div class="icon"><img id="schedule-app-icon" alt="Custodial Scheduler" src="./scheduler_icon_optimized.webp?v=release-2026.04.23.1" /></div><div class="label">Custodial<br>Scheduler</div></a>
      <a id="events-link" class="app" href="./events.html"><div class="icon"><img id="events-app-icon" alt="Upcoming Events" src="./Event_Icon_Optimized_Perfect.webp?v=release-2026.04.23.2" /></div><div class="label">Upcoming<br>Events</div></a>
      <a id="dashboard-link" class="app" href="./dashboard.html"><div class="icon"><img id="dashboard-app-icon" alt="Dashboard" src="./Dashboard_Avatar.webp?v=release-2026.04.24.7" /></div><div class="label">Main<br>Dashboard</div></a>
    </div>
  </div>
  <div class="bottomLogoWrap" aria-hidden="true"><img src="./Zoo_Logo.png?v=release-2026.04.23.3" alt="Memphis Zoo logo" /></div>
  <script>
    const CONFIG={APP_VERSION:'release-2026.04.24.9',VERSION_URL:'https://memphis-zoo-mcp.onrender.com/version',ATTENDANCE_URL:'https://memphis-zoo-mcp.onrender.com/dashboard-api/current-attendance',DEVICE_STORAGE_KEY:'mz_scan_device_id',DEV_FALLBACK_DEVICE_ID:'1e74fe4c-dc20b3b9'};
    const state={currentDeviceId:''};
    const els={buildStamp:document.getElementById('build-stamp'),clock:document.getElementById('clock'),date:document.getElementById('date'),messagesLink:document.getElementById('messages-link'),scheduleLink:document.getElementById('schedule-link'),eventsLink:document.getElementById('events-link'),dashboardLink:document.getElementById('dashboard-link'),attendanceValue:document.getElementById('attendance-value'),attendanceMeta:document.getElementById('attendance-meta')};
    init();
    async function init(){ state.currentDeviceId=resolveDeviceId(); updateLinks(); startClock(); await setBuildStamp(); await refreshAttendance(); setInterval(refreshAttendance,30000); }
    async function setBuildStamp(){ try{ const response=await fetch(CONFIG.VERSION_URL,{cache:'no-store'}); const payload=await response.json().catch(()=>null); const backend=String(payload?.version||'').trim(); els.buildStamp.textContent=backend?`${CONFIG.APP_VERSION} • ${backend}`:CONFIG.APP_VERSION; }catch{ els.buildStamp.textContent=CONFIG.APP_VERSION; } }
    function startClock(){ const update=()=>{ const now=new Date(); els.clock.textContent=now.toLocaleTimeString([], { hour:'numeric', minute:'2-digit' }); els.date.textContent=now.toLocaleDateString([], { weekday:'short', month:'short', day:'numeric' }); }; update(); setInterval(update,1000); }
    async function refreshAttendance(){ try{ const response=await fetch(CONFIG.ATTENDANCE_URL,{cache:'no-store'}); const payload=await response.json().catch(()=>null); if(!response.ok||!payload||!payload.ok) throw new Error((payload&&payload.error)||`HTTP ${response.status}`); const data=payload.data||{}; const value=Number.isFinite(Number(data.attendance))?Number(data.attendance).toLocaleString():'--'; els.attendanceValue.textContent=value; const stamp=new Date().toLocaleTimeString([], { hour:'numeric', minute:'2-digit' }); els.attendanceMeta.textContent=`Live now • updated ${stamp}`; }catch{ els.attendanceValue.textContent='--'; els.attendanceMeta.textContent='Attendance feed unavailable'; } }
    function resolveDeviceId(){ const url=new URL(window.location.href); const explicit=String(url.searchParams.get('device')||url.searchParams.get('deviceId')||'').trim(); if(explicit){ localStorage.setItem(CONFIG.DEVICE_STORAGE_KEY, explicit); return explicit; } const stored=String(localStorage.getItem(CONFIG.DEVICE_STORAGE_KEY)||'').trim(); if(stored) return stored; if(location.hostname.includes('github.io')){ localStorage.setItem(CONFIG.DEVICE_STORAGE_KEY, CONFIG.DEV_FALLBACK_DEVICE_ID); return CONFIG.DEV_FALLBACK_DEVICE_ID; } return ''; }
    function updateLinks(){ const messagesUrl=new URL('./messages.html', window.location.href); const scheduleUrl=new URL('./schedule.html', window.location.href); const eventsUrl=new URL('./events.html', window.location.href); const dashboardUrl=new URL('./dashboard.html', window.location.href); messagesUrl.searchParams.set('hub','manager'); eventsUrl.searchParams.set('hub','manager'); dashboardUrl.searchParams.set('hub','manager'); if(state.currentDeviceId){ messagesUrl.searchParams.set('device',state.currentDeviceId); scheduleUrl.searchParams.set('device',state.currentDeviceId); eventsUrl.searchParams.set('device',state.currentDeviceId); dashboardUrl.searchParams.set('device',state.currentDeviceId); } els.messagesLink.href=messagesUrl.toString(); els.scheduleLink.href=scheduleUrl.toString(); els.eventsLink.href=eventsUrl.toString(); els.dashboardLink.href=dashboardUrl.toString(); }
  </script>
</body>
</html>
