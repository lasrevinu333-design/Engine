<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Custodial Hub</title>
  <style>
    :root {
      --text: #f8fafc;
      --muted: rgba(248, 250, 252, 0.92);
      --shadow: 0 10px 24px rgba(0,0,0,.28);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: #111827;
    }
    html { font-size: 19px; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body {
      background-image:
        linear-gradient(rgba(4,10,20,.50), rgba(4,10,20,.50)),
        url('./dashboard-bg_optimized.webp?v=release-2026.04.22.8');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
    .page {
      min-height: 100vh;
      padding: max(22px, env(safe-area-inset-top)) 18px max(28px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .hubTitleWrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 8px 0 22px;
    }
    .hubTitle {
      width: min(460px, 96vw);
      padding: 14px 22px 16px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(10,18,26,.78), rgba(10,18,26,.52));
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 14px 30px rgba(0,0,0,.30);
      backdrop-filter: blur(8px);
      text-align: center;
    }
    .hubTitleMain {
      font-size: clamp(2rem, 4.8vw, 2.75rem);
      font-weight: 900;
      letter-spacing: -.03em;
      line-height: 1;
      color: #f8fafc;
      text-shadow: 0 2px 14px rgba(0,0,0,.34);
    }
    .hubTitleSub {
      margin-top: 6px;
      font-size: clamp(.92rem, 2.2vw, 1.06rem);
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(248,250,252,.82);
    }
    .statusbar {
      width: 100%;
      max-width: 860px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 28px;
      padding: 14px 18px;
      font-size: 1.18rem;
      font-weight: 800;
      color: #f9fbff;
      text-shadow: 0 2px 10px rgba(0,0,0,.45);
      background: rgba(6,12,18,.56);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
    }
    .statusbar .dot { opacity: .9; }
    .apps {
      width: 100%;
      max-width: 860px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 34px 18px;
      justify-items: center;
      align-items: start;
      margin-top: 8px;
    }
    .app {
      text-decoration: none;
      color: inherit;
      display: grid;
      justify-items: center;
      gap: 12px;
      width: 100%;
      max-width: 150px;
    }
    .icon {
      width: 104px;
      height: 104px;
      border-radius: 28px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
      background: rgba(255,255,255,.20);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,.14);
    }
    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #schedule-app-icon {
      transform: scale(1.18);
      transform-origin: center;
    }
    .placeholder {
      font-size: 2.45rem;
      font-weight: 900;
      color: white;
      line-height: 1;
    }
    .label {
      font-size: 1.22rem;
      font-weight: 800;
      text-align: center;
      text-shadow: 0 2px 12px rgba(0,0,0,.42);
      line-height: 1.15;
    }
    .build {
      position: fixed;
      left: 8px;
      bottom: 8px;
      z-index: 9999;
      background: rgba(0,0,0,.52);
      color: #eff5ff;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: .88rem;
      font-weight: 700;
      max-width: 78vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,.14);
    }
    @media (max-width: 640px) {
      html { font-size: 18px; }
      .hubTitleWrap { margin: 8px 0 20px; }
      .hubTitle { padding: 13px 18px 14px; border-radius: 22px; }
      .hubTitleSub { letter-spacing: .1em; }
      .apps { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 28px 10px; }
      .icon { width: 96px; height: 96px; border-radius: 24px; }
      #schedule-app-icon { transform: scale(1.18); }
      .label { font-size: 1.12rem; }
      .statusbar { font-size: 1.08rem; padding: 12px 14px; border-radius: 24px; }
    }
  </style>
</head>
<body>
  <div id="build-stamp" class="build">hub build</div>
  <div class="page">
    <div class="hubTitleWrap">
      <div class="hubTitle">
        <div class="hubTitleMain">Custodial Hub</div>
        <div class="hubTitleSub">Operations Dashboard</div>
      </div>
    </div>

    <div class="statusbar">
      <div id="clock">--:--</div>
      <div class="dot">•</div>
      <div id="date">--</div>
      <div class="dot">•</div>
      <div id="identity-line">Resolving…</div>
    </div>

    <div class="apps">
      <a id="messages-link" class="app" href="./messages.html">
        <div class="icon">
          <img id="memphis-app-avatar" alt="Memphis Messenger" src="./memphis_avatar_optimized.webp?v=release-2026.04.22.2" />
        </div>
        <div class="label">Memphis Messenger</div>
      </a>

      <div class="app">
        <div class="icon">
          <img id="schedule-app-icon" alt="My Schedule" src="./scheduler_icon_optimized.webp?v=release-2026.04.23.1" />
        </div>
        <div class="label">My Schedule</div>
      </div>

      <div class="app">
        <div class="icon">
          <img id="events-app-icon" alt="Events" src="./Event_Icon_Optimized_Perfect.webp?v=release-2026.04.23.2" />
        </div>
        <div class="label">Events</div>
      </div>
    </div>
  </div>

  <script>
    const CONFIG = {
      APP_VERSION: 'release-2026.04.20.16',
      VERSION_URL: 'https://memphis-zoo-mcp.onrender.com/version',
      ME_BY_DEVICE_URL: 'https://memphis-zoo-mcp.onrender.com/messaging-api/me/by-device',
      USER_KEY: 'mz_messenger_user_id',
      DEVICE_STORAGE_KEY: 'mz_scan_device_id',
      DEV_FALLBACK_DEVICE_ID: '1e74fe4c-dc20b3b9'
    };
    const state = { currentUserId:'', currentDeviceId:'' };
    const els = {
      buildStamp: document.getElementById('build-stamp'),
      clock: document.getElementById('clock'),
      date: document.getElementById('date'),
      identityLine: document.getElementById('identity-line'),
      messagesLink: document.getElementById('messages-link')
    };
    init();
    async function init(){ state.currentDeviceId = resolveDeviceId(); updateLink(); startClock(); await setBuildStamp(); await resolveIdentity(); }
    async function setBuildStamp(){ try { const response = await fetch(CONFIG.VERSION_URL,{cache:'no-store'}); const payload = await response.json().catch(()=>null); const backend = String(payload?.version||'').trim(); els.buildStamp.textContent = backend ? `${CONFIG.APP_VERSION} • ${backend}` : CONFIG.APP_VERSION; } catch { els.buildStamp.textContent = CONFIG.APP_VERSION; } }
    function startClock(){ const update = () => { const now = new Date(); els.clock.textContent = now.toLocaleTimeString([], { hour:'numeric', minute:'2-digit' }); els.date.textContent = now.toLocaleDateString([], { weekday:'short', month:'short', day:'numeric' }); }; update(); setInterval(update, 1000); }
    function resolveDeviceId(){ const url = new URL(window.location.href); const explicit = String(url.searchParams.get('device')||url.searchParams.get('deviceId')||'').trim(); if (explicit){ localStorage.setItem(CONFIG.DEVICE_STORAGE_KEY, explicit); return explicit; } const stored = String(localStorage.getItem(CONFIG.DEVICE_STORAGE_KEY)||'').trim(); if (stored) return stored; if (location.hostname.includes('github.io')) { localStorage.setItem(CONFIG.DEVICE_STORAGE_KEY, CONFIG.DEV_FALLBACK_DEVICE_ID); return CONFIG.DEV_FALLBACK_DEVICE_ID; } return ''; }
    function updateLink(){ const url = new URL('./messages.html', window.location.href); if (state.currentDeviceId) url.searchParams.set('device', state.currentDeviceId); els.messagesLink.href = url.toString(); }
    async function resolveIdentity(){ state.currentUserId = String(localStorage.getItem(CONFIG.USER_KEY)||'').trim(); if (!state.currentDeviceId) { els.identityLine.textContent = 'unresolved'; return; } try { const response = await fetch(`${CONFIG.ME_BY_DEVICE_URL}?device_id=${encodeURIComponent(state.currentDeviceId)}`, { cache:'no-store' }); const payload = await response.json().catch(()=>null); if (response.ok && payload && payload.ok && payload.data && payload.data.msg_user_id) { state.currentUserId = String(payload.data.msg_user_id||'').trim(); localStorage.setItem(CONFIG.USER_KEY, state.currentUserId); els.identityLine.textContent = `${payload.data.display_name} • ${state.currentDeviceId}`; updateLink(); return; } } catch {} els.identityLine.textContent = state.currentDeviceId; }
  </script>
</body>
</html>
