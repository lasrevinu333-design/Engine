<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Custodial Hub</title>
  <style>
    :root {
      --text: #f8fafc;
      --muted: rgba(248, 250, 252, 0.92);
      --shadow: 0 10px 24px rgba(0,0,0,.28);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: #111827;
    }
    html { font-size: 19px; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body {
      background-image:
        linear-gradient(rgba(4,10,20,.50), rgba(4,10,20,.50)),
        url('./dashboard-bg_optimized.webp?v=release-2026.04.22.8');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
    .page {
      min-height: 100vh;
      padding: max(22px, env(safe-area-inset-top)) 18px max(108px, calc(28px + env(safe-area-inset-bottom)));
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .hubTitleWrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 8px 0 16px;
    }
    .hubTitle {
      width: min(460px, 96vw);
      padding: 14px 22px 16px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(10,18,26,.78), rgba(10,18,26,.52));
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 14px 30px rgba(0,0,0,.30);
      backdrop-filter: blur(8px);
      text-align: center;
    }
    .hubTitleMain {
      font-size: clamp(2rem, 4.8vw, 2.75rem);
      font-weight: 900;
      letter-spacing: -.03em;
      line-height: 1;
      color: #f8fafc;
      text-shadow: 0 2px 14px rgba(0,0,0,.34);
    }
    .hubTitleSub {
      margin-top: 6px;
      font-size: clamp(.92rem, 2.2vw, 1.06rem);
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(248,250,252,.82);
    }
    .statusbar {
      width: 100%;
      max-width: 860px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 28px;
      padding: 14px 18px;
      color: #f9fbff;
      text-shadow: 0 2px 10px rgba(0,0,0,.45);
      background: rgba(6,12,18,.56);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
    }
    .clockText {
      font-size: clamp(1.8rem, 6vw, 2.45rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -.03em;
    }
    .dateText {
      font-size: clamp(1rem, 3vw, 1.26rem);
      font-weight: 800;
      line-height: 1;
      opacity: .96;
    }
    .statusbar .dot {
      font-size: 1.2rem;
      font-weight: 900;
      opacity: .9;
      line-height: 1;
    }
    .apps {
      width: 100%;
      max-width: 860px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 34px 18px;
      justify-items: center;
      align-items: start;
      margin-top: 8px;
    }
    .app {
      text-decoration: none;
      color: inherit;
      display: grid;
      justify-items: center;
      gap: 12px;
      width: 100%;
      max-width: 150px;
    }
    .icon {
      width: 104px;
      height: 104px;
      border-radius: 28px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
      background: rgba(255,255,255,.20);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,.14);
    }
    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #schedule-app-icon,
    #events-app-icon {
      transform: scale(1.18);
      transform-origin: center;
    }
    .label {
      font-size: 1.22rem;
      font-weight: 800;
      text-align: center;
      text-shadow: 0 2px 12px rgba(0,0,0,.42);
      line-height: 1.15;
    }
    .bottomLogoWrap {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: max(18px, calc(env(safe-area-inset-bottom) + 10px));
      z-index: 9998;
      width: min(110px, 26vw);
      pointer-events: none;
      opacity: .96;
      filter: drop-shadow(0 6px 16px rgba(0,0,0,.32));
    }
    .bottomLogoWrap img {
      width: 100%;
      height: auto;
      display: block;
      background: transparent;
    }
    .build {
      position: fixed;
      left: 8px;
      bottom: 8px;
      z-index: 9999;
      background: rgba(0,0,0,.52);
      color: #eff5ff;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: .88rem;
      font-weight: 700;
      max-width: 78vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,.14);
    }
  </style>
</head>
<body>
  <!-- content unchanged -->
</body>
</html>
