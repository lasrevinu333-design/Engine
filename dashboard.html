    .page {
      padding: 12px 14px 20px;
    }

    .shell {
      max-width: 1800px;
      margin: 0 auto;
      background: linear-gradient(rgba(0,0,0,0.18), rgba(0,0,0,0.18));
      border-radius: 24px;
      overflow: hidden;
    }

    .hero {
      padding: 10px 18px 0;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand img {
      width: min(460px, 100%);
      height: auto;
      display: block;
      filter: drop-shadow(0 3px 12px rgba(0,0,0,.22));
    }

    .titleWrap {
      text-align: center;
    }

    .title {
      margin: 0;
      color: var(--lime);
      font-size: clamp(2rem, 3vw, 3.4rem);
      line-height: 0.98;
      font-weight: 900;
      letter-spacing: .01em;
      text-shadow: 0 2px 8px rgba(0,0,0,.2);
    }

    .statusMeta {
      text-align: right;
      color: var(--lime);
      font-weight: 800;
      font-size: 1rem;
      line-height: 1.15;
      padding-top: 6px;
      text-shadow: 0 1px 6px rgba(0,0,0,.2);
    }

    .statusMeta .time {
      display: block;
      font-size: clamp(1.6rem, 2vw, 2.4rem);
      margin-top: 4px;
    }

    .tiles {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 16px;
      padding: 6px 100px 10px;
      align-items: end;
    }

    .tile {
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 6px;
      min-height: 138px;
    }

    .tileIconWrap {
      position: relative;
      width: 92px;
      height: 74px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tileIcon {
      width: 74px;
      height: 74px;
      object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,.35));
    }

    .tileIcon.smallBadge {
      position: absolute;
      width: 34px;
      height: 34px;
      right: 0;
      bottom: -2px;
    }

    .tileLabel {
      text-align: center;
      color: rgba(255,255,255,.92);
      font-size: 1.05rem;
      line-height: 1.2;
      min-height: 2.6em;
      text-shadow: 0 1px 6px rgba(0,0,0,.25);
    }

    .tileValue {
      font-size: clamp(2rem, 2.8vw, 3rem);
      font-weight: 900;
      line-height: 1;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,.24);
    }

    .section {
      margin-top: 6px;
      padding: 0 8px 12px;
    }

    .sectionTitle {
      text-align: center;
      color: var(--lime);
      font-weight: 900;
      font-size: clamp(1.5rem, 2vw, 2.3rem);
      text-transform: uppercase;
      text-decoration: underline;
      text-underline-offset: 6px;
      margin: 8px 0 10px;
      text-shadow: 0 1px 6px rgba(0,0,0,.18);
    }

    .tableWrap {
      background: rgba(32, 38, 44, 0.22);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(1px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead th {
      background: rgba(38, 43, 48, 0.52);
      color: var(--lime);
      font-size: 1rem;
      padding: 12px 10px;
      text-align: left;
      font-weight: 900;
      border-bottom: 1px solid rgba(255,255,255,.16);
    }

    tbody td {
      padding: 10px 10px;
      border-bottom: 1px solid rgba(255,255,255,.14);
      font-size: 0.98rem;
      color: rgba(255,255,255,.97);
      vertical-align: top;
      word-break: break-word;
    }

    tbody tr {
      background: rgba(32, 37, 44, 0.26);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .statusCell {
      font-weight: 900;
      text-transform: uppercase;
      color: white;
      text-align: left;
    }

    .status-ok { background: var(--ok); color: #141414; }
    .status-overdue { background: var(--overdue); color: white; }
    .status-not_cleaned { background: var(--not-cleaned); color: white; }
    .status-due_soon { background: var(--due-soon); color: #141414; }
    .status-in_progress { background: var(--in-progress); color: white; }

    .muted { color: var(--muted); }
    .tiny { font-size: 0.86rem; }

    .statusPill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: .82rem;
      font-weight: 800;
      background: rgba(255,255,255,.12);
    }

    .statusPill.ok { background: rgba(207,220,54,.9); color: #101010; }
    .statusPill.overdue { background: rgba(210,46,46,.92); color: white; }
    .statusPill.not_cleaned { background: rgba(95,100,105,.92); color: white; }
    .statusPill.due_soon { background: rgba(217,173,38,.92); color: #111; }
    .statusPill.in_progress { background: rgba(47,142,229,.92); color: white; }

    .ticketsHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 4px 10px;
    }

    .manageBtn {
      border: none;
      border-radius: 999px;
      background: rgba(0, 189, 220, 0.82);
      color: #0f172a;
      font-weight: 900;
      padding: 10px 18px;
      font-size: .95rem;
      box-shadow: 0 4px 12px rgba(0,0,0,.24);
      text-decoration: none;
      white-space: nowrap;
    }

    .manageBtn:hover { filter: brightness(1.04); }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 16px 16px;
      color: rgba(255,255,255,.82);
      font-size: .88rem;
    }

    .refreshBadge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(20,25,30,0.5);
      border: 1px solid rgba(255,255,255,.14);
    }

    .empty {
      padding: 18px;
      color: rgba(255,255,255,.9);
      background: rgba(20,25,30,.34);
    }

    .scrollArea {
      max-height: 370px;
      overflow: auto;
    }

    .scrollArea.tickets {
      max-height: 280px;
    }

    @media (max-width: 1280px) {
      .tiles { padding-left: 24px; padding-right: 24px; gap: 12px; }
      .topbar { grid-template-columns: 1fr; }
      .brand { justify-content: center; }
      .titleWrap { order: -1; }
      .statusMeta { text-align: center; }
    }

    @media (max-width: 960px) {
      .tiles { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .tile:last-child { grid-column: span 2; }
      thead th, tbody td { font-size: .9rem; padding: 9px 8px; }
    }

    @media (max-width: 640px) {
      html { font-size: 16px; }
      .page { padding: 8px; }
      .hero { padding-left: 8px; padding-right: 8px; }
      .tiles { grid-template-columns: 1fr; padding-left: 12px; padding-right: 12px; }
      .tile:last-child { grid-column: auto; }
      .tableWrap { border-radius: 12px; }
      table { table-layout: auto; min-width: 880px; }
      .ticketsHeader { flex-direction: column; align-items: stretch; }
      .footer { flex-direction: column; }
    }
  </style>
</head>

      }
    };

    const els = {
      tiles: document.getElementById("tiles"),
      restroomWrap: document.getElementById("restroom-wrap"),
      exhibitWrap: document.getElementById("exhibit-wrap"),
      ticketsWrap: document.getElementById("tickets-wrap"),
      refreshStatus: document.getElementById("refresh-status"),
      lastScanTime: document.getElementById("last-scan-time")
    };

    let refreshTimer = null;

    init();

    function init() {
      refreshData();
      refreshTimer = setInterval(refreshData, CONFIG.REFRESH_MS);
    }

    async function refreshData() {
      els.refreshStatus.textContent = "Refreshing dashboard…";
      try {
        const response = await fetch(CONFIG.API_URL, { method: "GET" });
        const payload = await response.json();
        if (!response.ok || !payload?.ok) {
          throw new Error(payload?.error || `HTTP ${response.status}`);
        }

        const data = payload.data || {};
        renderTiles(data);
        renderLocationTable(els.restroomWrap, Array.isArray(data.restrooms) ? data.restrooms : []);
        renderLocationTable(els.exhibitWrap, Array.isArray(data.exhibits) ? data.exhibits : []);
        renderTicketsTable(els.ticketsWrap, Array.isArray(data.open_tickets) ? data.open_tickets : []);
        renderLastScan(data);
        els.refreshStatus.textContent = `Last refresh: ${new Date().toLocaleString()}`;
      } catch (error) {
        console.error(error);
        els.refreshStatus.textContent = `Refresh failed: ${safe(error)}`;
      }
    }

    function renderTiles(data) {
      const restrooms = Array.isArray(data.restrooms) ? data.restrooms : [];
      const exhibits = Array.isArray(data.exhibits) ? data.exhibits : [];
      const tickets = Array.isArray(data.open_tickets) ? data.open_tickets : [];

      const restroomOverdue = countBy(restrooms, "overdue");
      const restroomNotCleaned = countBy(restrooms, "not_cleaned");
      const exhibitOverdue = countBy(exhibits, "overdue");
      const exhibitNotCleaned = countBy(exhibits, "not_cleaned");

      const cards = [
        tileComposite("Restrooms Overdue", restroomOverdue, CONFIG.ICONS.clock, CONFIG.ICONS.people),
        tileSingle("Restrooms Not Cleaned", restroomNotCleaned, CONFIG.ICONS.people),
        tileSingle("Open Tickets", tickets.length, CONFIG.ICONS.wrench),
        tileComposite("Exhibits Overdue", exhibitOverdue, CONFIG.ICONS.clock, CONFIG.ICONS.paw),
        tileSingle("Exhibits Not Cleaned", exhibitNotCleaned, CONFIG.ICONS.paw)
      ];

      els.tiles.innerHTML = cards.join("");
    }

    function tileSingle(label, value, icon) {
      return `
        <div class="tile">
          <div class="tileIconWrap">
            <img class="tileIcon" src="${icon}" alt="" />
          </div>
          <div class="tileLabel">${escapeHtml(label)}</div>
          <div class="tileValue">${escapeHtml(String(value))}</div>
        </div>
      `;
    }

    function tileComposite(label, value, baseIcon, badgeIcon) {
      return `
        <div class="tile">
          <div class="tileIconWrap">
            <img class="tileIcon" src="${baseIcon}" alt="" />
            <img class="tileIcon smallBadge" src="${badgeIcon}" alt="" />
          </div>
          <div class="tileLabel">${escapeHtml(label)}</div>
          <div class="tileValue">${escapeHtml(String(value))}</div>
        </div>
      `;
    }

    function renderLocationTable(target, rows) {
      if (!rows.length) {
        target.innerHTML = `<div class="empty">No rows available.</div>`;
        return;
      }

      target.innerHTML = `
        <table>
          <thead>
            <tr>
              <th style="width: 20%;">Location</th>
              <th style="width: 12%;">Status</th>
              <th style="width: 13%;">Last Cleaned</th>
              <th style="width: 11%;">Time To Clean</th>
              <th style="width: 29%;">Services Performed</th>
              <th style="width: 15%;">Employee Name</th>
            </tr>
          </thead>
          <tbody>
            ${
              rows.map((row) => {
                const statusCode = String(row.status_code || "").toLowerCase();
                return `
                  <tr>
                    <td>${escapeHtml(row.location_name || row.location_code || "—")}</td>
                    <td class="statusCell status-${escapeAttr(statusCode)}">${escapeHtml(formatStatus(row.status_code))}</td>
                    <td>${escapeHtml(row.latest_completed_at_display || "—")}</td>
                    <td>${escapeHtml(row.duration_display || "—")}</td>
                    <td>${escapeHtml(formatServices(row.services_performed))}</td>
                    <td>${escapeHtml(row.latest_employee_name || "—")}</td>
                  </tr>
                `;
              }).join("")
            }
          </tbody>
        </table>
      `;
    }

    function renderTicketsTable(target, rows) {
      if (!rows.length) {
        target.innerHTML = `<div class="empty">No open tickets.</div>`;
        return;
      }

      target.innerHTML = `
        <table>
          <thead>
            <tr>
              <th style="width: 28%;">Location</th>
              <th style="width: 20%;">Timestamp</th>
              <th style="width: 34%;">Issue</th>
              <th style="width: 18%;">Reported By</th>
            </tr>
          </thead>
          <tbody>
            ${
              rows.map((row) => `
                <tr>
                  <td>${escapeHtml(row.location_name || row.location_code || "—")}</td>
                  <td>${escapeHtml(row.date_submitted_display || row.created_at_display || "—")}</td>
                  <td>
                    <div>${escapeHtml(row.maintenance_issue || "—")}</div>
                    ${row.out_of_order ? `<div class="tiny muted">Out of order${row.fixture_identifier ? ` • ${escapeHtml(row.fixture_identifier)}` : ""}</div>` : ""}
                  </td>
                  <td>${escapeHtml(row.reported_by || "—")}</td>
                </tr>
              `).join("")}
          </tbody>
        </table>
      `;
    }

    function renderLastScan(data) {
      const all = [
        ...(Array.isArray(data.restrooms) ? data.restrooms : []),
        ...(Array.isArray(data.exhibits) ? data.exhibits : [])
      ];

      const latest = all
        .map((row) => row.latest_completed_at)
        .filter(Boolean)
        .map((value) => new Date(value))
        .filter((date) => !Number.isNaN(date.getTime()))
        .sort((a, b) => b - a)[0];

      els.lastScanTime.textContent = latest
        ? latest.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })
        : "--:--";
    }

    function countBy(rows, status) {
      return rows.filter((row) => String(row.status_code || "").toLowerCase() === status).length;
    }

    function formatServices(value) {
      if (!Array.isArray(value) || !value.length) return "—";
      return value.join(", ");
    }

    function formatStatus(value) {
      const raw = String(value || "").toLowerCase();
      if (!raw) return "—";
      if (raw === "not_cleaned") return "NOT CLEANED";
      if (raw === "due_soon") return "DUE SOON";
      if (raw === "in_progress") return "IN PROGRESS";
      return raw.replace(/_/g, " ").toUpperCase();
    }

    function safe(error) {
      return error?.message ? String(error.message) : String(error || "Unknown error");
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[m]);
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }
  </script>
