<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/><title>Memphis Zoo Custodial Dashboard</title><style>
:root{--lime:#8ac53f;--lime-strong:#9bd84b;--text:#f7fbff;--muted:rgba(235,243,248,.72);--line:rgba(255,255,255,.11);--line-strong:rgba(255,255,255,.18);--panel:rgba(7,13,18,.58);--panel-strong:rgba(8,12,16,.74);--panel-soft:rgba(8,12,16,.44);--shadow:0 18px 42px rgba(0,0,0,.34);--ok:#22c55e;--overdue:#d22e2e;--not-cleaned:#111;--due-soon:#facc15;--in-progress:#2f8ee5;--radius:24px}
*{box-sizing:border-box}html{font-size:18px;-webkit-text-size-adjust:100%;text-size-adjust:100%}body{margin:0;min-height:100vh;font-family:Arial,sans-serif;color:var(--text);background:linear-gradient(rgba(6,10,14,.34),rgba(6,10,14,.56)),url('./dashboard-bg.png') center/cover no-repeat fixed}.page{padding:18px}.shell{max-width:1820px;margin:0 auto;background:linear-gradient(180deg,rgba(9,14,19,.42),rgba(9,14,19,.24));border:1px solid var(--line);backdrop-filter:blur(10px);border-radius:28px;overflow:hidden;box-shadow:var(--shadow)}
.hero{padding:18px 20px 8px}.topbar{display:grid;grid-template-columns:minmax(260px,380px) minmax(520px,1fr) minmax(180px,260px);gap:28px;align-items:center;max-width:1640px;margin:0 auto}.brand{display:flex;align-items:center;justify-content:center;justify-self:center;width:100%;gap:16px;padding:12px 14px;border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid var(--line);box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}.brand img{width:min(340px,100%);max-width:100%;height:auto;display:block;object-fit:contain;object-position:center;filter:drop-shadow(0 6px 16px rgba(0,0,0,.22))}.titleWrap{text-align:center}.kicker{display:inline-block;padding:6px 12px;border-radius:999px;border:1px solid rgba(151,210,71,.24);background:rgba(151,210,71,.08);color:#d6efb2;font-size:.78rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase}.title{margin:10px 0 0;color:#f4fbff;font-size:clamp(2rem,3.2vw,3.6rem);line-height:.96;font-weight:900;letter-spacing:.01em;text-shadow:0 4px 16px rgba(0,0,0,.22)}.title .accent{color:var(--lime)}.statusMeta{min-width:170px;justify-self:center;width:100%;padding:14px 16px;border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.04));border:1px solid var(--line);text-align:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}.metaLabel{font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:800}.statusMeta .time{display:block;margin-top:6px;color:var(--lime);font-size:clamp(1.55rem,2vw,2.45rem);font-weight:900;line-height:1}
.tiles{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:14px;padding:10px 6px 18px}.tile{padding:16px 16px 14px;border-radius:22px;background:linear-gradient(180deg,rgba(10,17,23,.88),rgba(10,16,22,.68));border:1px solid var(--line);box-shadow:var(--shadow);display:grid;gap:8px;align-content:start;min-height:142px;position:relative;overflow:hidden}.tile:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.06),transparent 34%);pointer-events:none}.tileGlyph{font-size:2.55rem;line-height:1;filter:drop-shadow(0 6px 16px rgba(0,0,0,.35))}.tileGlyph.composite{position:relative;height:42px}.tileGlyph.composite span{font-size:2.55rem}.tileGlyph.composite small{position:absolute;right:-8px;bottom:-8px;font-size:1.25rem}.tileLabel{text-align:center;color:rgba(255,255,255,.92);font-size:1.05rem;line-height:1.2;min-height:2.6em;text-shadow:0 1px 6px rgba(0,0,0,.25)}.tileValue{font-size:clamp(2rem,2.9vw,3.05rem);line-height:1;font-weight:900;color:#fff}
.section{padding:0 12px 14px}.sectionCard{border-radius:24px;overflow:hidden;background:linear-gradient(180deg,rgba(10,16,22,.72),rgba(10,16,22,.54));border:1px solid var(--line);box-shadow:var(--shadow)}.sectionHeader{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border-bottom:1px solid var(--line)}.sectionTitle{margin:0;color:#f4fbff;font-size:clamp(1.2rem,1.8vw,1.75rem);font-weight:900;letter-spacing:.02em}.sectionSub{margin-top:3px;color:var(--muted);font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;font-weight:800}
.tableWrap{padding:0 8px 8px}table{width:100%;border-collapse:collapse;table-layout:fixed}thead th{padding:13px 12px 12px;color:#d5f1ac;font-size:.84rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;text-align:left;background:rgba(255,255,255,.03);border-bottom:1px solid var(--line-strong)}tbody td{padding:13px 12px;border-bottom:1px solid rgba(255,255,255,.08);font-size:.97rem;color:#f7fbff;vertical-align:top;word-break:break-word}tbody tr{background:rgba(255,255,255,.015)}tbody tr:nth-child(even){background:rgba(255,255,255,.028)}tbody tr:hover{background:rgba(151,210,71,.06)}
.statusChip{display:inline-flex;align-items:center;gap:8px;min-height:34px;padding:6px 10px;border-radius:999px;font-size:.78rem;font-weight:900;letter-spacing:.05em;border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}.statusDot{width:12px;height:12px;border-radius:999px;display:inline-block;box-shadow:0 0 0 2px rgba(255,255,255,.06)}.status-okay,.status-ok{background:rgba(34,197,94,.18);color:#d5ffe4}.status-okay .statusDot,.status-ok .statusDot{background:#4cff7a}.status-overdue{background:rgba(210,46,46,.24);color:#ffe1e1}.status-overdue .statusDot{background:#ff3d3d}.status-not_cleaned{background:rgba(17,17,17,.85);color:#fff}.status-not_cleaned .statusDot{background:#666}.status-due_soon{background:rgba(250,204,21,.22);color:#fff3bc}.status-due_soon .statusDot{background:#ffd93a}.status-in_progress,.status-cleaning_in_progress{background:rgba(47,142,229,.24);color:#d7ebff}.status-in_progress .statusDot,.status-cleaning_in_progress .statusDot{background:#4db2ff}
.timestampCell{font-size:.88rem;line-height:1.1;white-space:nowrap}.employeeInProgress{color:#bce0ff;font-weight:800}.tiny{font-size:.84rem}.muted{color:var(--muted)}.closeBtn{border:none;border-radius:999px;background:linear-gradient(180deg,#ff6a6a,#d62d2d);color:#fff;font-weight:900;padding:8px 14px;font-size:.82rem;line-height:1;box-shadow:0 6px 14px rgba(0,0,0,.22);cursor:pointer;white-space:nowrap}.closeBtn:hover{filter:brightness(1.04)}.closeBtn:disabled{opacity:.6;cursor:wait}.footer{display:flex;justify-content:space-between;gap:12px;padding:8px 16px 18px}.refreshBadge{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:rgba(10,16,22,.6);border:1px solid var(--line);font-size:.84rem;color:var(--muted)}.empty{padding:18px;color:#fff;background:rgba(20,25,30,.34)}
.scrollArea{max-height:370px;overflow:auto}.scrollArea.tickets{max-height:300px}::-webkit-scrollbar{height:10px;width:10px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:999px}::-webkit-scrollbar-track{background:transparent}
@media (max-width:1280px){.topbar{grid-template-columns:1fr;justify-items:center;max-width:none}.brand{width:100%;max-width:420px;justify-content:center}.statusMeta{text-align:center;max-width:260px}.tiles{grid-template-columns:repeat(3,minmax(0,1fr))}}@media (max-width:900px){.tiles{grid-template-columns:repeat(2,minmax(0,1fr))}}@media (max-width:640px){html{font-size:16px}.page{padding:8px}.hero{padding:12px 12px 4px}.tiles{grid-template-columns:1fr;padding-left:0;padding-right:0}.tableWrap{border-radius:12px}table{table-layout:auto;min-width:980px}.footer{flex-direction:column}}
</style></head><body><div class="page"><div class="shell"><section class="hero"><div class="topbar"><div class="brand"><img alt="Memphis Zoo logo" src="./Header.webp"/></div><div class="titleWrap"><span class="kicker">Operations Dashboard</span><h1 class="title"><span class="accent">Custodial</span> Tracking System</h1></div><div class="statusMeta"><div class="metaLabel">Last Scan</div><span class="time" id="last-scan-time">--:--</span></div></div><div class="tiles" id="tiles"></div></section><section class="section"><div class="sectionCard"><div class="sectionHeader"><div><h2 class="sectionTitle">Restroom Status Report</h2><div class="sectionSub">Live operational state</div></div></div><div class="tableWrap"><div class="scrollArea" id="restroom-wrap"></div></div></div></section><section class="section"><div class="sectionCard"><div class="sectionHeader"><div><h2 class="sectionTitle">Exhibit Status Report</h2><div class="sectionSub">Live operational state</div></div></div><div class="tableWrap"><div class="scrollArea" id="exhibit-wrap"></div></div></div></section><section class="section"><div class="sectionCard"><div class="sectionHeader"><div><h2 class="sectionTitle">Open Tickets</h2><div class="sectionSub">Maintenance items awaiting resolution</div></div></div><div class="tableWrap"><div class="scrollArea tickets" id="tickets-wrap"></div></div></div></section><div class="footer"><div class="refreshBadge">Dashboard refreshes automatically every 30 seconds.</div><div class="refreshBadge" id="refresh-status">Waiting for first refresh…</div></div></div></div><script>
const CONFIG={API_URL:"https://memphis-zoo-mcp.onrender.com/dashboard-api/summary",SCAN_RPC_URL:"https://memphis-zoo-mcp.onrender.com/scan-api/rpc",CLOSE_TICKET_URL:"https://memphis-zoo-mcp.onrender.com/dashboard-api/close-ticket",REFRESH_MS:30000,ICONS:{people:"🚻",paw:"🐾",clock:"🕒",wrench:"🔧",attendance:"🎟️"}};
const els={tiles:document.getElementById("tiles"),restroomWrap:document.getElementById("restroom-wrap"),exhibitWrap:document.getElementById("exhibit-wrap"),ticketsWrap:document.getElementById("tickets-wrap"),refreshStatus:document.getElementById("refresh-status"),lastScanTime:document.getElementById("last-scan-time")};
init();function init(){refreshData();setInterval(refreshData,CONFIG.REFRESH_MS)}
async function refreshData(){els.refreshStatus.textContent="Refreshing dashboard…";try{const response=await fetch(CONFIG.API_URL,{method:"GET"});const payload=await response.json();if(!response.ok||!payload||!payload.ok)throw new Error(payload&&payload.error||`HTTP ${response.status}`);let restrooms=sortRows(Array.isArray(payload.data?.restrooms)?payload.data.restrooms:[]);let exhibits=sortRows(Array.isArray(payload.data?.exhibits)?payload.data.exhibits:[]);const tickets=Array.isArray(payload.data?.open_tickets)?payload.data.open_tickets:[];const attendance=payload.data?.attendance||null;restrooms=await enrichActiveRows(restrooms);exhibits=await enrichActiveRows(exhibits);renderTiles({restrooms,exhibits,open_tickets:tickets,attendance});renderLocationTable(els.restroomWrap,restrooms);renderLocationTable(els.exhibitWrap,exhibits);renderTicketsTable(els.ticketsWrap,tickets);wireCloseButtons();renderLastScan({restrooms,exhibits});els.refreshStatus.textContent=`Last refresh: ${new Date().toLocaleString()}`}catch(error){console.error(error);els.refreshStatus.textContent=`Refresh failed: ${safe(error)}`}}
async function enrichActiveRows(rows){const copy=[...rows];await Promise.all(copy.map(async row=>{const status=normalizeStatus(row);if(status!=="in_progress")return;try{const state=await fetchScanState(row.location_code);if(state&&(state.latest_session_status==="active"||state.suggested_action==="finish_session"||state.suggested_action==="blocked_location_active")){row.latest_employee_name=state.latest_employee_name||row.latest_employee_name;row.latest_completed_at_display="—";row.duration_display=runningDurationDisplay(state.started_at)||row.duration_display||"—";row.services_performed=[]}}catch(err){console.warn("active row enrich failed",err)}}));return copy}
async function fetchScanState(locationCode){const response=await fetch(CONFIG.SCAN_RPC_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({fn:"tool_get_location_scan_state",args:{p_location_code:locationCode,p_device_id:"dashboard-display"}})});const payload=await response.json().catch(()=>null);if(!response.ok||!payload||!payload.ok)throw new Error(payload&&payload.error||`HTTP ${response.status}`);return payload.data}
async function closeTicket(ticketId,button){if(!ticketId)return;const row=button.closest('tr');button.disabled=true;button.textContent='Closing…';try{const response=await fetch(CONFIG.CLOSE_TICKET_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ticket_id:ticketId})});const payload=await response.json().catch(()=>null);if(!response.ok||!payload||!payload.ok)throw new Error(payload&&payload.error||`HTTP ${response.status}`);if(row)row.remove();const remaining=els.ticketsWrap.querySelectorAll('tbody tr').length;if(!remaining)els.ticketsWrap.innerHTML='<div class="empty">No open tickets.</div>';setTimeout(()=>refreshData(),250)}catch(error){console.error(error);button.disabled=false;button.textContent='Close';els.refreshStatus.textContent=`Close failed: ${safe(error)}`}}
function wireCloseButtons(){els.ticketsWrap.querySelectorAll('.closeBtn').forEach((btn)=>{btn.addEventListener('click',()=>closeTicket(btn.dataset.ticketId,btn),{once:true})})}
function runningDurationDisplay(startedAt){if(!startedAt)return"—";const ms=Date.now()-new Date(startedAt).getTime();if(!Number.isFinite(ms)||ms<0)return"—";return`${Math.max(0,Math.round(ms/60000))} min`}
function normalizeStatus(row){const code=String(row.status_code||"").toLowerCase();const color=String(row.status_color||"").toLowerCase();if(code==="cleaning_in_progress")return"in_progress";if(code)return code;if(color==="red")return"overdue";if(color==="yellow")return"due_soon";if(color==="blue")return"in_progress";if(color==="green")return"okay";if(color==="black")return"not_cleaned";return"not_cleaned"}
function statusRank(row){const status=normalizeStatus(row);if(status==="overdue")return 1;if(status==="due_soon")return 2;if(status==="in_progress")return 3;if(status==="okay"||status==="ok")return 4;if(status==="not_cleaned")return 5;return 9}
function sortRows(rows){return[...rows].sort((a,b)=>{const rankDiff=statusRank(a)-statusRank(b);if(rankDiff!==0)return rankDiff;const ticketsDiff=Number(b.open_ticket_count||0)-Number(a.open_ticket_count||0);if(ticketsDiff!==0)return ticketsDiff;return String(a.location_name||a.location_code||"").localeCompare(String(b.location_name||b.location_code||""))})}
function renderTiles(data){const restrooms=Array.isArray(data.restrooms)?data.restrooms:[];const exhibits=Array.isArray(data.exhibits)?data.exhibits:[];const tickets=Array.isArray(data.open_tickets)?data.open_tickets:[];const attendanceValue=(data.attendance&&data.attendance.ok)?(data.attendance.display||String(data.attendance.value)):"--";const restroomOverdue=countBy(restrooms,"overdue");const restroomNotCleaned=countBy(restrooms,"not_cleaned");const exhibitOverdue=countBy(exhibits,"overdue");const exhibitNotCleaned=countBy(exhibits,"not_cleaned");els.tiles.innerHTML=[tileSingle("Current Attendance",attendanceValue,CONFIG.ICONS.attendance),tileComposite("Restrooms Overdue",restroomOverdue,CONFIG.ICONS.clock,CONFIG.ICONS.people),tileSingle("Restrooms Not Cleaned",restroomNotCleaned,CONFIG.ICONS.people),tileSingle("Open Tickets",tickets.length,CONFIG.ICONS.wrench),tileComposite("Exhibits Overdue",exhibitOverdue,CONFIG.ICONS.clock,CONFIG.ICONS.paw),tileSingle("Exhibits Not Cleaned",exhibitNotCleaned,CONFIG.ICONS.paw)].join("")}
function tileSingle(label,value,icon){return`<div class="tile"><div class="tileGlyph">${icon}</div><div class="tileLabel">${escapeHtml(label)}</div><div class="tileValue">${escapeHtml(String(value))}</div></div>`}
function tileComposite(label,value,baseIcon,badgeIcon){return`<div class="tile"><div class="tileGlyph composite"><span>${baseIcon}</span><small>${badgeIcon}</small></div><div class="tileLabel">${escapeHtml(label)}</div><div class="tileValue">${escapeHtml(String(value))}</div></div>`}
function cleanDisplay(value){return String(value==null?"":value).replace(/\s+Central$/i,"").trim()}
function renderLocationTable(target,rows){if(!rows.length){target.innerHTML=`<div class="empty">No rows available.</div>`;return}target.innerHTML=`<table><thead><tr><th style="width:20%;">Location</th><th style="width:12%;">Status</th><th style="width:13%;">Time</th><th style="width:11%;">Time To Clean</th><th style="width:29%;">Services Performed</th><th style="width:15%;">Employee Name</th></tr></thead><tbody>${rows.map(row=>{const statusCode=normalizeStatus(row);const employeeMarkup=statusCode==="in_progress"?`<span class="employeeInProgress">${escapeHtml(row.latest_employee_name||"Cleaning In Progress")}</span>`:escapeHtml(row.latest_employee_name||"—");return`<tr><td>${escapeHtml(row.location_name||row.location_code||"—")}</td><td><span class="statusChip status-${escapeAttr(statusCode)}"><span class="statusDot"></span>${escapeHtml(formatStatus(statusCode))}</span></td><td class="timestampCell">${escapeHtml(cleanDisplay(row.latest_completed_at_display)||"—")}</td><td>${escapeHtml(row.duration_display||"—")}</td><td>${escapeHtml(formatServices(row.services_performed))}</td><td>${employeeMarkup}</td></tr>`}).join("")}</tbody></table>`}
function renderTicketsTable(target,rows){if(!rows.length){target.innerHTML=`<div class="empty">No open tickets.</div>`;return}target.innerHTML=`<table><thead><tr><th style="width:24%;">Location</th><th style="width:18%;">Timestamp</th><th style="width:34%;">Issue</th><th style="width:14%;">Reported By</th><th style="width:10%;">Action</th></tr></thead><tbody>${rows.map(row=>`<tr><td>${escapeHtml(row.location_name||row.location_code||"—")}</td><td class="timestampCell">${escapeHtml(cleanDisplay(row.date_submitted_display||row.created_at_display)||"—")}</td><td><div>${escapeHtml(row.maintenance_issue||"—")}</div>${row.out_of_order?`<div class="tiny muted">Out of order${row.fixture_identifier?` • ${escapeHtml(row.fixture_identifier)}`:""}</div>`:""}</td><td>${escapeHtml(row.reported_by||"—")}</td><td><button class="closeBtn" data-ticket-id="${escapeAttr(row.ticket_id||'')}">Close</button></td></tr>`).join("")}</tbody></table>`}
function renderLastScan(data){const all=[];if(Array.isArray(data.restrooms))all.push(...data.restrooms);if(Array.isArray(data.exhibits))all.push(...data.exhibits);const latest=all.map(row=>row.latest_completed_at).filter(Boolean).map(value=>new Date(value)).filter(date=>!Number.isNaN(date.getTime())).sort((a,b)=>b-a)[0];els.lastScanTime.textContent=latest?latest.toLocaleTimeString([],{hour:"numeric",minute:"2-digit"}):"--:--"}
function countBy(rows,status){return rows.filter(row=>normalizeStatus(row)===status).length}
function formatServices(value){if(!Array.isArray(value)||!value.length)return"—";return value.join(", ")}
function formatStatus(value){const raw=String(value||"").toLowerCase();if(!raw)return"—";if(raw==="not_cleaned")return"NOT CLEANED";if(raw==="due_soon")return"DUE SOON";if(raw==="in_progress"||raw==="cleaning_in_progress")return"CLEANING IN PROGRESS";if(raw==="okay"||raw==="ok")return"OKAY";return raw.replace(/_/g," ").toUpperCase()}
function safe(error){return error&&error.message?String(error.message):String(error||"Unknown error")}
function escapeHtml(value){return String(value==null?"":value).replace(/[&<>"']/g,function(m){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]})}
function escapeAttr(value){return escapeHtml(value).replace(/`/g,"&#96;")}
</script></body></html>
