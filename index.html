<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Memphis Zoo Custodial Scan</title>
  <style>
    :root{--panel:rgba(15,23,42,.84);--panel-2:rgba(15,23,42,.90);--text:#f8fafc;--muted:#d7e0ec;--lime:#9be11f;--cyan:#59cfff;--amber:#ffbb33;--danger:#ffb4b4;--pill:#0f766e;--card-radius:24px;}
    *{box-sizing:border-box;}
    html{font-size:20px;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
    html,body{margin:0;padding:0;width:100%;height:100%;color:var(--text);font-family:Arial,sans-serif;background:#111827;}
    body{background-image:linear-gradient(rgba(4,10,20,.58),rgba(4,10,20,.58)),var(--bg-image, none);background-size:cover;background-position:center;background-repeat:no-repeat;background-attachment:scroll;}
    .shell{min-height:100vh;display:flex;align-items:flex-end;justify-content:center;padding:20px 20px max(24px, env(safe-area-inset-bottom));}
    .card{width:min(96vw,760px);background:var(--panel);border-radius:var(--card-radius);padding:32px 24px 24px;box-shadow:0 16px 36px rgba(0,0,0,.42);text-align:center;border:1px solid rgba(255,255,255,.10);}
    .eyebrow{color:var(--muted);font-size:1rem;letter-spacing:.10em;text-transform:uppercase;margin-bottom:12px;font-weight:800;}
    .title-green,.title-blue,.title-amber,.title-red{margin:0 0 12px 0;font-size:2.2rem;line-height:1.08;font-weight:900;}
    .title-green{color:var(--lime);} .title-blue{color:var(--cyan);} .title-amber{color:var(--amber);} .title-red{color:var(--danger);}
    .location{font-size:2rem;line-height:1.08;font-weight:900;margin:12px 0 18px;text-shadow:0 2px 8px rgba(0,0,0,.25);}
    .helper{color:var(--muted);margin-bottom:18px;font-size:1.1rem;line-height:1.35;}
    .helperLarge{font-size:1.2rem;}
    .employeeLine{font-size:1.3rem;color:#eef6ff;margin-bottom:28px;font-weight:700;}
    .timer{font-size:3.2rem;font-weight:900;text-align:center;color:var(--cyan);margin:24px 0 14px;line-height:1;text-shadow:0 2px 10px rgba(0,0,0,.2);}
    .notice{white-space:pre-wrap;color:#ffe296;margin:16px 0 20px;font-size:1.05rem;line-height:1.35;}
    .status{margin-top:18px;white-space:pre-wrap;font-size:1.2rem;line-height:1.4;color:#cce7ff;}
    .error{color:var(--danger);}
    .small{margin-top:16px;color:#c4d1df;font-size:.95rem;word-break:break-word;line-height:1.35;}
    .infoBox{background:var(--panel-2);border-radius:18px;padding:20px;margin:22px 0;text-align:left;}
    .infoRow{margin-bottom:12px;font-size:1.2rem;line-height:1.35;color:#e7eff8;}
    .infoRow:last-child{margin-bottom:0;}
    .metric{font-size:2rem;font-weight:900;color:var(--amber);margin-top:10px;line-height:1.1;}
    .pill{display:inline-block;margin-top:14px;padding:16px 28px;border-radius:999px;background:var(--pill);color:white;font-size:1.15rem;font-weight:900;}
    .syncBadge{position:fixed;top:max(8px, env(safe-area-inset-top));right:8px;z-index:9999;background:rgba(0,0,0,.65);color:#fff;padding:8px 12px;border-radius:999px;font-size:.85rem;border:1px solid rgba(255,255,255,.1);}
    label{display:block;margin:12px 0 8px;color:#eef2f7;text-align:left;font-size:1.05rem;font-weight:800;}
    select,input,textarea,button{width:100%;padding:18px 16px;margin-top:12px;font-size:1.05rem;border:none;border-radius:14px;}
    select,input,textarea{background:#fff;color:#111827;}
    textarea{min-height:110px;resize:vertical;}
    button{cursor:pointer;font-weight:900;}
    .startBtn{background:var(--lime);color:#111827;}
    .continueBtn{background:var(--amber);color:#111827;font-size:1.35rem;padding:22px;border-radius:18px;}
    .submitBtn{background:var(--cyan);color:#111827;}
    .continueBtnLink{text-decoration:none;display:block;}
    .checkboxRow{display:flex;align-items:center;gap:12px;text-align:left;margin-top:12px;padding:14px 16px;background:rgba(255,255,255,.06);border-radius:14px;}
    .checkboxRow input{width:24px;height:24px;margin:0;}
    @media (max-width:640px){
      html{font-size:22px;}
      .shell{padding:12px 12px max(14px, env(safe-area-inset-bottom));}
      .card{width:96vw;padding:28px 18px 20px;border-radius:20px;}
      .title-green,.title-blue,.title-amber,.title-red{font-size:2.1rem;}
      .location{font-size:1.85rem;}
      .timer{font-size:3rem;}
      .continueBtn{font-size:1.35rem;padding:22px;}
    }
  </style>
</head>
<body>
  <div id="sync-badge" class="syncBadge">Starting…</div>
  <div id="app"></div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const CONFIG = {
      APP_NAME: "Memphis Zoo Custodial Scan",
      SUPABASE_URL: "https://rqquvtjdmugpigbndmne.supabase.co",
      SUPABASE_ANON_KEY: "sb_publishable_EZSL5DFTDzXA-IrVC09lTQ_yGTLgQrU",
      DEFAULT_BACKGROUND_IMAGE_URL: "https://raw.githubusercontent.com/lasrevinu333-design/Scan_Background1/main/memphis_lock_720x1604_compressed.jpg",
      DEVICE_STORAGE_KEY: "mz_scan_device_id",
      QUEUE_DB_NAME: "mz_scan_queue",
      QUEUE_STORE_NAME: "actions",
      SYNC_INTERVAL_MS: 30000
    };

    const appEl = document.getElementById("app");
    const syncBadge = document.getElementById("sync-badge");
    const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY, {
      auth: { persistSession: false, autoRefreshToken: false }
    });

    let queueDb = null;
    let syncTimer = null;

    start().catch((err) => {
      console.error(err);
      renderMessageCard("title-red", "Startup Error", "", safeError(err));
    });

    async function start() {
      queueDb = await openQueueDb();
      setupConnectivityListeners();
      await bootstrap();
      startSyncLoop();
    }

    async function bootstrap() {
      renderLoadingCard("Loading Device", "Checking kiosk identity and scan state...");

      const params = new URLSearchParams(window.location.search);
      const locationCode = decodeParam(params.get("code") || params.get("location") || params.get("loc") || "");
      const sessionUuid = decodeParam(params.get("session_uuid") || "");
      const action = decodeParam(params.get("action") || "").toLowerCase();

      if (!locationCode && !sessionUuid && action !== "complete") {
        renderMessageCard("title-red", "Missing Location", "", "No location code was found in the scan URL.");
        updateSyncBadge();
        return;
      }

      const deviceId = await ensureDeviceIdInUrl();

      try {
        await pingDevice(deviceId, "App bootstrap");
      } catch {}

      const settings = await getSystemSettingsSafe();
      applyBackground(settings?.background_image_url || CONFIG.DEFAULT_BACKGROUND_IMAGE_URL);

      if (settings?.system_enabled === false) {
        renderMessageCard("title-red", "System Disabled", "", "The scan system is temporarily disabled.");
        updateSyncBadge();
        return;
      }

      if (action === "complete" && sessionUuid) {
        await renderCompletionForm({ sessionUuid, locationCode, deviceId });
        updateSyncBadge();
        return;
      }

      const state = await getScanStateSafe(locationCode, deviceId);

      if (!state) {
        renderMessageCard("title-red", "Scan Error", "", "No scan state was returned from the backend.");
        updateSyncBadge();
        return;
      }

      await recordScanEventMaybeQueued(
        locationCode,
        deviceId,
        "scan_received",
        "ok",
        "Bootstrap scan state loaded",
        { suggested_action: state.suggested_action }
      );

      switch (state.suggested_action) {
        case "unauthorized_device":
          renderMessageCard(
            "title-red",
            "Unauthorized Device",
            state.location_name || state.location_code || "",
            `This phone is not approved.\n\nDetected device: ${deviceId}`
          );
          break;

        case "invalid_location":
          renderMessageCard("title-red", "Invalid Location", locationCode, "This scan code does not exist in the system.");
          break;

        case "start_session":
          await renderEmployeeSelect(state, deviceId);
          break;

        case "finish_session": {
          const finished = await finishSessionMaybeQueued(locationCode, deviceId);
          await recordScanEventMaybeQueued(
            locationCode,
            deviceId,
            "scan_finish",
            "ok",
            "Session moved to pending submit",
            finished || {}
          );
          renderCompletePage(finished, locationCode, deviceId);
          break;
        }

        case "resume_pending_submit":
          renderCompletePage(
            {
              session_uuid: state.latest_session_uuid,
              location_name: state.location_name,
              employee_name: state.latest_employee_name,
              device_id: state.latest_device_id,
              status: state.latest_session_status,
              started_at: state.started_at,
              ended_at: state.ended_at,
              duration_display: state.duration_display
            },
            locationCode,
            deviceId,
            "This session is waiting on form submission."
          );
          break;

        case "blocked_location_active":
          renderMessageCard(
            "title-red",
            "Blocked",
            state.location_name || locationCode,
            `${state.latest_employee_name || "Another employee"} is already active here.`
          );
          break;

        case "blocked_pending_submit":
          renderMessageCard(
            "title-red",
            "Blocked",
            state.location_name || locationCode,
            "This location is waiting on a completion submission."
          );
          break;

        default:
          renderMessageCard(
            "title-red",
            "Unknown State",
            state.location_name || locationCode,
            `Suggested action: ${state.suggested_action || "none"}`
          );
      }

      updateSyncBadge();
    }

    async function renderEmployeeSelect(state, deviceId) {
      renderLoadingCard("Pre-Scan", "Loading employee list...");
      const employees = await getActiveEmployeesSafe();
      const options = employees
        .map((emp) => `<option value="${escapeAttr(emp.display_name)}">${escapeHtml(emp.display_name)}</option>`)
        .join("");

      appEl.innerHTML = `
        <div class="shell">
          <div class="card">
            <div class="eyebrow">MEMPHIS ZOO CUSTODIAL SCAN</div>
            <h1 class="title-green">Pre-Scan</h1>
            <div class="location">${escapeHtml(state.location_name || state.location_code || "")}</div>
            <div class="helper">Select employee, then start cleaning.</div>
            <form id="start-form">
              <label>Employee Name</label>
              <select name="employee" required>
                <option value="" selected disabled>Select employee</option>
                ${options}
              </select>
              <button class="startBtn" type="submit">Start Cleaning</button>
              <div class="small">Device: ${escapeHtml(deviceId)}</div>
            </form>
          </div>
        </div>
      `;

      document.getElementById("start-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        const employee = String(form.get("employee") || "").trim();
        if (!employee) return;

        try {
          renderLoadingCard("Starting", "Creating cleaning session...");
          const started = await startSessionMaybeQueued(state.location_code, employee, deviceId);
          await recordScanEventMaybeQueued(
            state.location_code,
            deviceId,
            "scan_start",
            "ok",
            "Session started",
            started || {}
          );
          renderTimerPage(started);
        } catch (err) {
          renderMessageCard("title-red", "Start Failed", state.location_name || state.location_code, safeError(err));
        }
      });

      updateSyncBadge();
    }

    function renderTimerPage(result) {
      const startedAt = result?.started_at ? new Date(result.started_at).getTime() : Date.now();

      appEl.innerHTML = `
        <div class="shell">
          <div class="card">
            <div class="eyebrow">MEMPHIS ZOO CUSTODIAL SCAN</div>
            <h1 class="title-blue">Cleaning In Progress</h1>
            <div class="location">${escapeHtml(result?.location_name || "")}</div>
            <div class="employeeLine">${escapeHtml(result?.employee_name || "")}</div>
            <div class="pill">Cleaning In Progress</div>
            <div class="timer" id="timer">00:00:00</div>
            <div class="helper helperLarge">Scan this same location again when cleaning is complete.</div>
            <div class="small">Session ID: ${escapeHtml(result?.session_uuid || "")}</div>
          </div>
        </div>
      `;

      const timerEl = document.getElementById("timer");
      const update = () => {
        const elapsed = Math.max(0, Date.now() - startedAt);
        const totalSeconds = Math.floor(elapsed / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        timerEl.textContent =
          `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      };

      update();
      setInterval(update, 1000);
      updateSyncBadge();
    }

    function renderCompletePage(result, locationCode, deviceId, notice = "") {
      const continueUrl = buildContinueUrl({
        code: locationCode,
        action: "complete",
        session_uuid: result?.session_uuid || "",
        device: deviceId
      });

      appEl.innerHTML = `
        <div class="shell">
          <div class="card">
            <div class="eyebrow">MEMPHIS ZOO CUSTODIAL SCAN</div>
            <h1 class="title-amber">Complete Cleaning</h1>
            <div class="location">${escapeHtml(result?.location_name || "")}</div>
            ${notice ? `<div class="notice">${escapeHtml(notice)}</div>` : ""}
            <div class="infoBox">
              <div class="infoRow"><strong>Started by:</strong> ${escapeHtml(result?.employee_name || "")}</div>
              <div class="infoRow"><strong>Started at:</strong> ${escapeHtml(formatDateTime(result?.started_at))}</div>
              <div class="infoRow"><strong>Finished at:</strong> ${escapeHtml(formatDateTime(result?.ended_at))}</div>
              <div class="infoRow"><strong>Cleaning Time:</strong></div>
              <div class="metric">${escapeHtml(result?.duration_display || "")}</div>
            </div>
            <div class="helper helperLarge">Press the button below to continue to the completion form.</div>
            <a class="continueBtnLink" href="${escapeAttr(continueUrl)}">
              <button class="continueBtn" type="button">PRESS TO CONTINUE</button>
            </a>
            <div class="small">Session ID: ${escapeHtml(result?.session_uuid || "")}</div>
          </div>
        </div>
      `;

      updateSyncBadge();
    }

    async function renderCompletionForm(context) {
      appEl.innerHTML = `
        <div class="shell">
          <div class="card">
            <div class="eyebrow">MEMPHIS ZOO CUSTODIAL SCAN</div>
            <h1 class="title-amber">Completion Form</h1>
            <div class="helper">Submit the final cleaning details to close this session.</div>
            <form id="completion-form">
              <label>Employee Name</label>
              <input name="employee_name" type="text" placeholder="Employee name" required />

              <div class="checkboxRow">
                <input type="checkbox" name="cleaned" id="cleaned" checked />
                <label for="cleaned" style="margin:0;text-align:left;">Area cleaned</label>
              </div>

              <div class="checkboxRow">
                <input type="checkbox" name="stocked" id="stocked" checked />
                <label for="stocked" style="margin:0;text-align:left;">Supplies stocked</label>
              </div>

              <label>Notes</label>
              <textarea name="note" placeholder="Optional notes or issues"></textarea>

              <button class="submitBtn" type="submit">Submit Completion</button>
            </form>
            <div class="small">Session ID: ${escapeHtml(context.sessionUuid)}</div>
          </div>
        </div>
      `;

      document.getElementById("completion-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        const employeeName = String(form.get("employee_name") || "").trim();
        const responseJson = {
          cleaned: form.get("cleaned") === "on",
          stocked: form.get("stocked") === "on",
          note: String(form.get("note") || "").trim()
        };

        try {
          renderLoadingCard("Submitting", "Closing cleaning session...");
          const completed = await completeSessionMaybeQueued(
            context.sessionUuid,
            responseJson,
            employeeName || null,
            context.deviceId || null
          );

          await recordScanEventMaybeQueued(
            context.locationCode || "",
            context.deviceId || "",
            "scan_resume_pending",
            "ok",
            "Completion submitted",
            completed || {}
          );

          appEl.innerHTML = `
            <div class="shell">
              <div class="card">
                <div class="eyebrow">MEMPHIS ZOO CUSTODIAL SCAN</div>
                <h1 class="title-green">Cleaning Closed</h1>
                <div class="location">${escapeHtml(completed?.location_name || "")}</div>
                <div class="helper helperLarge">Session completed successfully.</div>
                <div class="infoBox">
                  <div class="infoRow"><strong>Employee:</strong> ${escapeHtml(completed?.employee_name || "")}</div>
                  <div class="infoRow"><strong>Submitted:</strong> ${escapeHtml(formatDateTime(completed?.submitted_at || new Date().toISOString()))}</div>
                  <div class="infoRow"><strong>Status:</strong> ${escapeHtml(completed?.status || "closed")}</div>
                </div>
                <div class="small">Session ID: ${escapeHtml(completed?.session_uuid || context.sessionUuid)}</div>
              </div>
            </div>
          `;
        } catch (err) {
          renderMessageCard("title-red", "Submit Failed", "", safeError(err));
        }
      });

      updateSyncBadge();
    }

    async function getSystemSettingsSafe() {
      try {
        return await rpcOne("tool_get_system_settings");
      } catch {
        return {
          system_enabled: true,
          use_approved_devices: true,
          background_image_url: CONFIG.DEFAULT_BACKGROUND_IMAGE_URL
        };
      }
    }

    async function getActiveEmployeesSafe() {
      try {
        return await rpcArray("tool_list_active_employees");
      } catch {
        return [
          { display_name: "Alijah Collins" },
          { display_name: "Michael McWright" },
          { display_name: "Tammy Miller" },
          { display_name: "Daniel Morgan" },
          { display_name: "Kinnaye Peete" },
          { display_name: "Kathy Phelps" },
          { display_name: "Karen Robinson" },
          { display_name: "Markiesha Warren" },
          { display_name: "Sherita Wilbon" }
        ];
      }
    }

    async function getScanStateSafe(locationCode, deviceId) {
      try {
        return await rpcOne("tool_get_location_scan_state", {
          p_location_code: locationCode,
          p_device_id: deviceId
        });
      } catch {
        const local = await getLatestLocalSessionForLocation(locationCode, deviceId);

        if (local && local.status === "active") {
          return {
            location_code: locationCode,
            location_name: local.location_name || locationCode,
            device_approved: true,
            latest_session_uuid: local.session_uuid,
            latest_session_status: "active",
            latest_employee_name: local.employee_name,
            latest_device_id: deviceId,
            started_at: local.started_at,
            suggested_action: "finish_session"
          };
        }

        if (local && local.status === "pending_submit") {
          return {
            location_code: locationCode,
            location_name: local.location_name || locationCode,
            device_approved: true,
            latest_session_uuid: local.session_uuid,
            latest_session_status: "pending_submit",
            latest_employee_name: local.employee_name,
            latest_device_id: deviceId,
            started_at: local.started_at,
            ended_at: local.ended_at,
            duration_display: local.duration_display,
            suggested_action: "resume_pending_submit"
          };
        }

        return {
          location_code: locationCode,
          location_name: locationCode,
          device_approved: true,
          suggested_action: "start_session"
        };
      }
    }

    async function startSessionMaybeQueued(locationCode, employeeName, deviceId) {
      const clientSessionId = crypto.randomUUID();

      try {
        return await rpcOne("tool_start_session", {
          p_location_code: locationCode,
          p_employee_name: employeeName,
          p_device_id: deviceId,
          p_client_session_id: clientSessionId
        });
      } catch {
        const offlineSession = {
          session_uuid: clientSessionId,
          location_name: locationCode,
          employee_name: employeeName,
          device_id: deviceId,
          status: "active",
          started_at: new Date().toISOString(),
          offline: true
        };

        await saveLocalSession(offlineSession);

        await enqueueAction({
          type: "start_session",
          client_id: clientSessionId,
          payload: {
            p_location_code: locationCode,
            p_employee_name: employeeName,
            p_device_id: deviceId,
            p_client_session_id: clientSessionId
          }
        });

        updateSyncBadge();
        return offlineSession;
      }
    }

    async function finishSessionMaybeQueued(locationCode, deviceId) {
      try {
        return await rpcOne("tool_finish_session", {
          p_location_code: locationCode,
          p_device_id: deviceId
        });
      } catch {
        const local = await getLatestLocalSessionForLocation(locationCode, deviceId);
        const endedAt = new Date().toISOString();
        const startedAt = local?.started_at || new Date().toISOString();
        const durationDisplay = calcDurationDisplay(startedAt, endedAt);

        const offlineFinished = {
          session_uuid: local?.session_uuid || crypto.randomUUID(),
          location_name: local?.location_name || locationCode,
          employee_name: local?.employee_name || "",
          device_id: deviceId,
          status: "pending_submit",
          started_at: startedAt,
          ended_at: endedAt,
          duration_display: durationDisplay,
          offline: true
        };

        await saveLocalSession(offlineFinished);

        await enqueueAction({
          type: "finish_session",
          client_id: crypto.randomUUID(),
          payload: {
            p_location_code: locationCode,
            p_device_id: deviceId
          }
        });

        updateSyncBadge();
        return offlineFinished;
      }
    }

    async function completeSessionMaybeQueued(sessionUuid, responseJson, employeeName, deviceId) {
      const clientCompletionId = crypto.randomUUID();

      try {
        return await rpcOne("tool_complete_session", {
          p_session_uuid: sessionUuid,
          p_response_json: responseJson,
          p_submitted_by_employee_name: employeeName,
          p_device_id: deviceId,
          p_client_completion_id: clientCompletionId
        });
      } catch {
        const offlineCompleted = {
          session_uuid: sessionUuid,
          location_name: "",
          employee_name: employeeName || "",
          status: "closed",
          submitted_at: new Date().toISOString(),
          offline: true
        };

        await removeLocalSession(sessionUuid);

        await enqueueAction({
          type: "complete_session",
          client_id: clientCompletionId,
          payload: {
            p_session_uuid: sessionUuid,
            p_response_json: responseJson,
            p_submitted_by_employee_name: employeeName,
            p_device_id: deviceId,
            p_client_completion_id: clientCompletionId
          }
        });

        updateSyncBadge();
        return offlineCompleted;
      }
    }

    async function pingDevice(deviceId, notes) {
      if (!deviceId) return null;

      try {
        return await rpcOne("tool_ping_device", {
          p_device_id: deviceId,
          p_notes: notes || null
        });
      } catch {
        return await enqueueAction({
          type: "ping_device",
          client_id: crypto.randomUUID(),
          payload: {
            p_device_id: deviceId,
            p_notes: notes || null
          }
        });
      }
    }

    async function recordScanEventMaybeQueued(locationCode, deviceId, eventType, result, notes, payload) {
      const clientEventId = crypto.randomUUID();

      try {
        return await rpcOne("tool_record_scan_event", {
          p_location_code: locationCode || null,
          p_device_identifier: deviceId || null,
          p_event_type: eventType,
          p_result: result || null,
          p_notes: notes || null,
          p_payload_json: payload || {},
          p_client_event_id: clientEventId
        });
      } catch {
        await enqueueAction({
          type: "record_scan_event",
          client_id: clientEventId,
          payload: {
            p_location_code: locationCode || null,
            p_device_identifier: deviceId || null,
            p_event_type: eventType,
            p_result: result || null,
            p_notes: notes || null,
            p_payload_json: payload || {},
            p_client_event_id: clientEventId
          }
        });

        updateSyncBadge();
        return { ok: true, queued: true };
      }
    }

    async function rpcOne(fn, args = {}) {
      const { data, error } = await supabase.rpc(fn, args);
      if (error) throw new Error(error.message || `RPC failed: ${fn}`);
      return data;
    }

    function setupConnectivityListeners() {
      window.addEventListener("online", async () => {
        updateSyncBadge();
        await syncQueue();
      });
      window.addEventListener("offline", updateSyncBadge);
    }

    function startSyncLoop() {
      if (syncTimer) clearInterval(syncTimer);
      syncTimer = setInterval(() => {
        syncQueue().catch(console.warn);
      }, CONFIG.SYNC_INTERVAL_MS);
      syncQueue().catch(console.warn);
    }

    async function syncQueue() {
      if (!navigator.onLine || !queueDb) {
        updateSyncBadge();
        return;
      }

      const items = await getQueuedActions();
      if (!items.length) {
        updateSyncBadge();
        return;
      }

      updateSyncBadge(`Syncing ${items.length}…`);

      for (const item of items) {
        try {
          if (item.type === "record_scan_event") await rpcOne("tool_record_scan_event", item.payload);
          if (item.type === "start_session") await rpcOne("tool_start_session", item.payload);
          if (item.type === "finish_session") await rpcOne("tool_finish_session", item.payload);
          if (item.type === "complete_session") await rpcOne("tool_complete_session", item.payload);
          if (item.type === "ping_device") await rpcOne("tool_ping_device", item.payload);

          await deleteQueuedAction(item.id);
        } catch (err) {
          console.warn("Sync item failed", item.type, err);
          break;
        }
      }

      updateSyncBadge();
    }

    function updateSyncBadge(forcedText = null) {
      if (forcedText) {
        syncBadge.textContent = forcedText;
        return;
      }

      getQueuedActions().then((items) => {
        if (!navigator.onLine) syncBadge.textContent = `Offline • ${items.length} queued`;
        else if (items.length) syncBadge.textContent = `Online • ${items.length} queued`;
        else syncBadge.textContent = "Connected";
      }).catch(() => {
        syncBadge.textContent = navigator.onLine ? "Connected" : "Offline";
      });
    }

    async function openQueueDb() {
      return await new Promise((resolve, reject) => {
        const request = indexedDB.open(CONFIG.QUEUE_DB_NAME, 1);

        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(CONFIG.QUEUE_STORE_NAME)) {
            const store = db.createObjectStore(CONFIG.QUEUE_STORE_NAME, { keyPath: "id", autoIncrement: true });
            store.createIndex("created_at", "created_at");
          }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function enqueueAction(action) {
      if (!queueDb) return null;

      return await new Promise((resolve, reject) => {
        const tx = queueDb.transaction(CONFIG.QUEUE_STORE_NAME, "readwrite");
        tx.objectStore(CONFIG.QUEUE_STORE_NAME).add({
          ...action,
          created_at: Date.now()
        });
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => reject(tx.error);
      });
    }

    async function getQueuedActions() {
      if (!queueDb) return [];

      return await new Promise((resolve, reject) => {
        const tx = queueDb.transaction(CONFIG.QUEUE_STORE_NAME, "readonly");
        const req = tx.objectStore(CONFIG.QUEUE_STORE_NAME).getAll();

        req.onsuccess = () => {
          const items = Array.isArray(req.result) ? req.result : [];
          items.sort((a, b) => a.created_at - b.created_at);
          resolve(items);
        };

        req.onerror = () => reject(req.error);
      });
    }

    async function deleteQueuedAction(id) {
      if (!queueDb) return;

      return await new Promise((resolve, reject) => {
        const tx = queueDb.transaction(CONFIG.QUEUE_STORE_NAME, "readwrite");
        tx.objectStore(CONFIG.QUEUE_STORE_NAME).delete(id);
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => reject(tx.error);
      });
    }

    function sessionStorageKey(sessionUuid) {
      return `session:${sessionUuid}`;
    }

    async function saveLocalSession(session) {
      localStorage.setItem(sessionStorageKey(session.session_uuid), JSON.stringify(session));
    }

    async function removeLocalSession(sessionUuid) {
      localStorage.removeItem(sessionStorageKey(sessionUuid));
    }

    async function getLatestLocalSessionForLocation(locationCode, deviceId) {
      const sessions = [];

      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key || !key.startsWith("session:")) continue;
        try {
          sessions.push(JSON.parse(localStorage.getItem(key)));
        } catch {}
      }

      sessions.sort((a, b) => new Date(b.started_at || 0) - new Date(a.started_at || 0));

      return sessions.find((s) =>
        (s.location_name === locationCode || s.location_code === locationCode || s.location_name?.includes(locationCode)) &&
        (!deviceId || s.device_id === deviceId)
      ) || null;
    }

    async function ensureDeviceIdInUrl() {
      const params = new URLSearchParams(window.location.search);
      let deviceId = decodeParam(params.get("device") || params.get("deviceId") || "");

      if (deviceId) {
        localStorage.setItem(CONFIG.DEVICE_STORAGE_KEY, deviceId);
        return deviceId;
      }

      deviceId = getFullyDeviceId() || localStorage.getItem(CONFIG.DEVICE_STORAGE_KEY) || "";
      deviceId = String(deviceId || "").trim();
      if (!deviceId) return "";

      params.set("device", deviceId);
      const nextUrl = `${window.location.pathname}?${params.toString()}`;
      localStorage.setItem(CONFIG.DEVICE_STORAGE_KEY, deviceId);
      window.history.replaceState({}, "", nextUrl);
      return deviceId;
    }

    function getFullyDeviceId() {
      try {
        if (window.fully) {
          if (typeof fully.getDeviceId === "function") return String(fully.getDeviceId() || "").trim();
          if (typeof fully.getSerialNumber === "function") return String(fully.getSerialNumber() || "").trim();
          if (typeof fully.getMacAddress === "function") return String(fully.getMacAddress() || "").trim();
          if (typeof fully.getDeviceName === "function") return String(fully.getDeviceName() || "").trim();
        }
      } catch (err) {
        console.warn("Fully device detection failed", err);
      }
      return "";
    }

    function calcDurationDisplay(startedAt, endedAt) {
      const start = new Date(startedAt).getTime();
      const end = new Date(endedAt).getTime();
      const minutes = Math.max(0, Math.round((end - start) / 60000));
      return `${minutes} min`;
    }

    function renderLoadingCard(title, helper) {
      appEl.innerHTML = `<div class="shell"><div class="card"><div class="eyebrow">MEMPHIS ZOO CUSTODIAL SCAN</div><h1 class="title-blue">${escapeHtml(title)}</h1><div class="helper helperLarge">${escapeHtml(helper)}</div></div></div>`;
    }

    function renderMessageCard(titleClass, title, location, message) {
      appEl.innerHTML = `<div class="shell"><div class="card"><div class="eyebrow">MEMPHIS ZOO CUSTODIAL SCAN</div><h1 class="${escapeAttr(titleClass)}">${escapeHtml(title)}</h1>${location ? `<div class="location">${escapeHtml(location)}</div>` : ""}<div class="status error">${escapeHtml(message)}</div></div></div>`;
    }

    function buildContinueUrl(params) {
      const url = new URL(window.location.href);
      url.search = "";
      Object.entries(params).forEach(([k, v]) => {
        if (v !== undefined && v !== null && String(v) !== "") url.searchParams.set(k, v);
      });
      return url.toString();
    }

    function applyBackground(url) {
      const finalUrl = url || CONFIG.DEFAULT_BACKGROUND_IMAGE_URL;
      if (finalUrl) document.body.style.setProperty("--bg-image", `url("${finalUrl}")`);
    }

    function decodeParam(value) {
      const s = String(value || "").replace(/\+/g, " ");
      try { return decodeURIComponent(s).trim(); } catch { return s.trim(); }
    }

    function formatDateTime(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return d.toLocaleString();
    }

    function safeError(err) {
      return err?.message ? String(err.message) : String(err || "Unknown error");
    }

    function escapeHtml(s) {
      return String(s || "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function escapeAttr(s) {
      return escapeHtml(s).replace(/`/g, "&#96;");
    }
  </script>
</body>
</html>
