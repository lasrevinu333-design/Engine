<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Memphis Zoo Custodial Scan</title>
  <style>
    :root{
      --panel:rgba(15,23,42,.84);
      --panel-2:rgba(15,23,42,.90);
      --text:#f8fafc;
      --muted:#d7e0ec;
      --lime:#9be11f;
      --cyan:#59cfff;
      --amber:#ffbb33;
      --danger:#ffb4b4;
      --pill:#0f766e;
      --card-radius:24px;
    }
    *{box-sizing:border-box;}
    html{font-size:20px;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
    html,body{margin:0;padding:0;width:100%;height:100%;color:var(--text);font-family:Arial,sans-serif;background:#111827;}
    body{
      background-image:linear-gradient(rgba(4,10,20,.58),rgba(4,10,20,.58)),var(--bg-image, none);
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      background-attachment:scroll;
    }
    .shell{min-height:100vh;display:flex;align-items:flex-end;justify-content:center;padding:20px 20px max(24px, env(safe-area-inset-bottom));}
    .card{width:min(96vw,760px);background:var(--panel);border-radius:var(--card-radius);padding:32px 24px 24px;box-shadow:0 16px 36px rgba(0,0,0,.42);text-align:center;border:1px solid rgba(255,255,255,.10);}
    .eyebrow{color:var(--muted);font-size:1rem;letter-spacing:.10em;text-transform:uppercase;margin-bottom:12px;font-weight:800;}
    .title-green,.title-blue,.title-amber,.title-red{margin:0 0 12px 0;font-size:2.2rem;line-height:1.08;font-weight:900;}
    .title-green{color:var(--lime);} .title-blue{color:var(--cyan);} .title-amber{color:var(--amber);} .title-red{color:var(--danger);}
    .location{font-size:2rem;line-height:1.08;font-weight:900;margin:12px 0 18px;text-shadow:0 2px 8px rgba(0,0,0,.25);}
    .helper{color:var(--muted);margin-bottom:18px;font-size:1.1rem;line-height:1.35;}
    .helperLarge{font-size:1.2rem;}
    .employeeLine{font-size:1.3rem;color:#eef6ff;margin-bottom:18px;font-weight:700;}
    .timer{font-size:3.2rem;font-weight:900;text-align:center;color:var(--cyan);margin:24px 0 14px;line-height:1;text-shadow:0 2px 10px rgba(0,0,0,.2);}
    .notice{white-space:pre-wrap;color:#ffe296;margin:16px 0 20px;font-size:1.05rem;line-height:1.35;}
    .status{margin-top:18px;white-space:pre-wrap;font-size:1.2rem;line-height:1.4;color:#cce7ff;}
    .error{color:var(--danger);}
    .small{margin-top:16px;color:#c4d1df;font-size:.95rem;word-break:break-word;line-height:1.35;}
    .infoBox{background:var(--panel-2);border-radius:18px;padding:20px;margin:22px 0;text-align:left;}
    .infoRow{margin-bottom:12px;font-size:1.2rem;line-height:1.35;color:#e7eff8;}
    .infoRowCompact{margin-bottom:10px;font-size:1rem;line-height:1.2;color:#e7eff8;}
    .metric{font-size:2rem;font-weight:900;color:var(--amber);margin-top:10px;line-height:1.1;}
    .pill{display:inline-block;margin-top:14px;padding:16px 28px;border-radius:999px;background:var(--pill);color:white;font-size:1.15rem;font-weight:900;}
    .syncBadge{position:fixed;top:max(8px, env(safe-area-inset-top));right:8px;z-index:9999;background:rgba(0,0,0,.65);color:#fff;padding:8px 12px;border-radius:999px;font-size:.85rem;border:1px solid rgba(255,255,255,.1);max-width:58vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    label{display:block;margin:12px 0 8px;color:#eef2f7;text-align:left;font-size:1.05rem;font-weight:800;}
    select,input,textarea,button{width:100%;padding:18px 16px;margin-top:12px;font-size:1.05rem;border:none;border-radius:14px;}
    select,input,textarea{background:#fff;color:#111827;}
    textarea{min-height:110px;resize:vertical;}
    button{cursor:pointer;font-weight:900;}
    .startBtn{background:var(--lime);color:#111827;}
    .continueBtn{background:var(--amber);color:#111827;font-size:1.35rem;padding:22px;border-radius:18px;}
    .submitBtn{background:var(--cyan);color:#111827;}
    .continueBtnLink{text-decoration:none;display:block;}
    .checkboxRow{display:flex;align-items:flex-start;gap:12px;text-align:left;margin-top:12px;padding:14px 16px;background:rgba(255,255,255,.06);border-radius:14px;}
    .checkboxRow input,.radioRow input{width:24px;height:24px;margin:0;flex:0 0 auto;}
    .checkboxLabel,.radioLabel{margin:0;text-align:left;color:#eef2f7;font-size:1rem;font-weight:600;line-height:1.3;display:block;}
    .formHeader{width:100%;border-radius:14px;margin-bottom:16px;display:block;}
    .sectionTitle{margin:18px 0 8px;color:#fff;font-size:1.15rem;font-weight:900;text-align:left;}
    .radioWrap{display:grid;gap:12px;grid-template-columns:1fr 1fr;margin-top:12px;}
    .radioRow{display:flex;align-items:flex-start;gap:12px;text-align:left;padding:14px 16px;background:rgba(255,255,255,.06);border-radius:14px;}
    @media (max-width:640px){
      html{font-size:22px;}
      .shell{padding:12px 12px max(14px, env(safe-area-inset-bottom));}
      .card{width:96vw;padding:28px 18px 20px;border-radius:20px;}
      .title-green,.title-blue,.title-amber,.title-red{font-size:2.1rem;}
      .location{font-size:1.85rem;}
      .timer{font-size:3rem;}
      .continueBtn{font-size:1.35rem;padding:22px;}
      .radioWrap{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
  <div id="sync-badge" class="syncBadge">Starting…</div>
  <div id="app"></div>

  <script>
    const CONFIG = {
      DEFAULT_BACKGROUND_IMAGE_URL: "./Background.png",
      FORM_HEADER_IMAGE_URL: "./Header.png",
      DEVICE_STORAGE_KEY: "mz_scan_device_id",
      QUEUE_DB_NAME: "mz_scan_queue",
      QUEUE_STORE_NAME: "actions",
      SYNC_INTERVAL_MS: 30000,
      SYNC_MAX_RETRIES: 3,
      EVENT_DROP_RETRIES: 2,
      PING_DROP_RETRIES: 2,
      SCAN_API_URL: "https://memphis-zoo-mcp.onrender.com/scan-api/rpc"
    };

    const RESTROOM_SERVICES = [
      "Toilets and urinals cleaned",
      "Sinks and counters cleaned",
      "Floor-to-ceiling deep cleaning completed, including corners, walls, cobwebs, vents, and fixtures",
      "Walls and partitions spot-cleaned for splashes, smudges, and fingerprints",
      "Trash emptied and receptacles cleaned, including feminine hygiene receptacles",
      "Floors swept and mopped, including corners and areas behind fixtures",
      "Mirrors and stainless steel surfaces cleaned and polished",
      "Toilet tissue, paper towel, and soap dispensers cleaned",
      "Hand dryer cleaned",
      "Baby changing station cleaned",
      "Toilet tissue restocked",
      "Paper towels restocked",
      "Soap restocked",
      "Air freshener applied",
      "Final inspection completed before scanning the location tag",
      "Full cleaning and inspection completed"
    ];

    const RESTROOM_ISSUES = [
      "Toilet leaking",
      "Toilet clogged or draining slowly",
      "Toilet continuously flushing or water running",
      "Toilet flush valve not functioning",
      "Urinal leaking",
      "Urinal clogged or draining slowly",
      "Urinal continuously flushing or water running",
      "Urinal flush valve not functioning",
      "Sink leaking",
      "Sink clogged or draining slowly",
      "Faucet loose or damaged",
      "Stall partition, door, lock, or coat hook damaged or missing",
      "Trash receptacle damaged or missing, including feminine hygiene receptacles",
      "Toilet paper dispenser damaged or missing",
      "Paper towel dispenser damaged or missing",
      "Soap dispenser damaged or missing",
      "Hand dryer not functioning",
      "Floor drain backing up",
      "Other maintenance issue found"
    ];

    const EXHIBIT_SERVICES = [
      "Floors swept or vacuumed, including corners",
      "Stairs swept, including around railings",
      "Floor-to-ceiling deep cleaning completed, including corners, walls, cobwebs, vents, and fixtures",
      "Walls, signage, switch plates, and baseboards spot-cleaned",
      "Interior glass cleaned",
      "Floors mopped",
      "Entrance and exit doors cleaned",
      "Exterior glass cleaned",
      "Floors waxed",
      "Final inspection completed before scanning the location tag",
      "Full cleaning and inspection completed"
    ];

    const EXHIBIT_ISSUES = [
      "Light bulbs burned out",
      "Water leak observed",
      "Ceiling or wall damage observed",
      "Floor damage observed",
      "Floor drainage issue observed",
      "Signage damaged or missing",
      "Electrical outlet or power issue",
      "Heating or air conditioning issue",
      "Pest control issue observed",
      "Other maintenance issue found"
    ];

    const appEl = document.getElementById("app");
    const syncBadge = document.getElementById("sync-badge");
    let queueDb = null;
    let syncTimer = null;
    let syncInFlight = false;

    start().catch((err) => {
      console.error(err);
      renderMessageCard("title-red", "Startup Error", "", safeError(err));
    });

    async function start() {
      queueDb = await openQueueDb();
      setupConnectivityListeners();
      await syncQueue();
      await bootstrap();
      startSyncLoop();
    }

    async function bootstrap() {
      renderLoadingCard("Loading Device", "Checking kiosk identity and scan state...");
      const params = new URLSearchParams(window.location.search);
      let locationCode = decodeParam(params.get("code") || params.get("location") || params.get("loc") || "");
      if (!locationCode) {
        const href = window.location.href || "";
        const match = href.match(/[?&](?:code|location|loc)=([^&#]+)/i);
        if (match && match[1]) locationCode = decodeParam(match[1]);
      }

      const sessionUuid = decodeParam(params.get("session_uuid") || "");
      const action = decodeParam(params.get("action") || "").toLowerCase();

      if (!locationCode && !sessionUuid && action !== "complete") {
        renderMessageCard("title-red", "Missing Location", "", "No location code was found in the scan URL.");
        updateSyncBadge();
        return;
      }

      const deviceId = await ensureDeviceIdInUrl();
      try { await pingDevice(deviceId, "App bootstrap"); } catch {}
      const settings = await getSystemSettingsSafe();
      applyBackground(CONFIG.DEFAULT_BACKGROUND_IMAGE_URL);

      if (settings && settings.system_enabled === false) {
        renderMessageCard("title-red", "System Disabled", "", "The scan system is temporarily disabled.");
        updateSyncBadge();
        return;
      }

      if (action === "complete" && sessionUuid) {
        await renderCompletionForm({
          sessionUuid,
          locationCode,
          deviceId,
          employeeName: decodeParam(params.get("employee") || ""),
          locationName: decodeParam(params.get("location_name") || ""),
          locationType: decodeParam(params.get("location_type") || "")
        });
        updateSyncBadge();
        return;
      }

      const state = await getScanStateSafe(locationCode, deviceId);
      if (!state) {
        renderMessageCard("title-red", "Scan Error", "", "No scan state was returned from the backend.");
        updateSyncBadge();
        return;
      }

      const openLocalForDevice = findAnyOpenLocalSessionForDevice(deviceId);
      if (openLocalForDevice && (openLocalForDevice.status === "active" || openLocalForDevice.status === "pending_submit") && normalizeLoc(openLocalForDevice.location_code || openLocalForDevice.location_name) !== normalizeLoc(locationCode)) {
        renderMessageCard(
          "title-red",
          "Session Already Open",
          openLocalForDevice.location_name || openLocalForDevice.location_code || "",
          `${openLocalForDevice.employee_name || "An employee"} already has an open session at ${openLocalForDevice.location_name || openLocalForDevice.location_code || "another location"}.\n\nReturning to that session in 5 seconds...`
        );
        setTimeout(() => {
          if (openLocalForDevice.status === "pending_submit") {
            renderCompletePage(openLocalForDevice, openLocalForDevice.location_code || "", deviceId, "This session is waiting on form submission.");
          } else {
            renderTimerPage(openLocalForDevice);
          }
        }, 5000);
        updateSyncBadge();
        return;
      }

      const localSameLocation = await getLatestLocalSessionForLocation(locationCode, deviceId);
      if (localSameLocation && localSameLocation.status === "pending_submit") {
        renderCompletePage(localSameLocation, locationCode, deviceId, "This session is waiting on form submission.");
        updateSyncBadge();
        return;
      }

      if (localSameLocation && localSameLocation.status === "active") {
        const finished = await finishSessionMaybeQueued(locationCode, deviceId);
        await recordScanEventMaybeQueued(locationCode, deviceId, "scan_finish", "ok", "Session moved to pending submit", finished || {});
        renderCompletePage(finished, locationCode, deviceId);
        updateSyncBadge();
        return;
      }

      await recordScanEventMaybeQueued(locationCode, deviceId, "scan_received", "ok", "Bootstrap scan state loaded", { suggested_action: state.suggested_action });

      switch (state.suggested_action) {
        case "unauthorized_device":
          renderMessageCard("title-red", "Unauthorized Device", state.location_name || state.location_code || "", `This phone is not approved.\n\nDetected device: ${deviceId || "none"}`);
          break;
        case "invalid_location":
          renderMessageCard("title-red", "Invalid Location", locationCode, "This scan code does not exist in the system.");
          break;
        case "start_session":
          await renderEmployeeSelect(state, deviceId);
          break;
        case "finish_session": {
          const finished = await finishSessionMaybeQueued(locationCode, deviceId);
          await recordScanEventMaybeQueued(locationCode, deviceId, "scan_finish", "ok", "Session moved to pending submit", finished || {});
          renderCompletePage(finished, locationCode, deviceId);
          break;
        }
        case "resume_pending_submit":
          renderCompletePage({
            session_uuid: state.latest_session_uuid,
            location_name: state.location_name,
            employee_name: state.latest_employee_name,
            device_id: state.latest_device_id,
            status: state.latest_session_status,
            started_at: state.started_at,
            ended_at: state.ended_at,
            duration_display: state.duration_display,
            location_type: state.location_type
          }, locationCode, deviceId, "This session is waiting on form submission.");
          break;
        case "blocked_location_active":
          renderMessageCard("title-red", "Blocked", state.location_name || locationCode, `${state.latest_employee_name || "Another employee"} is already active here.`);
          break;
        case "blocked_pending_submit":
          renderMessageCard("title-red", "Blocked", state.location_name || locationCode, "This location is waiting on a completion submission.");
          break;
        default:
          renderMessageCard("title-red", "Unknown State", state.location_name || locationCode, `Suggested action: ${state.suggested_action || "none"}`);
      }

      updateSyncBadge();
    }

    async function renderEmployeeSelect(state, deviceId) {
      renderLoadingCard("Pre-Scan", "Loading employee list...");
      const employees = await getActiveEmployeesSafe();
      const options = employees.map((emp) => `<option value="${escapeAttr(emp.display_name)}">${escapeHtml(emp.display_name)}</option>`).join("");
      appEl.innerHTML = `
        <div class="shell">
          <div class="card">
            <div class="eyebrow">MEMPHIS ZOO CUSTODIAL SCAN</div>
            <h1 class="title-green">Pre-Scan</h1>
            <div class="location">${escapeHtml(state.location_name || state.location_code || "")}</div>
            <form id="start-form">
              <select name="employee" required>
                <option value="" selected disabled>Select Employee Name</option>
                ${options}
              </select>
              <button class="startBtn" type="submit">Start Cleaning</button>
              <div class="small">Device: ${escapeHtml(deviceId)}</div>
            </form>
          </div>
        </div>
      `;
      document.getElementById("start-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        const employee = String(form.get("employee") || "").trim();
        if (!employee) return;
        const existingOpen = findAnyOpenLocalSessionForDevice(deviceId);
        if (existingOpen && (existingOpen.status === "active" || existingOpen.status === "pending_submit")) {
          renderMessageCard("title-red", "Session Already Open", existingOpen.location_name || existingOpen.location_code || "", `${existingOpen.employee_name || "An employee"} already has an open session at ${existingOpen.location_name || existingOpen.location_code || "another location"}.\n\nReturning to that session in 5 seconds...`);
          setTimeout(() => {
            if (existingOpen.status === "pending_submit") renderCompletePage(existingOpen, existingOpen.location_code || "", deviceId, "This session is waiting on form submission.");
            else renderTimerPage(existingOpen);
          }, 5000);
          return;
        }
        renderLoadingCard("Starting", "Creating cleaning session...");
        const started = await startSessionMaybeQueued(locationCodeFromState(state), employee, deviceId, state.location_type);
        await recordScanEventMaybeQueued(locationCodeFromState(state), deviceId, "scan_start", "ok", "Session started", started || {});
        renderTimerPage(started);
      });
      updateSyncBadge();
    }

    function renderTimerPage(result) {
      const startedAt = result && result.started_at ? new Date(result.started_at).getTime() : Date.now();
      appEl.innerHTML = `
        <div class="shell">
          <div class="card">
            <div class="eyebrow">MEMPHIS ZOO CUSTODIAL SCAN</div>
            <h1 class="title-blue">Cleaning In Progress</h1>
            <div class="location">${escapeHtml(result && result.location_name || "")}</div>
            <div class="employeeLine">${escapeHtml(result && result.employee_name || "")}</div>
            <div class="pill">Cleaning In Progress</div>
            <div class="timer" id="timer">00:00:00</div>
            <div class="helper helperLarge">Scan this same location again when cleaning is complete.</div>
            <div class="small">Session ID: ${escapeHtml(result && result.session_uuid || "")}</div>
          </div>
        </div>
      `;
      const timerEl = document.getElementById("timer");
      const update = () => {
        const elapsed = Math.max(0, Date.now() - startedAt);
        const totalSeconds = Math.floor(elapsed / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        timerEl.textContent = `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      };
      update();
      setInterval(update, 1000);
      updateSyncBadge();
    }

    function renderCompletePage(result, locationCode, deviceId, notice = "") {
      const continueUrl = buildContinueUrl({
        code: locationCode,
        action: "complete",
        session_uuid: result && result.session_uuid || "",
        device: deviceId,
        employee: result && result.employee_name || "",
        location_name: result && result.location_name || "",
        location_type: result && result.location_type || ""
      });
      appEl.innerHTML = `
        <div class="shell">
          <div class="card">
            <div class="eyebrow">MEMPHIS ZOO CUSTODIAL SCAN</div>
            <h1 class="title-amber">Complete Cleaning</h1>
            <div class="location">${escapeHtml(result && result.location_name || "")}</div>
            ${notice ? `<div class="notice">${escapeHtml(notice)}</div>` : ""}
            <div class="infoBox">
              <div class="infoRow"><strong>Employee:</strong> ${escapeHtml(result && result.employee_name || "")}</div>
              <div class="infoRowCompact"><strong>Date:</strong> ${escapeHtml(formatDateOnly(result && (result.started_at || result.ended_at)))}</div>
              <div class="infoRowCompact"><strong>Start Time:</strong> ${escapeHtml(formatTimeOnly(result && result.started_at))}</div>
              <div class="infoRowCompact"><strong>End Time:</strong> ${escapeHtml(formatTimeOnly(result && result.ended_at))}</div>
              <div class="infoRow"><strong>Cleaning Time:</strong></div>
              <div class="metric">${escapeHtml(result && result.duration_display || "")}</div>
            </div>
            <div class="helper helperLarge">Press the button below to continue to the completion form.</div>
            <a class="continueBtnLink" href="${escapeAttr(continueUrl)}"><button class="continueBtn" type="button">PRESS TO CONTINUE</button></a>
            <div class="small">Session ID: ${escapeHtml(result && result.session_uuid || "")}</div>
          </div>
        </div>
      `;
      updateSyncBadge();
    }

    async function renderCompletionForm(context) {
      const localSession = getLocalSessionById(context.sessionUuid);
      const locationType = context.locationType || (localSession && localSession.location_type) || "";
      const locationName = context.locationName || (localSession && localSession.location_name) || context.locationCode || "";
      const employeeName = context.employeeName || (localSession && localSession.employee_name) || "";
      const isRestroom = String(locationType || "").toLowerCase() === "restroom";
      const services = isRestroom ? RESTROOM_SERVICES : EXHIBIT_SERVICES;
      const issues = isRestroom ? RESTROOM_ISSUES : EXHIBIT_ISSUES;
      appEl.innerHTML = `
        <div class="shell">
          <div class="card">
            <img src="${escapeAttr(CONFIG.FORM_HEADER_IMAGE_URL)}" alt="Memphis Zoo form header" class="formHeader" />
            <div class="eyebrow">MEMPHIS ZOO CUSTODIAL SCAN</div>
            <h1 class="title-amber">${isRestroom ? "Restroom" : "Exhibit"} Completion Form</h1>
            <div class="location">${escapeHtml(locationName)}</div>
            <div class="employeeLine">${escapeHtml(employeeName)}</div>
            <div class="helper">Select at least one service performed before submitting.</div>
            <form id="completion-form">
              <div class="sectionTitle">Services Performed</div>
              ${services.map((label, i) => `<div class="checkboxRow"><input type="checkbox" name="services" id="svc_${i}" value="${escapeAttr(label)}" /><label for="svc_${i}" class="checkboxLabel">${escapeHtml(label)}</label></div>`).join("")}
              <label>Other Service Performed</label>
              <input name="services_other" type="text" placeholder="Enter other service performed if applicable" />
              <div class="sectionTitle">Maintenance Issues Found</div>
              ${issues.map((label, i) => `<div class="checkboxRow"><input type="checkbox" name="issues" id="issue_${i}" value="${escapeAttr(label)}" /><label for="issue_${i}" class="checkboxLabel">${escapeHtml(label)}</label></div>`).join("")}
              ${isRestroom ? `<div class="sectionTitle">Out of Order Status</div><div class="radioWrap"><div class="radioRow"><input type="radio" name="out_of_order_signed" id="ooo_yes" value="Yes" /><label for="ooo_yes" class="radioLabel">Yes</label></div><div class="radioRow"><input type="radio" name="out_of_order_signed" id="ooo_no" value="No" /><label for="ooo_no" class="radioLabel">No</label></div></div><label>Which stall(s), urinal(s), and/or sink(s) were out of order?</label><textarea name="out_of_order_details" placeholder="Enter details if applicable"></textarea>` : ""}
              <label>Notes</label>
              <textarea name="note" placeholder="Optional notes or issues"></textarea>
              <button class="submitBtn" type="submit">Submit Completion</button>
            </form>
            <div class="small">Session ID: ${escapeHtml(context.sessionUuid)}</div>
          </div>
        </div>
      `;
      document.getElementById("completion-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        const selectedServices = form.getAll("services").map(String).filter(Boolean);
        const servicesOther = String(form.get("services_other") || "").trim();
        if (servicesOther) selectedServices.push(servicesOther);
        if (!selectedServices.length) {
          renderMessageCard("title-red", "Services Required", locationName || "", "Please select at least one service performed before submitting.\n\nReturning to the form in 5 seconds...");
          setTimeout(() => renderCompletionForm(context), 5000);
          return;
        }
        const responseJson = {
          form_type: isRestroom ? "restroom" : "exhibit",
          services_performed: selectedServices,
          maintenance_issues_found: form.getAll("issues").map(String).filter(Boolean),
          note: String(form.get("note") || "").trim()
        };
        if (isRestroom) {
          responseJson.out_of_order_signed = String(form.get("out_of_order_signed") || "").trim();
          responseJson.out_of_order_details = String(form.get("out_of_order_details") || "").trim();
        }
        renderLoadingCard("Submitting", "Closing cleaning session...");
        const completed = await completeSessionMaybeQueued(context.sessionUuid, responseJson, employeeName || null, context.deviceId || null);
        await recordScanEventMaybeQueued(context.locationCode || "", context.deviceId || "", "scan_resume_pending", "ok", "Completion submitted", completed || {});
        appEl.innerHTML = `
          <div class="shell">
            <div class="card">
              <div class="eyebrow">MEMPHIS ZOO CUSTODIAL SCAN</div>
              <h1 class="title-green">Cleaning Closed</h1>
              <div class="location">${escapeHtml((completed && completed.location_name) || locationName || "")}</div>
              <div class="helper helperLarge">Session completed successfully.</div>
              <div class="infoBox">
                <div class="infoRow"><strong>Employee:</strong> ${escapeHtml((completed && completed.employee_name) || employeeName || "")}</div>
                <div class="infoRow"><strong>Submitted:</strong> ${escapeHtml(formatDateTime((completed && completed.submitted_at) || new Date().toISOString()))}</div>
                <div class="infoRow"><strong>Status:</strong> ${escapeHtml((completed && completed.status) || "closed")}</div>
              </div>
              <div class="small">Session ID: ${escapeHtml((completed && completed.session_uuid) || context.sessionUuid)}</div>
            </div>
          </div>
        `;
      });
      updateSyncBadge();
    }

    async function getSystemSettingsSafe() {
      try { return await rpcOne("tool_get_system_settings"); }
      catch { return { system_enabled: true, use_approved_devices: true }; }
    }

    async function getActiveEmployeesSafe() {
      try { return await rpcArray("tool_list_active_employees"); }
      catch {
        return [
          { display_name: "Alijah Collins" },
          { display_name: "Michael McWright" },
          { display_name: "Tammy Miller" },
          { display_name: "Daniel Morgan" },
          { display_name: "Kinnaye Peete" },
          { display_name: "Kathy Phelps" },
          { display_name: "Karen Robinson" },
          { display_name: "Markiesha Warren" },
          { display_name: "Sherita Wilbon" }
        ];
      }
    }

    async function getScanStateSafe(locationCode, deviceId) {
      try { return await rpcOne("tool_get_location_scan_state", { p_location_code: locationCode, p_device_id: deviceId }); }
      catch {
        const local = await getLatestLocalSessionForLocation(locationCode, deviceId);
        if (local && local.status === "active") {
          return {
            location_code: locationCode,
            location_name: local.location_name || locationCode,
            location_type: local.location_type || "",
            device_approved: true,
            latest_session_uuid: local.session_uuid,
            latest_session_status: "active",
            latest_employee_name: local.employee_name,
            latest_device_id: deviceId,
            started_at: local.started_at,
            suggested_action: "finish_session"
          };
        }
        if (local && local.status === "pending_submit") {
          return {
            location_code: locationCode,
            location_name: local.location_name || locationCode,
            location_type: local.location_type || "",
            device_approved: true,
            latest_session_uuid: local.session_uuid,
            latest_session_status: "pending_submit",
            latest_employee_name: local.employee_name,
            latest_device_id: deviceId,
            started_at: local.started_at,
            ended_at: local.ended_at,
            duration_display: local.duration_display,
            suggested_action: "resume_pending_submit"
          };
        }
        return { location_code: locationCode, location_name: locationCode, device_approved: true, suggested_action: "start_session" };
      }
    }

    async function startSessionMaybeQueued(locationCode, employeeName, deviceId, locationType = "") {
      const clientSessionId = crypto.randomUUID();
      try {
        const result = await rpcOne("tool_start_session", {
          p_location_code: locationCode,
          p_employee_name: employeeName,
          p_device_id: deviceId,
          p_client_session_id: clientSessionId
        });
        const sessionRecord = {
          ...result,
          location_code: locationCode,
          location_type: locationType || (result && result.location_type) || "",
          employee_name: (result && result.employee_name) || employeeName,
          device_id: deviceId,
          status: (result && result.status) || "active"
        };
        await saveLocalSession(sessionRecord);
        return sessionRecord;
      } catch (err) {
        const offlineSession = {
          session_uuid: clientSessionId,
          location_name: locationCode,
          location_code: locationCode,
          location_type: locationType,
          employee_name: employeeName,
          device_id: deviceId,
          status: "active",
          started_at: new Date().toISOString(),
          offline: true
        };
        await saveLocalSession(offlineSession);
        await enqueueAction({ type: "start_session", client_id: clientSessionId, payload: { p_location_code: locationCode, p_employee_name: employeeName, p_device_id: deviceId, p_client_session_id: clientSessionId } });
        return offlineSession;
      }
    }

    async function finishSessionMaybeQueued(locationCode, deviceId) {
      try {
        const result = await rpcOne("tool_finish_session", { p_location_code: locationCode, p_device_id: deviceId });
        const existing = await getLatestLocalSessionForLocation(locationCode, deviceId);
        const pendingRecord = {
          ...existing,
          ...result,
          location_code: locationCode,
          device_id: deviceId,
          status: (result && result.status) || "pending_submit"
        };
        await saveLocalSession(pendingRecord);
        return pendingRecord;
      } catch (err) {
        const local = await getLatestLocalSessionForLocation(locationCode, deviceId);
        const endedAt = new Date().toISOString();
        const startedAt = (local && local.started_at) || new Date().toISOString();
        const durationDisplay = calcDurationDisplay(startedAt, endedAt);
        const offlineFinished = {
          session_uuid: (local && local.session_uuid) || crypto.randomUUID(),
          location_name: (local && local.location_name) || locationCode,
          location_code: (local && local.location_code) || locationCode,
          location_type: (local && local.location_type) || "",
          employee_name: (local && local.employee_name) || "",
          device_id: deviceId,
          status: "pending_submit",
          started_at: startedAt,
          ended_at: endedAt,
          duration_display: durationDisplay,
          offline: true
        };
        await saveLocalSession(offlineFinished);
        await enqueueAction({ type: "finish_session", client_id: crypto.randomUUID(), payload: { p_location_code: locationCode, p_device_id: deviceId } });
        return offlineFinished;
      }
    }

    async function completeSessionMaybeQueued(sessionUuid, responseJson, employeeName, deviceId) {
      const clientCompletionId = crypto.randomUUID();
      try {
        const result = await rpcOne("tool_complete_session", {
          p_session_uuid: sessionUuid,
          p_response_json: responseJson,
          p_submitted_by_employee_name: employeeName,
          p_device_id: deviceId,
          p_client_completion_id: clientCompletionId
        });
        await removeLocalSession(sessionUuid);
        return result;
      } catch (err) {
        const offlineCompleted = { session_uuid: sessionUuid, location_name: "", employee_name: employeeName || "", status: "closed", submitted_at: new Date().toISOString(), offline: true };
        await removeLocalSession(sessionUuid);
        await enqueueAction({ type: "complete_session", client_id: clientCompletionId, payload: { p_session_uuid: sessionUuid, p_response_json: responseJson, p_submitted_by_employee_name: employeeName, p_device_id: deviceId, p_client_completion_id: clientCompletionId } });
        return offlineCompleted;
      }
    }

    async function pingDevice(deviceId, notes) {
      if (!deviceId) return null;
      try { return await rpcOne("tool_ping_device", { p_device_id: deviceId, p_notes: notes || null }); }
      catch {
        await enqueueAction({ type: "ping_device", client_id: crypto.randomUUID(), payload: { p_device_id: deviceId, p_notes: notes || null } });
        return { ok: true, queued: true };
      }
    }

    async function recordScanEventMaybeQueued(locationCode, deviceId, eventType, result, notes, payload) {
      const clientEventId = crypto.randomUUID();
      try {
        return await rpcOne("tool_record_scan_event", {
          p_location_code: locationCode || null,
          p_device_identifier: deviceId || null,
          p_event_type: eventType,
          p_result: result || null,
          p_notes: notes || null,
          p_payload_json: payload || {},
          p_client_event_id: clientEventId
        });
      } catch {
        await enqueueAction({ type: "record_scan_event", client_id: clientEventId, payload: { p_location_code: locationCode || null, p_device_identifier: deviceId || null, p_event_type: eventType || null, p_result: result || null, p_notes: notes || null, p_payload_json: payload || {}, p_client_event_id: clientEventId } });
        return { ok: true, queued: true };
      }
    }

    async function rpcOne(fn, args = {}) {
      const response = await fetch(CONFIG.SCAN_API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ fn, args })
      });
      const payload = await response.json().catch(() => null);
      if (!response.ok || !payload || !payload.ok) {
        throw new Error((payload && payload.error) || `HTTP ${response.status}`);
      }
      return payload.data;
    }

    async function rpcArray(fn, args = {}) {
      const data = await rpcOne(fn, args);
      return Array.isArray(data) ? data : [];
    }

    function setupConnectivityListeners() {
      window.addEventListener("online", async () => { updateSyncBadge(); await syncQueue(); });
      window.addEventListener("offline", updateSyncBadge);
      syncBadge.addEventListener("dblclick", () => { syncQueue().catch(console.warn); });
    }

    function startSyncLoop() {
      if (syncTimer) clearInterval(syncTimer);
      syncTimer = setInterval(() => { syncQueue().catch(console.warn); }, CONFIG.SYNC_INTERVAL_MS);
      syncQueue().catch(console.warn);
    }

    async function syncQueue() {
      if (syncInFlight || !navigator.onLine || !queueDb) { updateSyncBadge(); return; }
      syncInFlight = true;
      try {
        const items = await getQueuedActions();
        if (!items.length) { updateSyncBadge(); return; }
        updateSyncBadge(`Syncing ${items.length}…`);
        for (const item of items) {
          try {
            await processQueuedAction(item);
            await deleteQueuedAction(item.id);
          } catch (err) {
            const retryCount = Number(item.retry_count || 0) + 1;
            const message = safeError(err);
            await updateQueuedActionMeta(item.id, { retry_count: retryCount, last_error: message, last_attempt_at: Date.now() });
            if (shouldDropQueuedAction(item, message, retryCount)) {
              await deleteQueuedAction(item.id);
            }
          }
        }
        updateSyncBadge();
      } finally {
        syncInFlight = false;
      }
    }

    async function processQueuedAction(item) {
      if (item.type === "record_scan_event") return await rpcOne("tool_record_scan_event", item.payload);
      if (item.type === "start_session") return await rpcOne("tool_start_session", item.payload);
      if (item.type === "finish_session") return await rpcOne("tool_finish_session", item.payload);
      if (item.type === "complete_session") return await rpcOne("tool_complete_session", item.payload);
      if (item.type === "ping_device") return await rpcOne("tool_ping_device", item.payload);
      throw new Error(`Unknown queued action type: ${item.type}`);
    }

    function shouldDropQueuedAction(item, message, retryCount) {
      const text = String(message || "").toLowerCase();
      const type = String(item && item.type || "");
      const duplicateLike = text.includes("duplicate") || text.includes("already exists") || text.includes("already closed") || text.includes("already completed") || text.includes("not found") || text.includes("unique");
      if (duplicateLike) return true;
      if (type === "record_scan_event" && retryCount >= CONFIG.EVENT_DROP_RETRIES) return true;
      if (type === "ping_device" && retryCount >= CONFIG.PING_DROP_RETRIES) return true;
      if (retryCount >= CONFIG.SYNC_MAX_RETRIES && (type === "start_session" || type === "finish_session" || type === "complete_session")) {
        return text.includes("not found") || text.includes("already") || text.includes("duplicate") || text.includes("unique");
      }
      return false;
    }

    function updateSyncBadge(forcedText = null) {
      if (forcedText) { syncBadge.textContent = forcedText; return; }
      getQueuedActions().then((items) => {
        const queued = items.length;
        const failing = items.filter((item) => Number(item.retry_count || 0) > 0).length;
        if (!navigator.onLine) syncBadge.textContent = `Offline • ${queued} queued`;
        else if (queued && failing) syncBadge.textContent = `Online • ${queued} queued • ${failing} stuck`;
        else if (queued) syncBadge.textContent = `Online • ${queued} queued`;
        else syncBadge.textContent = "Connected";
      }).catch(() => { syncBadge.textContent = navigator.onLine ? "Connected" : "Offline"; });
    }

    async function openQueueDb() {
      return await new Promise((resolve, reject) => {
        const request = indexedDB.open(CONFIG.QUEUE_DB_NAME, 3);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(CONFIG.QUEUE_STORE_NAME)) {
            db.createObjectStore(CONFIG.QUEUE_STORE_NAME, { keyPath: "id", autoIncrement: true });
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function enqueueAction(action) {
      if (!queueDb) return null;
      return await new Promise((resolve, reject) => {
        const tx = queueDb.transaction(CONFIG.QUEUE_STORE_NAME, "readwrite");
        tx.objectStore(CONFIG.QUEUE_STORE_NAME).add({ ...action, created_at: Date.now(), retry_count: 0, last_error: null, last_attempt_at: null });
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => reject(tx.error);
      });
    }

    async function getQueuedActions() {
      if (!queueDb) return [];
      return await new Promise((resolve, reject) => {
        const tx = queueDb.transaction(CONFIG.QUEUE_STORE_NAME, "readonly");
        const req = tx.objectStore(CONFIG.QUEUE_STORE_NAME).getAll();
        req.onsuccess = () => {
          const items = Array.isArray(req.result) ? req.result : [];
          items.sort((a, b) => a.created_at - b.created_at);
          resolve(items);
        };
        req.onerror = () => reject(req.error);
      });
    }

    async function updateQueuedActionMeta(id, patch) {
      if (!queueDb) return false;
      return await new Promise((resolve, reject) => {
        const tx = queueDb.transaction(CONFIG.QUEUE_STORE_NAME, "readwrite");
        const store = tx.objectStore(CONFIG.QUEUE_STORE_NAME);
        const getReq = store.get(id);
        getReq.onsuccess = () => {
          const item = getReq.result;
          if (!item) return;
          store.put({ ...item, ...patch });
        };
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => reject(tx.error);
      });
    }

    async function deleteQueuedAction(id) {
      if (!queueDb) return;
      return await new Promise((resolve, reject) => {
        const tx = queueDb.transaction(CONFIG.QUEUE_STORE_NAME, "readwrite");
        tx.objectStore(CONFIG.QUEUE_STORE_NAME).delete(id);
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => reject(tx.error);
      });
    }

    function sessionStorageKey(sessionUuid) { return `session:${sessionUuid}`; }
    async function saveLocalSession(session) { localStorage.setItem(sessionStorageKey(session.session_uuid), JSON.stringify(session)); }
    async function removeLocalSession(sessionUuid) { localStorage.removeItem(sessionStorageKey(sessionUuid)); }

    function getLocalSessionById(sessionUuid) {
      try {
        const raw = localStorage.getItem(sessionStorageKey(sessionUuid));
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function findAnyOpenLocalSessionForDevice(deviceId) {
      const sessions = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key || !key.startsWith("session:")) continue;
        try {
          const s = JSON.parse(localStorage.getItem(key));
          if (s && s.device_id === deviceId && (s.status === "active" || s.status === "pending_submit")) sessions.push(s);
        } catch {}
      }
      sessions.sort((a, b) => new Date(b.started_at || 0) - new Date(a.started_at || 0));
      return sessions[0] || null;
    }

    async function getLatestLocalSessionForLocation(locationCode, deviceId) {
      const sessions = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key || !key.startsWith("session:")) continue;
        try { sessions.push(JSON.parse(localStorage.getItem(key))); } catch {}
      }
      sessions.sort((a, b) => new Date(b.started_at || 0) - new Date(a.started_at || 0));
      return sessions.find((s) => normalizeLoc(s.location_code || s.location_name) === normalizeLoc(locationCode) && (!deviceId || s.device_id === deviceId)) || null;
    }

    async function ensureDeviceIdInUrl() {
      const params = new URLSearchParams(window.location.search);
      let deviceId = decodeParam(params.get("device") || params.get("deviceId") || "");
      if (deviceId) { localStorage.setItem(CONFIG.DEVICE_STORAGE_KEY, deviceId); return deviceId; }
      deviceId = getFullyDeviceId() || localStorage.getItem(CONFIG.DEVICE_STORAGE_KEY) || "";
      deviceId = String(deviceId || "").trim();
      if (!deviceId) return "";
      params.set("device", deviceId);
      const nextUrl = `${window.location.pathname}?${params.toString()}`;
      localStorage.setItem(CONFIG.DEVICE_STORAGE_KEY, deviceId);
      window.history.replaceState({}, "", nextUrl);
      return deviceId;
    }

    function getFullyDeviceId() {
      try {
        if (window.fully) {
          if (typeof fully.getDeviceId === "function") {
            const id = String(fully.getDeviceId() || "").trim();
            if (id) return id;
          }
          if (typeof fully.getSerialNumber === "function") {
            const serial = String(fully.getSerialNumber() || "").trim();
            if (serial) return serial;
          }
          if (typeof fully.getMacAddress === "function") {
            const mac = String(fully.getMacAddress() || "").trim();
            if (mac) return mac;
          }
          if (typeof fully.getDeviceName === "function") {
            const name = String(fully.getDeviceName() || "").trim();
            if (name) return name;
          }
        }
      } catch (err) {
        console.warn("Fully device detection failed", err);
      }
      return "";
    }

    function calcDurationDisplay(startedAt, endedAt) {
      const start = new Date(startedAt).getTime();
      const end = new Date(endedAt).getTime();
      return `${Math.max(0, Math.round((end - start) / 60000))} min`;
    }

    function formatDateOnly(value) {
      if (!value) return "";
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? "" : d.toLocaleDateString();
    }

    function formatTimeOnly(value) {
      if (!value) return "";
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? "" : d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    }

    function normalizeLoc(value) {
      return String(value || "").trim().toUpperCase();
    }

    function locationCodeFromState(state) { return state && (state.location_code || state.code || state.location_name) || ""; }
    function renderLoadingCard(title, helper) { appEl.innerHTML = `<div class="shell"><div class="card"><div class="eyebrow">MEMPHIS ZOO CUSTODIAL SCAN</div><h1 class="title-blue">${escapeHtml(title)}</h1><div class="helper helperLarge">${escapeHtml(helper)}</div></div></div>`; }
    function renderMessageCard(titleClass, title, location, message) { appEl.innerHTML = `<div class="shell"><div class="card"><div class="eyebrow">MEMPHIS ZOO CUSTODIAL SCAN</div><h1 class="${escapeAttr(titleClass)}">${escapeHtml(title)}</h1>${location ? `<div class="location">${escapeHtml(location)}</div>` : ""}<div class="status error">${escapeHtml(message)}</div></div></div>`; }
    function buildContinueUrl(params) { const url = new URL(window.location.href); url.search = ""; Object.entries(params).forEach(([k, v]) => { if (v !== undefined && v !== null && String(v) !== "") url.searchParams.set(k, v); }); return url.toString(); }
    function applyBackground(url) { const finalUrl = url || CONFIG.DEFAULT_BACKGROUND_IMAGE_URL; if (!finalUrl) return; document.body.style.setProperty("--bg-image", `url(\"${new URL(finalUrl, window.location.href).toString()}\")`); }
    function decodeParam(value) { const s = String(value || "").replace(/\+/g, " "); try { return decodeURIComponent(s).trim(); } catch { return s.trim(); } }
    function formatDateTime(value) { if (!value) return ""; const d = new Date(value); return Number.isNaN(d.getTime()) ? String(value) : d.toLocaleString(); }
    function safeError(err) { return err && err.message ? String(err.message) : String(err || "Unknown error"); }
    function escapeHtml(s) { return String(s || "").replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    function escapeAttr(s) { return escapeHtml(s).replace(/`/g, "&#96;"); }
  </script>
